<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اللغز التطوري | ألغاز لا نهائية مع نقاط</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --primary-shadow: rgba(0, 255, 136, 0.3);
            --secondary: #00ccff;
            --bg-dark: #0b0e14;
            --bg-card: #131821;
            --bg-input: #1b212b;
            --border-color: #2a2f3a;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark); color: var(--text-light);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .container {
            max-width: 700px; width: 100%; background: var(--bg-card);
            padding: 40px; border-radius: 30px; border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center;
        }
        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900;
            background: linear-gradient(135deg, #ffffff, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sub { color: var(--text-muted); margin-bottom: 20px; }

        .xp-bar {
            background: var(--bg-input); padding: 10px 20px; border-radius: 50px;
            display: inline-flex; gap: 15px; align-items: center; margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .xp-score { color: var(--primary); font-weight: 900; font-size: 1.2rem; }

        .riddle-box { margin-top: 20px; }
        .riddle-question {
            font-size: 1.3rem; font-weight: 700; color: #fff; background: var(--bg-input);
            padding: 20px; border-radius: 15px; border-right: 4px solid var(--primary);
            margin-bottom: 15px; text-align: right;
        }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
        input {
            flex: 1; min-width: 150px; padding: 14px; border-radius: 15px;
            background: var(--bg-input); border: 1px solid var(--border-color);
            color: #fff; font-size: 1rem; outline: none; font-family: 'Cairo';
        }
        input:focus { border-color: var(--primary); }

        .btn-riddle {
            padding: 14px 25px; border: none; border-radius: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000; font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .btn-riddle:hover { transform: scale(1.05); }
        .btn-hint {
            background: var(--bg-input); color: #f59e0b; border: 1px solid #f59e0b; margin-top: 5px;
        }

        .feedback {
            margin-top: 15px; font-size: 1.1rem; min-height: 30px; color: var(--text-muted);
        }
        .feedback.success { color: var(--primary); }
        .feedback.error { color: var(--danger); }

        .counter { margin-top: 15px; color: var(--text-muted); font-size: 0.85rem; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.6rem; }
            .input-group { flex-direction: column; }
            input { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🧩 اللغز التطوري</h1>
        <p class="sub">حل الألغاز، اجمع النقاط (XP)، واستخدم التلميحات بحكمة!</p>

        <!-- شريط النقاط -->
        <div class="xp-bar">
            <span>⭐ النقاط:</span>
            <span class="xp-score" id="playerXP">0</span>
        </div>

        <!-- ساحة اللغز -->
        <div class="riddle-box">
            <div class="riddle-question" id="riddleDisplay">جاري تحميل اللغز...</div>
            <div class="input-group">
                <input type="text" id="userAnswer" placeholder="أكتب إجابتك هنا...">
                <button class="btn-riddle" onclick="checkAnswer()">🔍 تحقق</button>
            </div>
            <button class="btn-riddle btn-hint" onclick="useHint()">💡 تلميح (-1 XP)</button>
            <div class="feedback" id="feedbackMessage"></div>
            <div class="counter" id="progressDisplay">تم حل 0 لغز</div>
        </div>
    </div>

    <script>
        // ================================================================
        // 1. نظام النقاط (XP) المحلي
        // ================================================================
        let xp = parseInt(localStorage.getItem('riddleXP')) || 0;
        function updateXPUI() {
            document.getElementById('playerXP').textContent = xp;
            localStorage.setItem('riddleXP', xp);
        }
        function addXP(v) { 
            xp += v; 
            if (xp < 0) xp = 0; 
            updateXPUI(); 
        }
        updateXPUI();

        // ================================================================
        // 2. محرك الألغاز اللامحدود (خوارزميات لا نهائية)
        // ================================================================
        let solvedCount = 0;
        let usedRiddles = new Set();

        function generateRiddle() {
            let question, answer, hint, signature, attempt = 0;

            do {
                const type = Math.floor(Math.random() * 3);
                if (type === 0) { // سلسلة أرقام
                    const start = Math.floor(Math.random() * 20) + 1;
                    const step = Math.floor(Math.random() * 5) + 1;
                    const seq = Array.from({ length: 3 }, (_, i) => start + i * step);
                    const next = seq[2] + step;
                    question = `ما هو الرقم التالي: ${seq.join('، ')}، ؟`;
                    answer = String(next);
                    hint = `لاحظ الفرق بين الأرقام (الخطوة = ${step}).`;
                } else if (type === 1) { // منطق رياضي
                    const a = Math.floor(Math.random() * 10) + 1;
                    const b = Math.floor(Math.random() * 10) + 1;
                    question = `إذا كان ${a} + ${b} = ${a+b}، فما هو ناتج ${a+1} + ${b+1}؟`;
                    answer = String((a+1) + (b+1));
                    hint = `قم بزيادة الرقمين بمقدار 1 وجمعهما.`;
                } else { // لغز أنماط كلمات
                    const words = ['شمس', 'قمر', 'نجم', 'سماء', 'بحر', 'جبل', 'نار'];
                    const w1 = words[Math.floor(Math.random() * words.length)];
                    let w2 = words[Math.floor(Math.random() * words.length)];
                    while (w2 === w1) w2 = words[Math.floor(Math.random() * words.length)];
                    question = `إذا كان '${w1}' يعني 'الضوء'، و '${w2}' يعني 'الظلام'، فماذا تعني 'السماء'؟`;
                    answer = 'الفضاء';
                    hint = `فكر في معنى الكلمات بشكل مجازي.`;
                }
                signature = question + answer;
                attempt++;
            } while (usedRiddles.has(signature) && attempt < 50);

            usedRiddles.add(signature);
            if (usedRiddles.size > 200) usedRiddles.clear();

            return { question, answer, hint };
        }

        let currentRiddle = generateRiddle();

        function displayRiddle() {
            document.getElementById('riddleDisplay').textContent = currentRiddle.question;
            document.getElementById('userAnswer').value = '';
            document.getElementById('feedbackMessage').className = 'feedback';
            document.getElementById('feedbackMessage').textContent = '';
        }

        // ================================================================
        // 3. تفاعل المستخدم (الحل، التلميح، العد)
        // ================================================================

        function checkAnswer() {
            const input = document.getElementById('userAnswer').value.trim();
            const feedback = document.getElementById('feedbackMessage');

            if (!input) {
                feedback.className = 'feedback error';
                feedback.textContent = '⚠️ اكتب الإجابة أولاً!';
                return;
            }

            if (input === currentRiddle.answer) {
                solvedCount++;
                addXP(3);
                feedback.className = 'feedback success';
                feedback.textContent = `🎉 أحسنت! +3 XP`;
                document.getElementById('progressDisplay').textContent = `تم حل ${solvedCount} لغز`;

                // توليد لغز جديد بعد ثانية ونصف
                setTimeout(() => {
                    currentRiddle = generateRiddle();
                    displayRiddle();
                }, 1500);
            } else {
                feedback.className = 'feedback error';
                feedback.textContent = '❌ إجابة خاطئة، حاول مرة أخرى!';
            }
        }

        function useHint() {
            const feedback = document.getElementById('feedbackMessage');
            if (xp < 1) {
                feedback.className = 'feedback error';
                feedback.textContent = '⚠️ ليس لديك نقاط كافية للتلميح!';
                return;
            }
            addXP(-1);
            feedback.className = 'feedback success';
            feedback.textContent = `💡 التلميح: ${currentRiddle.hint} (تم خصم 1 نقطة)`;
        }

        // تشغيل اللغز الأول عند فتح الصفحة
        displayRiddle();
    </script>
</body>
</html>
