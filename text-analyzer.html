<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محلل النصوص الذكي | إحصائيات فورية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --primary-shadow: rgba(0, 255, 136, 0.3);
            --secondary: #00ccff;
            --bg-dark: #0b0e14;
            --bg-card: #131821;
            --bg-input: #1b212b;
            --border-color: #2a2f3a;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark); color: var(--text-light);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .container {
            max-width: 750px; width: 100%; background: var(--bg-card);
            padding: 40px; border-radius: 30px; border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center;
        }
        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900;
            background: linear-gradient(135deg, #ffffff, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sub { color: var(--text-muted); margin-bottom: 20px; }

        .analyzer-box { margin-top: 20px; }
        textarea {
            width: 100%; min-height: 150px; padding: 15px; border-radius: 15px;
            background: var(--bg-input); border: 1px solid var(--border-color);
            color: #fff; font-size: 1rem; outline: none; font-family: 'Cairo';
            resize: vertical; text-align: right; direction: rtl;
        }
        textarea:focus { border-color: var(--primary); }

        .btn-analyze {
            width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 1.1rem;
        }
        .btn-analyze:hover { transform: scale(1.02); }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px; margin-top: 20px;
        }
        .stat-card {
            background: var(--bg-input); padding: 20px; border-radius: 15px;
            border: 1px solid var(--border-color); text-align: center;
        }
        .stat-number {
            display: block; font-size: 2.2rem; font-weight: 900; color: var(--primary);
        }
        .stat-label { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; }
        .counter { margin-top: 15px; color: var(--text-muted); font-size: 0.85rem; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 محلل النصوص الذكي</h1>
        <p class="sub">الصق أي نص، واضغط زر التحليل لتحصل على إحصائيات فورية ودقيقة.</p>

        <div class="analyzer-box">
            <textarea id="textInput" placeholder="اكتب أو الصق نصك هنا...">الأدوات المطلقة المتنوعة هي منصة عربية متكاملة تحتوي على أدوات إبداعية وألعاب أسطورية.</textarea>
            <button class="btn-analyze" onclick="analyzeText()">🔍 تحليل النص</button>

            <div id="statsGrid" class="stats-grid">
                <div class="stat-card">
                    <span class="stat-number" id="wordCount">0</span>
                    <span class="stat-label">عدد الكلمات</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="sentenceCount">0</span>
                    <span class="stat-label">عدد الجمل</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="charCount">0</span>
                    <span class="stat-label">عدد الأحرف</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="readingTime">0</span>
                    <span class="stat-label">وقت القراءة (دقيقة)</span>
                </div>
            </div>
            <div class="counter" id="analyzeCounter">تم التحليل 0 مرة</div>
        </div>
    </div>

    <script>
        // ================================================================
        // محرك تحليل النصوص
        // ================================================================
        let analyzeCount = 0;

        function analyzeText() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) {
                alert('يرجى كتابة أو لصق نص أولاً!');
                return;
            }

            // 1. عدد الكلمات
            const words = text.split(/\s+/).filter(w => w.length > 0);
            const wordCount = words.length;

            // 2. عدد الجمل (التقسيم بناءً على النقاط، علامات الاستفهام، والتعجب)
            const sentences = text.split(/[.!؟!?;]/).filter(s => s.trim().length > 0);
            const sentenceCount = sentences.length;

            // 3. عدد الأحرف (بدون مسافات)
            const charCount = text.replace(/\s/g, '').length;

            // 4. وقت القراءة (متوسط سرعة القراءة 200 كلمة في الدقيقة)
            const readingTime = Math.ceil(wordCount / 200);

            // تحديث الواجهة
            document.getElementById('wordCount').textContent = wordCount.toLocaleString();
            document.getElementById('sentenceCount').textContent = sentenceCount.toLocaleString();
            document.getElementById('charCount').textContent = charCount.toLocaleString();
            document.getElementById('readingTime').textContent = readingTime.toLocaleString();

            analyzeCount++;
            document.getElementById('analyzeCounter').textContent = `تم التحليل ${analyzeCount} مرة`;
        }

        // تشغيل أولي عند فتح الصفحة
        analyzeText();
    </script>
</body>
</html>
