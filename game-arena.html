<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberShield Ultimate | النسخة الكاملة المفحوصة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88; --primary-glow: rgba(0, 255, 136, 0.5);
            --secondary: #00ccff; --danger: #ef4444; --bg-dark: #0a0d13;
            --bg-card: #131a24; --bg-input: #1c2532; --border: #2a3340;
            --text: #f0f4ff; --text-muted: #8899aa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-touch-callout: none; -webkit-user-select: none; }
        body {
            font-family: 'Cairo', sans-serif; background: var(--bg-dark);
            color: var(--text); min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px; overflow-x: hidden; position: relative;
        }
        #bgCanvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index: 0; pointer-events: none; opacity: 0.15; }
        .container { max-width: 1100px; width: 100%; position: relative; z-index: 10; }
        .game-header {
            text-align: center; margin-bottom: 25px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 2.8rem; font-weight: 900; font-family: 'Orbitron', sans-serif;
        }
        .xp-bar {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 20px 25px; margin-bottom: 30px;
            display: flex; align-items: center; gap: 15px; flex-wrap: wrap;
        }
        .xp-info { flex: 1; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 1.05rem; color: var(--primary); }
        .xp-track { flex: 2; background: #11161e; height: 8px; border-radius: 20px; overflow: hidden; }
        .xp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: width 0.5s ease; }
        .leaderboard-btn { background: var(--bg-input); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.9rem; white-space: nowrap; }
        .leaderboard-btn:hover { border-color: var(--primary); color: var(--primary); }
        .game-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 32px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        .game-select { width: 100%; padding: 16px; border-radius: 16px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text); font-size: 1.1rem; margin-bottom: 25px; font-family: 'Cairo', sans-serif; outline: none; cursor: pointer; transition: 0.3s; }
        .game-select:focus, .game-select:hover { border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); }
        .panel { display: none; animation: fadeUp 0.4s ease; }
        .panel.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 16px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #000; font-weight: 900; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 25px var(--primary-glow); }
        .result-box { margin-top: 15px; padding: 14px; background: #0e1219; border-radius: 16px; border-right: 4px solid var(--primary); display: none; text-align: center; font-weight: 700; }
        .result-box.show { display: block; }
        .result-box.win { border-color: var(--primary); color: var(--primary); }
        .result-box.lose { border-color: var(--danger); color: var(--danger); }
        .canvas-wrapper {
            position: relative; width: 100%; background: #05080c;
            border-radius: 20px; border: 1px solid var(--border); overflow: hidden;
            aspect-ratio: auto !important; max-height: none !important; height: 85vh !important;
        }
        .canvas-wrapper canvas { width: 100%; height: 100%; display: block; touch-action: none; }
        @media (max-width: 600px) { .game-header { font-size: 2rem; } .game-card { padding: 18px; } .canvas-wrapper { height: 90vh !important; } }
        .game-overlay { position: absolute; top:0; left:0; width:100%; height:100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); opacity: 0; pointer-events: none; transition: opacity 0.4s; }
        .game-overlay.active { opacity: 1; pointer-events: auto; }
        .grid-4x4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 280px; margin: 10px auto; }
        .memory-card { aspect-ratio: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: transparent; cursor: pointer; transition: 0.3s; }
        .memory-card.flipped, .memory-card.matched { color: #fff; background: #0b1018; border-color: var(--primary); }
        .memory-card.matched { background: #1a2634; }
        .memory-card.disabled { pointer-events: none; opacity: 0.5; }
        .maze-grid { display: grid; gap: 2px; justify-content: center; margin: 10px auto; }
        .maze-cell { width: 24px; height: 24px; background: #2a3a4a; border-radius: 4px; transition: 0.2s; }
        .maze-cell.wall { background: #0a0f14; border: 1px solid #000; }
        .maze-cell.player { background: var(--primary); box-shadow: 0 0 12px var(--primary); }
        .maze-cell.end { background: var(--danger); animation: pulse 1s infinite; }
        .maze-cell.enemy { background: #ff00ff; box-shadow: 0 0 12px #ff00ff; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        .maze-controls { display: flex; justify-content: center; gap: 6px; margin-top: 12px; }
        .maze-btn { width: 48px; height: 48px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 14px; color: #fff; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .maze-btn:hover { border-color: var(--primary); background: #131a24; }
        .grid-2048 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 300px; margin: 15px auto; }
        .tile-2048 { aspect-ratio: 1; background: #1c2532; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 800; color: #fff; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal-content { background: var(--bg-card); padding: 30px; border-radius: 25px; border: 1px solid var(--border); max-width: 400px; width: 90%; text-align: center; }
        .back-btn { position: absolute; top: 10px; left: 10px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.85rem; z-index: 20; }
        .back-btn:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="container">
        <h1 class="game-header">🎮 ساحة الألعاب الأسطورية</h1>
        <div class="xp-bar">
            <div class="xp-info">
                <span>🛡️ <span id="rankDisplay">🔰 مبتدئ</span></span>
                <span>⭐ <span id="xpDisplay">0</span> XP</span>
                <span><i class="fas fa-trophy" style="color:#f59e0b;"></i> <span id="badgeDisplay"></span></span>
            </div>
            <div class="xp-track"><div class="xp-fill" id="xpFill"></div></div>
            <button class="leaderboard-btn" onclick="showLeaderboard()">🏆 لوحة الصدارة</button>
        </div>
        <div class="game-card">
            <select class="game-select" id="gameSelector">
                <option value="detective">🕵️ المحقق اللامحدود</option>
                <option value="memory">🧩 تحدّي الظلال (4×4)</option>
                <option value="maze">🌀 المتاهة الذكية</option>
                <option value="space">🚀 مدافع الفضاء (مطور)</option>
                <option value="reaction">⚡ رد الفعل الخاطف</option>
                <option value="snake">🐍 الثعبان الأسطوري (مطور)</option>
                <option value="game2048">🔢 2048 العقلية</option>
                <option value="typing">⌨️ تحدي سرعة الكتابة</option>
            </select>
            <div id="panel-detective" class="panel active"></div>
            <div id="panel-memory" class="panel"></div>
            <div id="panel-maze" class="panel"></div>
            <div id="panel-space" class="panel"></div>
            <div id="panel-reaction" class="panel"></div>
            <div id="panel-snake" class="panel"></div>
            <div id="panel-game2048" class="panel"></div>
            <div id="panel-typing" class="panel"></div>
            <div id="resultBox" class="result-box"><div id="resultText"></div></div>
        </div>
    </div>

    <script>
    (function() {
        // ========== أنظمة أساسية ==========
        const STORAGE_KEY = 'cybershield_xp_v12';
        const HIGHSCORES_KEY = 'cybershield_highscores_v12';
        let xp = 0; let highScores = {};
        try { xp = parseInt(localStorage.getItem(STORAGE_KEY)) || 0; highScores = JSON.parse(localStorage.getItem(HIGHSCORES_KEY) || '{}'); } catch(e) { xp = 0; highScores = {}; }

        function saveXP() { localStorage.setItem(STORAGE_KEY, xp); }
        function saveHighScores() { localStorage.setItem(HIGHSCORES_KEY, JSON.stringify(highScores)); }
        function updateHighScore(game, score, mode = 'max') {
            const current = highScores[game];
            if (current === undefined || current === null || (mode === 'max' ? score > current : score < current)) {
                highScores[game] = score; saveHighScores();
            }
        }
        function addXP(amount) {
            xp = Math.max(0, xp + amount); saveXP(); refreshUI();
            if (amount > 0) SoundFX.correct(); else SoundFX.wrong();
        }
        function refreshUI() {
            document.getElementById('xpDisplay').textContent = xp;
            let pct = Math.min(100, (xp / 5000) * 100);
            document.getElementById('xpFill').style.width = pct + '%';
            let rank, badge;
            if (xp >= 5000) { rank = '👑 الأسطورة المطلقة'; badge = '🏆 أسطورة'; }
            else if (xp >= 2500) { rank = '⚡ سيد السايبر'; badge = '💎 ماستر'; }
            else if (xp >= 1000) { rank = '🔮 خبير الشفرات'; badge = '🥇 ذهبي'; }
            else if (xp >= 250) { rank = '⚔️ محقق نخبوي'; badge = '🥈 فضي'; }
            else { rank = '🔰 مبتدئ'; badge = '🥉 برونزي'; }
            document.getElementById('rankDisplay').textContent = rank;
            document.getElementById('badgeDisplay').textContent = badge;
        }
        function showResult(msg, isWin) {
            const box = document.getElementById('resultBox'); const text = document.getElementById('resultText');
            text.textContent = msg; box.className = 'result-box show ' + (isWin ? 'win' : 'lose');
            clearTimeout(box._timeout); box._timeout = setTimeout(() => box.classList.remove('show'), 2500);
        }
        function showLeaderboard() {
            let html = '<div class="modal-content"><h2>🏆 لوحة الصدارة</h2><hr style="border-color:var(--border); margin:15px 0;">';
            const games = ['detective', 'memory', 'maze', 'space', 'reaction', 'snake', '2048', 'typing'];
            const gameNames = { detective: 'المحقق', memory: 'الذاكرة', maze: 'المتاهة', space: 'الفضاء', reaction: 'رد الفعل', snake: 'الثعبان', '2048': '2048', typing: 'الكتابة' };
            for (let g of games) { html += `<p><strong>${gameNames[g] || g}:</strong> ${highScores[g] || '---'}</p>`; }
            html += '<button class="btn" onclick="this.parentElement.parentElement.remove()" style="margin-top:15px;">إغلاق</button></div>';
            const modal = document.createElement('div'); modal.className = 'modal';
            modal.innerHTML = html; modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            document.body.appendChild(modal);
        }

        const SoundFX = {
            audioCtx: null, init() { if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(freq, type = 'square', duration = 0.15, volume = 0.1) {
                this.init(); const osc = this.audioCtx.createOscillator(); const gain = this.audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
                gain.gain.setValueAtTime(volume, this.audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(this.audioCtx.destination);
                osc.start(); osc.stop(this.audioCtx.currentTime + duration);
            },
            correct() { this.play(800, 'square', 0.1); setTimeout(() => this.play(1200, 'square', 0.15), 100); },
            wrong() { this.play(200, 'sawtooth', 0.3, 0.2); },
            levelUp() { this.play(523); setTimeout(() => this.play(659), 100); setTimeout(() => this.play(784), 200); },
            shoot() { this.play(300, 'square', 0.05, 0.05); },
            explosion() { this.play(80, 'sawtooth', 0.4, 0.2); },
            eat() { this.play(600, 'triangle', 0.1); }
        };

        const gameManager = {
            currentGame: null, currentPanelId: null,
            switchGame(gameName) {
                if (this.currentGame && typeof this.currentGame.destroy === 'function') this.currentGame.destroy();
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                const panel = document.getElementById('panel-' + gameName);
                if (panel) panel.classList.add('active');
                if (Games[gameName]) { this.currentGame = new Games[gameName](panel); this.currentPanelId = gameName; }
            }
        };

        class BaseGame {
            constructor(container) { this.container = container; }
            destroy() {}
            addBackButton() {
                const btn = document.createElement('button');
                btn.className = 'back-btn';
                btn.innerHTML = '⬅️ القائمة';
                btn.onclick = () => {
                    document.getElementById('gameSelector').focus();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                this.container.style.position = 'relative';
                this.container.appendChild(btn);
            }
        }

        function normalizeText(str) {
            return str.trim()
                .replace(/[إأآ]/g, 'ا')
                .replace(/[ى]/g, 'ي')
                .replace(/[ة]/g, 'ه')
                .replace(/\s+/g, ' ')
                .toLowerCase();
        }

        // ============================================================================
//   🔍 INFINITE DETECTIVE GAME - النسخة الاحترافية المحسنة
// ============================================================================

class DetectiveGame extends BaseGame {
    // 🔒 ذاكرة الأسئلة بتقنية FIFO فعالة جداً ومضادة للتكرار طويل الأمد
    static globalAskedData = (() => {
        let mapData = new Map();
        try {
            const stored = localStorage.getItem('detective_asked_q_v2');
            if (stored) {
                const arr = JSON.parse(stored);
                arr.forEach(item => {
                    if (item && item.q) mapData.set(item.q, item.time || Date.now());
                });
            }
        } catch (e) {
            mapData = new Map();
        }

        const MAX_SIZE = 10000;
        const PRUNE_SIZE = 3000;

        return {
            has(q) {
                return mapData.has(q);
            },
            add(q) {
                mapData.set(q, Date.now());
                if (mapData.size > MAX_SIZE) {
                    let count = 0;
                    for (const key of mapData.keys()) {
                        mapData.delete(key);
                        count++;
                        if (count >= PRUNE_SIZE) break;
                    }
                }
                this.save();
            },
            save() {
                try {
                    const arr = Array.from(mapData.entries()).map(([q, time]) => ({ q, time }));
                    localStorage.setItem('detective_asked_q_v2', JSON.stringify(arr));
                } catch (e) {}
            },
            clear() {
                mapData.clear();
                this.save();
            }
        };
    })();

    constructor(container) {
        super(container);

        // 📚 قاعدة بيانات موسعة جداً مع إجابات مرنة
        this.baseQuestions = [
            // دين
            { q: 'كم عدد سور القرآن الكريم؟', a: '114', cat: '📖 دين' },
            { q: 'ما هي السورة التي تسمى قلب القرآن؟', a: ['يس', 'سورة يس'], cat: '📖 دين' },
            { q: 'كم عدد الأنبياء المذكورين في القرآن؟', a: '25', cat: '📖 دين' },
            { q: 'من هو النبي الذي ابتلعه الحوت؟', a: ['يونس', 'سيدنا يونس', 'النبي يونس'], cat: '📖 دين' },
            { q: 'ما هي السورة التي لا تبدأ بالبسملة؟', a: ['التوبة', 'سورة التوبة'], cat: '📖 دين' },
            { q: 'ما هي أطول آية في القرآن؟', a: ['آية الدين', 'الدين'], cat: '📖 دين' },
            { q: 'من هو الصحابي الذي لقب بالصديق؟', a: ['أبو بكر', 'ابو بكر', 'ابو بكر الصديق'], cat: '📖 دين' },
            { q: 'ما هي أقصر سورة في القرآن الكريم؟', a: ['الكوثر', 'سورة الكوثر'], cat: '📖 دين' },
            { q: 'من هو الملقب بسيف الله المسلول؟', a: ['خالد بن الوليد', 'خالد ابن الوليد', 'خالد'], cat: '📖 دين' },
            { q: 'كم عدد أركان الإسلام؟', a: '5', cat: '📖 دين' },

            // تاريخ
            { q: 'في أي عام اكتشف كولومبوس أمريكا؟', a: '1492', cat: '📜 تاريخ' },
            { q: 'في أي عام وقعت حرب 6 أكتوبر؟', a: '1973', cat: '📜 تاريخ' },
            { q: 'من هم بناة الأهرامات الثلاثة في الجيزة؟', a: ['الفراعنة', 'المصريين القدماء', 'المصريون القدماء'], cat: '📜 تاريخ' },
            { q: 'أين بنيت أول مكتبة في التاريخ؟', a: ['العراق', 'في العراق'], cat: '📜 تاريخ' },
            { q: 'ما هي عاصمة الدولة العباسية؟', a: 'بغداد', cat: '📜 تاريخ' },
            { q: 'من هو قائد معركة حطين؟', a: ['صلاح الدين الأيوبي', 'صلاح الدين الايوبي', 'صلاح الدين'], cat: '📜 تاريخ' },
            { q: 'ما هي المدينة التي تسمى مدينة الشمس؟', a: 'بعلبك', cat: '📜 تاريخ' },

            // علوم وطب وفضاء
            { q: 'من هو مخترع المصباح الكهربائي؟', a: ['توماس إديسون', 'توماس اديسون', 'اديسون'], cat: '💡 علم' },
            { q: 'ما هو الكوكب الأحمر؟', a: ['المريخ', 'كوكب المريخ'], cat: '🌌 فضاء' },

            { q: 'كم عدد عظام الإنسان البالغ؟', a: '206', cat: '🧬 طب' },
            { q: 'ما هو الغاز الذي تتنفسه النباتات؟', a: ['ثاني أكسيد الكربون', 'ثاني اكسيد الكربون'], cat: '🌿 طبيعة' },
            { q: 'ما هي أصغر عظمة في جسم الإنسان؟', a: ['الركاب', 'عظمة الركاب'], cat: '🧬 طب' },
            { q: 'ما هو أثقل كوكب في المجموعة الشمسية؟', a: ['المشتري', 'كوكب المشتري'], cat: '🌌 فضاء' },
            { q: 'ما هو العنصر الكيميائي الذي رمزه O؟', a: ['أكسجين', 'الأكسجين', 'اكسجين'], cat: '🔬 علوم' },

            // جغرافيا
            { q: 'ما هو أكبر محيط في العالم؟', a: ['الهادئ', 'المحيط الهادئ'], cat: '🌍 جغرافيا' },
            { q: 'ما هي عاصمة فرنسا؟', a: 'باريس', cat: '🌍 جغرافيا' },
            { q: 'ما هو أطول نهر في العالم؟', a: ['النيل', 'نهر النيل'], cat: '🌍 جغرافيا' },
            { q: 'ما هي عاصمة اليابان؟', a: 'طوكيو', cat: '🌍 جغرافيا' },
            { q: 'أين تقع أهرامات المايا القديمة؟', a: 'المكسيك', cat: '🌍 جغرافيا' },
            { q: 'ما هي أصغر دولة في العالم؟', a: ['الفاتيكان', 'دولة الفاتيكان'], cat: '🌍 جغرافيا' },
            { q: 'ما هي عاصمة المملكة العربية السعودية؟', a: 'الرياض', cat: '🌍 جغرافيا' },

            // حيوانات
            { q: 'ما هو أسرع حيوان بري؟', a: 'الفهد', cat: '🦁 حيوانات' },
            { q: 'ما هو أكبر طائر في العالم؟', a: 'النعامة', cat: '🦁 حيوانات' },
            { q: 'ما هو أضخم كائن حي على وجه الأرض؟', a: ['الحوت الأزرق', 'الحوت الازرق'], cat: '🦁 حيوانات' },
            { q: 'ما هو الحيوان الذي يلقب بسفينة الصحراء؟', a: ['الجمل', 'الابل'], cat: '🦁 حيوانات' },

            // ألغاز

    // ================ مولّد أسئلة لا نهائي ================
    generateDynamicQuestion() {
        const types = ['math', 'algebra', 'sequence', 'pattern'];
        const type = types[Math.floor(Math.random() * types.length)];

        switch (type) {
            case 'math': {
                const ops = ['+', '-', '×', '÷'];
                const op = ops[Math.floor(Math.random() * ops.length)];
                let num1, num2, ans;
                if (op === '×') {
                    num1 = Math.floor(Math.random() * 25) + 2;
                    num2 = Math.floor(Math.random() * 15) + 2;
                    ans = num1 * num2;
                } else if (op === '-') {
                    num1 = Math.floor(Math.random() * 100) + 10;
                    num2 = Math.floor(Math.random() * 50) + 1;
                    ans = num1 - num2;
                } else if (op === '+') {
                    num1 = Math.floor(Math.random() * 200) + 1;
                    num2 = Math.floor(Math.random() * 100) + 1;
                    ans = num1 + num2;
                } else {
                    num2 = Math.floor(Math.random() * 12) + 2;
                    const factor = Math.floor(Math.random() * 15) + 1;
                    num1 = num2 * factor;
                    ans = factor;
                }
                return { q: `ما هو ناتج ${num1} ${op} ${num2}؟`, a: ans.toString(), cat: '🔢 رياضيات' };
            }
            case 'algebra': {
                const x = Math.floor(Math.random() * 15) + 2;
                const coef = Math.floor(Math.random() * 8) + 2;
                const b = Math.floor(Math.random() * 12) + 1;
                const result = coef * x + b;
                return { q: `إذا كانت ${coef}X + ${b} = ${result}، فما قيمة X؟`, a: x.toString(), cat: '🧠 معادلات' };
            }
            case 'sequence': {
                const start = Math.floor(Math.random() * 30) + 1;
                const step = Math.floor(Math.random() * 10) + 1;
                const seq = [start, start + step, start + (step * 2), '؟'];
                return { q: `أكمل النمط: ${seq.join('، ')}`, a: (start + step * 3).toString(), cat: '🧩 أنماط' };
            }
            case 'pattern': {
                const alphabet = ['أ', 'ب', 'ت', 'ث', 'ج', 'ح', 'خ', 'د', 'ذ', 'ر', 'ز', 'س', 'ش', 'ص', 'ض', 'ط', 'ظ', 'ع', 'غ', 'ف', 'ق', 'ك', 'ل', 'م', 'ن', 'هـ', 'و', 'ي'];
                const startIdx = Math.floor(Math.random() * (alphabet.length - 4));
                const seq = [alphabet[startIdx], alphabet[startIdx + 1], alphabet[startIdx + 2], '؟'];
                return { q: `أكمل التسلسل: ${seq.join('، ')}`, a: alphabet[startIdx + 3], cat: '🔤 حروف' };
            }
        }
    }

    // ================ جلب سؤال فريد ================
    getUniqueQuestion() {
        const remainingBase = this.baseQuestions.filter(q => !DetectiveGame.globalAskedData.has(q.q));
        if (remainingBase.length > 0) {
            const q = remainingBase[Math.floor(Math.random() * remainingBase.length)];
            DetectiveGame.globalAskedData.add(q.q);
            return q;
        }

        let dynamicQ;
        let attempts = 0;
        const MAX_ATTEMPTS = 200;
        do {
            dynamicQ = this.generateDynamicQuestion();
            attempts++;
        } while (DetectiveGame.globalAskedData.has(dynamicQ.q) && attempts < MAX_ATTEMPTS);

        DetectiveGame.globalAskedData.add(dynamicQ.q);
        return dynamicQ;
    }

    // ================ الانتقال للسؤال التالي ================
    nextQuestion() {
        this.isProcessing = false;
        this.isRevealed = false;
        this.charHintUsed = false;
        this.lenHintUsed = false;
        this.current = this.getUniqueQuestion();

        const qElem = this.container.querySelector('.detQuestion');
        const catElem = this.container.querySelector('.detCat');
        const streakElem = this.container.querySelector('.detStreak');
        const hintElem = this.container.querySelector('.detectiveHint');

        if (qElem) qElem.textContent = this.current.q;
        if (catElem) catElem.textContent = this.current.cat || '🎯 سؤال';
        if (streakElem) streakElem.textContent = `🔥 ${this.streak}`;
        if (hintElem) hintElem.textContent = '';

        // إعادة تعيين أزرار التلميحات بصرياً
        if (this.btnHintChar) {
            this.btnHintChar.style.opacity = '1';

            this.btnHintChar.disabled = false;
        }
        if (this.btnHintLen) {
            this.btnHintLen.style.opacity = '1';
            this.btnHintLen.style.cursor = 'pointer';
            this.btnHintLen.disabled = false;
        }

            this.btnSubmit.textContent = '🔍 تقديم الحل';
            this.btnSubmit.style.background = 'linear-gradient(45deg, #00c853, #00e676)';
        }

        if (this.inputElem) {
            this.inputElem.value = '';
            this.inputElem.disabled = false;
            if (this.focusTimeout) clearTimeout(this.focusTimeout);
            this.focusTimeout = setTimeout(() => {
                if (this.inputElem && this.container.isConnected) this.inputElem.focus();
            }, 100);
        }
    }

    // ================ منظف النصوص الفائق ================
    cleanText(str) {
        if (!str) return '';
        let text = str.toString().trim().toLowerCase();

        const digitsMap = {
            '٠':'0', '١':'1', '٢':'2', '٣':'3', '٤':'4', '٥':'5', '٦':'6', '٧':'7', '٨':'8', '٩':'9',
            '۰':'0', '۱':'1', '۲':'2', '۳':'3', '۴':'4', '۵':'5', '۶':'6', '۷':'7', '۸':'8', '۹':'9'
        };
        text = text.replace(/[٠-٩۰-۹]/g, w => digitsMap[w]);

        return text
            .replace(/[\u064B-\u0652]/g, '')       // الحركات والتشكيل
            .replace(/[أإآٱ]/g, 'ا')               // توحيد الألف
            .replace(/[ؤئ]/g, 'ء')                 // توحيد الهمزات
            .replace(/ة/g, 'ه')                    // التاء المربوطة
            .replace(/ى/g, 'ي')                    // الألف المقصورة
            .replace(/ـ/g, '')                     // التطويل
            .replace(/(^|\s)ابن(\s|$)/g, '$1بن$2') // تحويل ابن إلى بن
            .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()،؟]/g, '') // علامات الترقيم
            .replace(/\s+/g, ' ')                  // إزالة المسافات الزائدة
            .trim();
    }

    handleAction() {
        if (this.isProcessing || !this.container.isConnected) return;
        if (this.isRevealed) {
            this.nextQuestion();
        } else {
            this.check();
        }
    }

    check() {
        if (this.isProcessing || !this.inputElem || this.inputElem.disabled) return;
        const userAns = this.cleanText(this.inputElem.value);
        if (!userAns) {
            if (typeof showResult === 'function') showResult('⚠️ يرجى كتابة الإجابة أولاً!', false);
            return;
        }

        this.isProcessing = true;
        let isCorrect = false;
        if (Array.isArray(this.current.a)) {
            isCorrect = this.current.a.some(ans => this.cleanText(ans) === userAns);
        } else {
            isCorrect = this.cleanText(this.current.a) === userAns;
        }

        if (isCorrect) {
            this.streak++;
            const bonusXP = 5 + (this.streak > 2 ? 3 : 0);
            if (typeof addXP === 'function') addXP(bonusXP);
            if (typeof showResult === 'function') {
                showResult(`🎯 إجابة صحيحة! +${bonusXP} XP ${this.streak > 2 ? '🔥 Combo!' : ''}`, true);
            }
            if (typeof updateHighScore === 'function') {
                const currentHigh = (typeof highScores !== 'undefined' && highScores?.detective) ? highScores.detective : 0;
                if (this.streak > currentHigh) {
                    updateHighScore('detective', this.streak);
                }
            }
            this.nextQuestion();
        } else {
            this.streak = 0;
            const streakElem = this.container.querySelector('.detStreak');
            if (streakElem) streakElem.textContent = '🔥 0';
            if (typeof addXP === 'function') addXP(-2);
            if (typeof showResult === 'function') showResult('❌ إجابة خاطئة! (-2 XP)', false);
            this.isProcessing = false;
        }
    }

    hasEnoughXP(cost) {
        return (typeof xp === 'number' ? xp : 0) >= cost;
    }

    // دالة عرض التلميحات المركبة
    updateHintsUI() {
        const ans = Array.isArray(this.current.a) ? this.current.a[0] : this.current.a;
        const hintElem = this.container.querySelector('.detectiveHint');
        if (!hintElem) return;

        let hints = [];
        if (this.charHintUsed) hints.push(`💡 الحرف الأول: "${ans.charAt(0)}"`);
        if (this.lenHintUsed) hints.push(`📏 عدد الحروف: ${ans.length}`);

        hintElem.innerHTML = hints.join('<br>');
    }

    // تعطيل زر الحرف الأول بصرياً عند الاستخدام
    useCharHint() {
        if (this.isRevealed || this.isProcessing) return;
        if (this.charHintUsed) {
            if (typeof showResult === 'function') showResult('💡 تم استخدام هذا التلميح بالفعل!', false);
            return;
        }
        if (!this.hasEnoughXP(1)) {
            if (typeof showResult === 'function') showResult('❌ رصيد XP لا يكفي!', false);
            return;
        }
        this.charHintUsed = true;
        if (typeof addXP === 'function') addXP(-1);

        if (this.btnHintChar) {
            this.btnHintChar.style.opacity = '0.5';
            this.btnHintChar.style.cursor = 'not-allowed';
            this.btnHintChar.disabled = true;
        }

        this.updateHintsUI();
    }

    // تعطيل زر عدد الحروف بصرياً عند الاستخدام
    useLenHint() {
        if (this.isRevealed || this.isProcessing) return;
        if (this.lenHintUsed) {
            if (typeof showResult === 'function') showResult('📏 تم استخدام هذا التلميح بالفعل!', false);
            return;
        }
        if (!this.hasEnoughXP(1)) {
            if (typeof showResult === 'function') showResult('❌ رصيد XP لا يكفي!', false);
            return;
        }
        this.lenHintUsed = true;
        if (typeof addXP === 'function') addXP(-1);

        if (this.btnHintLen) {
            this.btnHintLen.style.opacity = '0.5';
            this.btnHintLen.style.cursor = 'not-allowed';
            this.btnHintLen.disabled = true;
        }

        this.updateHintsUI();
    }

    revealAnswer() {
        if (this.isProcessing || this.isRevealed) return;
        if (!this.hasEnoughXP(3)) {
            if (typeof showResult === 'function') showResult('❌ رصيدك لا يكفي لكشف الحل!', false);
            return;
        }
        this.isRevealed = true;
        this.streak = 0;
        const streakElem = this.container.querySelector('.detStreak');
        if (streakElem) streakElem.textContent = '🔥 0';
        const ans = Array.isArray(this.current.a) ? this.current.a[0] : this.current.a;
        const hintElem = this.container.querySelector('.detectiveHint');
        if (hintElem) hintElem.textContent = `🔓 الإجابة: "${ans}"`;
        if (this.inputElem) {
            this.inputElem.value = ans;
            this.inputElem.disabled = true;
        }
        if (this.btnSubmit) {
            this.btnSubmit.textContent = 'السؤال التالي ➡️';
            this.btnSubmit.style.background = 'linear-gradient(45deg, #2196F3, #00BCD4)';
        }
        if (typeof addXP === 'function') addXP(-3);
        if (typeof showResult === 'function') showResult('🔓 تم كشف الإجابة! (-3 XP)', false);
    }

    skip() {
        if (this.isProcessing) return;
        if (!this.hasEnoughXP(2)) {
            if (typeof showResult === 'function') showResult('❌ رصيدك لا يكفي للتخطي!', false);
            return;
        }
        this.streak = 0;
        this.isProcessing = true;
        const hintElem = this.container.querySelector('.detectiveHint');
        if (hintElem) hintElem.textContent = '';
        if (typeof addXP === 'function') addXP(-2);
        if (typeof showResult === 'function') showResult('⏭️ تم تخطي السؤال! (-2 XP)', false);
        this.nextQuestion();
    }

    destroy() {
        this.isProcessing = false;
        if (this.focusTimeout) {
            clearTimeout(this.focusTimeout);
            this.focusTimeout = null;
        }
        if (this.container && this.keydownHandler) {
            this.container.removeEventListener('keydown', this.keydownHandler);
        }
    }
}


        // ========== 2. تحدّي الظلال ==========
        class MemoryGame extends BaseGame {
            constructor(container) {
                super(container);
                this.icons = ['🔥','🛡️','💀','⚡','🔮','🗡️','👁️','🌙'];
                this.cards = []; this.queue = []; this.timer = null; this.timeLeft = 20; this.gameActive = false;
                this.container.innerHTML = `
                    <p style="text-align:center; color:var(--text-muted);">8 أزواج! الوقت: <span id="memTimer">20</span> ثانية</p>
                    <div class="grid-4x4" id="memGrid"></div>
                    <button class="btn" id="memRestart">🔄 بدء التحدي</button>
                `;
                this.container.querySelector('#memRestart').onclick = () => this.start(); this.start(); this.addBackButton();
            }
            start() {
                clearInterval(this.timer); this.timeLeft = 20; this.gameActive = true;
                document.getElementById('memTimer').textContent = this.timeLeft;
                const grid = document.getElementById('memGrid'); grid.innerHTML = '';
                let deck = [...this.icons, ...this.icons].sort(() => Math.random() - 0.5);
                this.cards = [];
                deck.forEach((icon, i) => {
                    const card = document.createElement('div'); card.className = 'memory-card';
                    card.dataset.icon = icon; card.onclick = () => this.flip(card);
                    grid.appendChild(card); this.cards.push(card);
                });
                this.cards.forEach(c => { c.textContent = c.dataset.icon; c.style.color = '#fff'; });
                setTimeout(() => {
                    if (!this.gameActive) return;
                    this.cards.forEach(c => { if(!c.classList.contains('matched')){ c.textContent = ''; c.style.color = 'transparent'; } });
                    this.timer = setInterval(() => {
                        this.timeLeft--; document.getElementById('memTimer').textContent = this.timeLeft;
                        if (this.timeLeft <= 0) { clearInterval(this.timer); this.gameActive = false; this.cards.forEach(c => { c.classList.add('disabled'); c.style.pointerEvents = 'none'; }); showResult('⏰ انتهى الوقت! خسارة', false); addXP(-3); }
                    }, 1000);
                }, 3000); this.queue = [];
            }
            flip(card) {
                if (!this.gameActive || card.classList.contains('flipped') || card.classList.contains('matched') || card.classList.contains('disabled') || this.queue.length >= 2) return;
                card.classList.add('flipped'); card.textContent = card.dataset.icon; card.style.color = '#fff'; this.queue.push(card);
                if (this.queue.length === 2) {
                    const [a, b] = this.queue;
                    if (a.dataset.icon === b.dataset.icon) {
                        a.classList.add('matched'); b.classList.add('matched'); addXP(5);
                        if (document.querySelectorAll('.memory-card:not(.matched)').length === 0) { clearInterval(this.timer); this.gameActive = false; addXP(20); showResult('🏆 فوز ساحق! +20 XP', true); }
                    } else {
                        setTimeout(() => { a.classList.remove('flipped'); b.classList.remove('flipped'); a.textContent = ''; b.textContent = ''; a.style.color = 'transparent'; b.style.color = 'transparent'; }, 600);
                    } this.queue = [];
                }
            }
            destroy() { clearInterval(this.timer); this.gameActive = false; }

// ============================================================================
//   🌀 ULTIMATE MAZE MASTER - النسخة المصححة والمحسنة بصرياً
// ============================================================================

class MazeGame extends BaseGame {
    constructor(container) {
        super(container);
        this.size = 15;
        this.maze = [];
        this.visitedPath = new Set();
        this.player = { x: 1, y: 1 };
        this.end = { x: this.size - 2, y: this.size - 2 };
        this.enemy = { x: 7, y: 7 };
        this.gems = [];
        this.traps = [];
        this.collectedGems = 0;
        this.level = 1;
        this.score = 0;
        this.mode = 'classic';
        this.touchStart = null;
        this.enemyInterval = null;

        this.renderUI();
        this.generate();
        this.bindEvents();
        this.addBackButton();
    }

    renderUI() {
        this.container.innerHTML = `
            <div class="maze-wrapper" style="max-width:500px; margin:0 auto; padding:12px; color:#fff; font-family:sans-serif; text-align:center;" dir="ltr">
                
                <!-- شريط معلومات اللعبة -->
                <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.08); padding:8px 14px; border-radius:14px; margin-bottom:12px; border:1px solid rgba(255,255,255,0.15);" dir="rtl">
                    <div><span style="color:#cbd5e1; font-size:0.85rem;">المستوى:</span> <b id="mazeLevel" style="color:#4ade80; font-size:1rem;">1</b></div>
                    <div><span style="color:#cbd5e1; font-size:0.85rem;">💎 الجواهر:</span> <b id="mazeGems" style="color:#fbbf24; font-size:1rem;">0</b></div>
                    <div>
                        <button id="btnToggleMode" style="background:rgba(56,189,248,0.2); border:1px solid #38bdf8; color:#38bdf8; border-radius:8px; padding:4px 10px; font-size:0.75rem; cursor:pointer;">☀️ كلاسيكي</button>
                    </div>
                </div>

                <!-- حاوية المتاهة المضيئة والفاتحة -->
                <div id="mazeContainer" style="position:relative; display:inline-block; border-radius:16px; overflow:hidden; background:#0f172a; border:2px solid #38bdf8; padding:8px; box-shadow:0 10px 30px rgba(0,0,0,0.3);">
                    <div class="maze-grid" id="mazeGrid" style="display:grid; gap:2px; justify-content:center;"></div>
                </div>

                <!-- أزرار التحكم بجهات مضبوطة 100% -->
                <div class="maze-controls" style="margin-top:15px; display:flex; flex-direction:column; align-items:center; gap:8px;">
                    <button class="maze-btn" id="mazeUp" style="width:58px; height:45px; border-radius:12px; background:#1e293b; border:1px solid #475569; color:#fff; font-size:1.3rem; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.2);">⬆️</button>
                    <div style="display:flex; gap:12px;">
                        <button class="maze-btn" id="mazeLeft" style="width:58px; height:45px; border-radius:12px; background:#1e293b; border:1px solid #475569; color:#fff; font-size:1.3rem; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.2);">⬅️</button>
                        <button class="maze-btn" id="mazeDown" style="width:58px; height:45px; border-radius:12px; background:#1e293b; border:1px solid #475569; color:#fff; font-size:1.3rem; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.2);">⬇️</button>
                        <button class="maze-btn" id="mazeRight" style="width:58px; height:45px; border-radius:12px; background:#1e293b; border:1px solid #475569; color:#fff; font-size:1.3rem; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.2);">➡️</button>
                    </div>
                </div>
            </div>
        `;
    }

    generate() {
        const size = this.size;
        const grid = Array(size).fill().map(() => Array(size).fill(1));
        const stack = [{ x: 1, y: 1 }];
        grid[1][1] = 0;
        const dirs = [[0, -2], [2, 0], [0, 2], [-2, 0]];

        while (stack.length) {
            const cur = stack[stack.length - 1];
            const shuffled = dirs.sort(() => Math.random() - 0.5);
            let moved = false;
            for (let [dx, dy] of shuffled) {
                const nx = cur.x + dx, ny = cur.y + dy;
                if (nx > 0 && nx < size - 1 && ny > 0 && ny < size - 1 && grid[ny][nx] === 1) {
                    grid[ny][nx] = 0;
                    grid[cur.y + dy / 2][cur.x + dx / 2] = 0;
                    stack.push({ x: nx, y: ny });
                    moved = true;
                    break;
                }
            }
            if (!moved) stack.pop();
        }

        this.end = { x: size - 2, y: size - 2 };
        this.ensurePathToEnd(grid, this.end);

        this.maze = grid;
        this.player = { x: 1, y: 1 };
        this.visitedPath.clear();
        this.visitedPath.add('1,1');
        this.collectedGems = 0;

        this.gems = [];
        this.traps = [];
        this.placeItems();
        this.placeEnemy();

        this.renderGrid();

        const lvlElem = this.container.querySelector('#mazeLevel');
        const gemElem = this.container.querySelector('#mazeGems');
        if (lvlElem) lvlElem.textContent = this.level;
        if (gemElem) gemElem.textContent = '0';

        if (this.enemyInterval) clearInterval(this.enemyInterval);
        const speed = Math.max(180, 380 - this.level * 15);
        this.enemyInterval = setInterval(() => this.moveEnemy(), speed);
    }

    ensurePathToEnd(grid, end) {
        if (grid[end.y][end.x] === 0) return;

        const size = this.size;
        const visited = Array(size).fill().map(() => Array(size).fill(false));
        const queue = [{ x: end.x, y: end.y, path: [] }];
        visited[end.y][end.x] = true;
        const dirs = [[0, -1], [1, 0], [0, 1], [-1, 0]];

        while (queue.length) {
            const cur = queue.shift();
            for (let [dx, dy] of dirs) {
                const nx = cur.x + dx, ny = cur.y + dy;
                if (nx >= 0 && nx < size && ny >= 0 && ny < size && !visited[ny][nx]) {
                    visited[ny][nx] = true;
                    if (grid[ny][nx] === 0) {
                        const fullPath = [...cur.path, { x: nx, y: ny }];
                        for (let step of fullPath) {
                            grid[step.y][step.x] = 0;
                        }
                        return;
                    } else {
                        queue.push({ x: nx, y: ny, path: [...cur.path, { x: nx, y: ny }] });
                    }
                }
            }
        }
        grid[end.y][end.x] = 0;
        if (end.y > 0) grid[end.y - 1][end.x] = 0;
    }

    placeItems() {
        const openCells = [];
        for (let y = 1; y < this.size - 1; y++) {
            for (let x = 1; x < this.size - 1; x++) {
                if (this.maze[y][x] === 0 && !(x === 1 && y === 1) && !(x === this.end.x && y === this.end.y)) {
                    openCells.push({ x, y });
                }
            }
        }
        openCells.sort(() => Math.random() - 0.5);

        const numGems = Math.min(5, Math.floor(openCells.length / 8));
        for (let i = 0; i < numGems && openCells.length; i++) {
            this.gems.push(openCells.pop());
        }

        const numTraps = Math.min(4, Math.floor(openCells.length / 10));
        for (let i = 0; i < numTraps && openCells.length; i++) {
            this.traps.push(openCells.pop());
        }
    }

    placeEnemy() {
        const openCells = [];
        for (let y = Math.floor(this.size / 2); y < this.size - 1; y++) {
            for (let x = Math.floor(this.size / 2); x < this.size - 1; x++) {
                if (this.maze[y][x] === 0 && !(x === this.end.x && y === this.end.y)) {
                    openCells.push({ x, y });
                }
            }
        }
        if (openCells.length) {
            this.enemy = openCells[Math.floor(Math.random() * openCells.length)];
        } else {
            this.enemy = { x: this.size - 3, y: this.size - 3 };
        }
    }

    renderGrid() {
        const grid = this.container.querySelector('#mazeGrid');
        if (!grid) return;
        grid.innerHTML = '';
        grid.style.gridTemplateColumns = `repeat(${this.size}, minmax(18px, 24px))`;

        const visionRadius = 2;

        for (let y = 0; y < this.size; y++) {
            for (let x = 0; x < this.size; x++) {
                const cell = document.createElement('div');
                cell.style.aspectRatio = '1/1';
                cell.style.borderRadius = '4px';
                cell.style.display = 'flex';
                cell.style.alignItems = 'center';
                cell.style.justifyContent = 'center';
                cell.style.fontSize = '0.75rem';
                cell.style.transition = 'all 0.1s ease';

                const distToPlayer = Math.abs(x - this.player.x) + Math.abs(y - this.player.y);
                const isVisible = this.mode === 'classic' || distToPlayer <= visionRadius;

                if (!isVisible) {
                    cell.style.background = '#020617';
                } else if (this.maze[y][x] === 1) {
                    // 🧱 الجدار: أزرق كحلي أنيق وبارز
                    cell.style.background = '#1e293b';
                    cell.style.border = '1px solid #334155';
                    cell.style.borderRadius = '3px';
                } else {
                    // 🛣️ الممر: فاتح ونظيف جداً بتباين ممتاز
                    cell.style.background = this.visitedPath.has(`${x},${y}`) ? '#bae6fd' : '#f1f5f9';

                    if (x === this.player.x && y === this.player.y) {
                        cell.textContent = '🤠';
                        cell.style.background = '#38bdf8';
                        cell.style.boxShadow = '0 0 10px #0284c7';
                    } else if (x === this.enemy.x && y === this.enemy.y) {
                        cell.textContent = '👻';
                        cell.style.background = '#f87171';
                    } else if (x === this.end.x && y === this.end.y) {
                        cell.textContent = '🏆';
                        cell.style.background = '#fde047';
                    } else if (this.gems.some(g => g.x === x && g.y === y)) {
                        cell.textContent = '💎';
                    } else if (this.traps.some(t => t.x === x && t.y === y)) {
                        cell.textContent = '💀';
                    }
                }

                grid.appendChild(cell);
            }
        }
    }

    move(dx, dy) {
        const nx = this.player.x + dx, ny = this.player.y + dy;
        if (nx < 0 || nx >= this.size || ny < 0 || ny >= this.size || this.maze[ny][nx] === 1) return;

        this.player = { x: nx, y: ny };
        this.visitedPath.add(`${nx},${ny}`);

        const gemIndex = this.gems.findIndex(g => g.x === nx && g.y === ny);
        if (gemIndex !== -1) {
            this.gems.splice(gemIndex, 1);
            this.collectedGems++;
            if (typeof addXP === 'function') addXP(3);
            const gemElem = this.container.querySelector('#mazeGems');
            if (gemElem) gemElem.textContent = this.collectedGems;
        }

        const trapIndex = this.traps.findIndex(t => t.x === nx && t.y === ny);
        if (trapIndex !== -1) {
            this.traps.splice(trapIndex, 1);
            if (typeof addXP === 'function') addXP(-3);
            if (typeof showResult === 'function') showResult('💀 وقعت في فخ! (-3 XP)', false);
        }

        if (nx === this.enemy.x && ny === this.enemy.y) {
            this.handleGameOver('👻 أمسك بك الشبح!');
            return;
        }

        this.renderGrid();

        if (nx === this.end.x && ny === this.end.y) {
            const reward = 20 + this.collectedGems * 2;
            if (typeof addXP === 'function') addXP(reward);
            if (typeof showResult === 'function') showResult(`🏆 المستوى ${this.level} مكتمل! +${reward} XP`, true);
            if (typeof updateHighScore === 'function') updateHighScore('maze', this.level);
            this.level++;
            this.generate();
        }
    }

    moveEnemy() {
        if (!this.maze.length) return;
        const dx = Math.sign(this.player.x - this.enemy.x);
        const dy = Math.sign(this.player.y - this.enemy.y);
        const moves = [];
        if (dx !== 0) moves.push({ x: this.enemy.x + dx, y: this.enemy.y });
        if (dy !== 0) moves.push({ x: this.enemy.x, y: this.enemy.y + dy });

        const valid = moves.filter(m => m.x >= 0 && m.x < this.size && m.y >= 0 && m.y < this.size && this.maze[m.y][m.x] === 0);
        if (valid.length) this.enemy = valid[Math.floor(Math.random() * valid.length)];

        if (this.enemy.x === this.player.x && this.enemy.y === this.player.y) {
            this.handleGameOver('👻 أمسك بك الشبح!');
            return;
        }
        this.renderGrid();
    }

    handleGameOver(msg) {
        if (typeof showResult === 'function') showResult(msg, false);
        if (typeof addXP === 'function') addXP(-5);
        this.generate();
    }

    bindEvents() {
        // ✅ ربط الاتجاهات بدقة مطلقـة:
        // اليمين = زيادة X بمقدار +1
        // اليسار = إنقاص X بمقدار -1
        this.container.querySelector('#mazeUp')?.addEventListener('click', () => this.move(0, -1));
        this.container.querySelector('#mazeDown')?.addEventListener('click', () => this.move(0, 1));
        this.container.querySelector('#mazeLeft')?.addEventListener('click', () => this.move(-1, 0));
        this.container.querySelector('#mazeRight')?.addEventListener('click', () => this.move(1, 0));

        const btnMode = this.container.querySelector('#btnToggleMode');
        if (btnMode) {
            btnMode.addEventListener('click', () => {
                this.mode = this.mode === 'classic' ? 'dark' : 'classic';
                btnMode.textContent = this.mode === 'classic' ? '☀️ كلاسيكي' : '🌙 الظلام';
                btnMode.style.borderColor = this.mode === 'classic' ? '#38bdf8' : '#f43f5e';
                btnMode.style.color = this.mode === 'classic' ? '#38bdf8' : '#f43f5e';
                this.renderGrid();
            });
        }

        this.keyHandler = (e) => {
            if (e.key === 'ArrowUp') this.move(0, -1);
            else if (e.key === 'ArrowDown') this.move(0, 1);
            else if (e.key === 'ArrowLeft') this.move(-1, 0);
            else if (e.key === 'ArrowRight') this.move(1, 0);
        };
        document.addEventListener('keydown', this.keyHandler);

        this.onTouchStart = (e) => {
            this.touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        };
        this.onTouchMove = (e) => e.preventDefault();
        this.onTouchEnd = (e) => {
            if (!this.touchStart) return;
            const dx = e.changedTouches[0].clientX - this.touchStart.x;
            const dy = e.changedTouches[0].clientY - this.touchStart.y;
            if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
            if (Math.abs(dx) > Math.abs(dy)) this.move(dx > 0 ? 1 : -1, 0);
            else this.move(0, dy > 0 ? 1 : -1);
            this.touchStart = null;
        };

        this.container.addEventListener('touchstart', this.onTouchStart);
        this.container.addEventListener('touchmove', this.onTouchMove, { passive: false });
        this.container.addEventListener('touchend', this.onTouchEnd);
    }

    destroy() {
        document.removeEventListener('keydown', this.keyHandler);
        if (this.container) {
            this.container.removeEventListener('touchstart', this.onTouchStart);
            this.container.removeEventListener('touchmove', this.onTouchMove);
            this.container.removeEventListener('touchend', this.onTouchEnd);
        }
        if (this.enemyInterval) {
            clearInterval(this.enemyInterval);
            this.enemyInterval = null;
        }
    }
}
