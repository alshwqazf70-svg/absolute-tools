    // 🎯 دالة حساب عدد الأعداء المطلوب قتالهم بناءً على رقم المرحلة
    getEnemiesForLevel(lvl) {
        return 50 + (lvl - 1) * 20;
    }

    getTheme() {
        return this.levelThemes[(this.level - 1) % this.levelThemes.length];
    }

    playSound(type) {
        try {
            if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (this.audioCtx.state === 'suspended') this.audioCtx.resume();

            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.connect(gain);
            gain.connect(this.audioCtx.destination);

            const now = this.audioCtx.currentTime;

            if (type === 'laser') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.08);
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.08);
                osc.start(now); osc.stop(now + 0.08);
            } else if (type === 'explosion') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(20, now + 0.25);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.25);
                osc.start(now); osc.stop(now + 0.25);
            } else if (type === 'powerup' || type === 'heal') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            }
        } catch (e) { }
    }

    initStars() {
        this.stars = [];
        this.nebulaDust = [];

        for (let i = 0; i < 90; i++) {
            this.stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 2.5 + 0.5
            });
        }

        for (let i = 0; i < 15; i++) {
            this.nebulaDust.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                radius: Math.random() * 60 + 30,
                speed: Math.random() * 0.8 + 0.2,
                alpha: Math.random() * 0.15 + 0.05
            });
        }
    }

    resizeCanvas() {
        const wrapper = this.canvas.parentNode;
        this.canvas.width = wrapper.clientWidth || window.innerWidth;
        this.canvas.height = wrapper.clientHeight || Math.max(window.innerHeight, 400);
        if (this.stars.length === 0) this.initStars();
    }

    start() {
        this.cleanup();

        this.overlay.innerHTML = `
            <h1 style="font-size:2.2rem; color:#00ffff; text-shadow:0 0 20px rgba(0,255,255,0.9); margin-bottom:8px;">🚀 غزو المجرة الأسطوري</h1>
            <p style="color:#a5b4fc; margin-bottom:20px; font-size:0.95rem;">عوالم وتحديات متغيرة! اهزم الأعداء والزعيم للعبور للمجرة التالية.</p>
            <button class="btn" id="spaceStart" style="width:180px; padding:12px; font-size:1.1rem; cursor:pointer; background:linear-gradient(45deg, #00ffff, #3b82f6); border:none; border-radius:10px; color:#fff; font-weight:bold; box-shadow:0 0 18px rgba(0,255,255,0.6);">انطلاق للقتال 🔥</button>
        `;
        this.container.querySelector('#spaceStart').onclick = () => this.start();

        this.overlay.classList.remove('active');
        this.running = true;

        this.lives = 3;
        this.level = 1;
        this.enemiesKilled = 0;
        this.enemiesPerLevel = this.getEnemiesForLevel(this.level); // ضبط قيمة الأعداء للبداية (50)
        this.bossSpawned = false;
        this.weaponLevel = 1;
        this.shieldActive = false;
        this.hasDrones = false;
        this.shakeTimer = 0;
        this.lastDashTime = 0;
        this.isDashing = false;
        this.isInvincible = false;

        this.enemies = [];
        this.bullets = [];
        this.enemyBullets = [];
        this.powerUps = [];
        this.particles = [];
        this.asteroids = [];

        this.spaceship.x = this.canvas.width / 2 - this.spaceship.w / 2;
        this.spaceship.y = this.canvas.height - 100;

        const preventKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'];

        this.keyDownHandler = (e) => { 
            if (preventKeys.includes(e.code) || preventKeys.includes(e.key)) {
                e.preventDefault();
            }
            this.keys[e.key] = true;
            
            if (e.code === 'Space') {
                this.triggerDash();
            }
        };

        this.keyUpHandler = (e) => { this.keys[e.key] = false; };
        this.blurHandler = () => { this.keys = {}; };

        window.addEventListener('blur', this.blurHandler);
        document.addEventListener('keydown', this.keyDownHandler);
        document.addEventListener('keyup', this.keyUpHandler);

        const handlePointer = (clientX, clientY, isTouch = false) => {
            const rect = this.canvas.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) return;
            
            const targetX = (clientX - rect.left) * (this.canvas.width / rect.width) - this.spaceship.w / 2;
            const offsetY = isTouch ? 35 : 0;
            const targetY = (clientY - rect.top) * (this.canvas.height / rect.height) - this.spaceship.h / 2 - offsetY;
            
            this.spaceship.x += (targetX - this.spaceship.x) * 0.35;
            this.spaceship.y += (targetY - this.spaceship.y) * 0.35;
        };

        this.mouseMoveHandler = (e) => handlePointer(e.clientX, e.clientY, false);
        
        this.touchStartHandler = (e) => {
            const now = Date.now();
            if (now - this.lastTouchTime < 280) {
                this.triggerDash();
            }
            this.lastTouchTime = now;
        };

        this.touchMoveHandler = (e) => {
            if (e.touches.length > 0) {
                if (e.cancelable) e.preventDefault();
                handlePointer(e.touches[0].clientX, e.touches[0].clientY, true);
            }
        };

        this.canvas.addEventListener('mousemove', this.mouseMoveHandler);
        this.canvas.addEventListener('touchstart', this.touchStartHandler, { passive: true });
        this.canvas.addEventListener('touchmove', this.touchMoveHandler, { passive: false });

        if (this.animationId) cancelAnimationFrame(this.animationId);
        this.loop();
    }

    triggerDash() {
        const now = Date.now();
        if (now - this.lastDashTime < this.dashCooldownTime) return;

        this.isDashing = true;
        this.isInvincible = true;
        this.lastDashTime = now;
        this.addExplosion(this.spaceship.x + this.spaceship.w / 2, this.spaceship.y + this.spaceship.h, '#00ffff', 12);
        
        const t1 = setTimeout(() => { 
            this.isDashing = false; 
            const t2 = setTimeout(() => { this.isInvincible = false; }, 200);
            this.timeouts.push(t2);
        }, 300);
        this.timeouts.push(t1);
    }

    triggerShake(amount = 10) {
        this.shakeTimer = amount;
    }

    spawnEnemy() {
        const shouldSpawnBoss = (this.enemiesKilled >= this.enemiesPerLevel) && !this.bossSpawned;
        const theme = this.getTheme();

        let type = 'normal';
        let w = 36, h = 36;
        let health = 1 + Math.floor(this.level * 0.4);
        let color = theme.primary;

        if (shouldSpawnBoss) {
            type = 'boss';
            w = 100; h = 85;
            health = 45 + (this.level * 25);
            color = theme.boss;
            this.bossSpawned = true;
            this.bossWarningTimer = 90;
            this.triggerShake(15);

            this.enemies.forEach(e => this.addExplosion(e.x + e.w / 2, e.y + e.h / 2, e.color, 8));
            this.enemies = [];
        } else if (this.bossSpawned) {
            return;
        } else {
            const rand = Math.random();
            if (rand < 0.22) {
                type = 'shooter'; color = '#f59e0b'; health = 2 + Math.floor(this.level * 0.3);
            } else if (rand < 0.42) {
                type = 'zigzag'; color = '#00ffff';
            } else if (rand < 0.60) {
                type = 'tank'; w = 48; h = 48; color = '#a855f7'; health = 4 + this.level;
            } else if (rand < 0.80 && this.level >= 2) {
                type = 'assassin'; w = 30; h = 38; color = '#ff0055'; health = 2;
            }
        }

        this.enemies.push({
            id: Math.random().toString(36).substr(2, 9),
            x: Math.random() * (this.canvas.width - w - 20) + 10,
            y: -h - 20,
            w, h,
            speed: type === 'boss' ? 0.8 : (1.8 + Math.random() * 0.8 + (this.level * 0.15)),
            health, maxHealth: health,
            isBoss: type === 'boss', isEnraged: false,
            type, color,
            shootTimer: Math.random() * 40,
            angle: 0
        });
    }

    spawnAsteroid() {
        if (Math.random() < 0.01 && this.asteroids.length < 2) {
            const size = Math.random() * 25 + 20;
            this.asteroids.push({
                x: Math.random() * (this.canvas.width - size),
                y: -size - 10,
                size,
                speed: Math.random() * 2 + 1.5,
                rot: Math.random() * Math.PI,
                rotSpeed: (Math.random() - 0.5) * 0.05,
                health: Math.floor(size / 8)
            });
        }
    }

    spawnPowerUp(x, y, isBoss = false) {
        const dropChance = isBoss ? 1.0 : 0.18; 

        if (Math.random() < dropChance) {
            let type = 'weapon';
            const rand = Math.random();
            const healthChance = this.lives < 3 ? 0.28 : 0.10;

            if (rand < healthChance) {
                type = 'health';
            } else if (rand < healthChance + 0.30) {
                type = 'shield';
            } else if (rand < healthChance + 0.55) {
                type = 'weapon';
            } else if (rand < healthChance + 0.75) {
                type = 'drone';
            } else {
                type = 'nuke';
            }

            const colors = { shield: '#00ff88', weapon: '#00ffff', nuke: '#ffaa00', drone: '#ff00ff', health: '#ff0055' };
            this.powerUps.push({ x, y, w: 20, h: 20, type, color: colors[type], dy: 1.8 });
        }
    }

    fire() {
        if (this.bulletTimer++ % 6 !== 0) return;
        const bSpeed = 14;
        this.playSound('laser');

        const bulletId = Date.now() + Math.random();

        if (this.weaponLevel >= 5) {
            this.bullets.push({ id: bulletId, x: this.spaceship.x + this.spaceship.w / 2 - 5, y: this.spaceship.y - 18, w: 10, h: 26, vx: 0, vy: -bSpeed * 1.2, color: '#00ffff', isLaser: true, hitEnemies: new Set() });
        } else if (this.weaponLevel === 4) {
            [-0.25, -0.12, 0, 0.12, 0.25].forEach(angle => {
                this.bullets.push({ x: this.spaceship.x + this.spaceship.w / 2 - 2, y: this.spaceship.y, w: 4, h: 15, vx: Math.sin(angle) * bSpeed, vy: -Math.cos(angle) * bSpeed, color: '#ff00ff' });
            });
        } else if (this.weaponLevel === 3) {
            const angle = 0.18;
            this.bullets.push({ x: this.spaceship.x + this.spaceship.w / 2 - 2, y: this.spaceship.y - 6, w: 4, h: 16, vx: 0, vy: -bSpeed, color: '#ffaa00' });
            this.bullets.push({ x: this.spaceship.x + 4, y: this.spaceship.y + 10, w: 4, h: 14, vx: -Math.sin(angle) * bSpeed, vy: -Math.cos(angle) * bSpeed, color: '#ffaa00' });
            this.bullets.push({ x: this.spaceship.x + this.spaceship.w - 8, y: this.spaceship.y + 10, w: 4, h: 14, vx: Math.sin(angle) * bSpeed, vy: -Math.cos(angle) * bSpeed, color: '#ffaa00' });
        } else if (this.weaponLevel === 2) {
            this.bullets.push({ x: this.spaceship.x + 8, y: this.spaceship.y, w: 4, h: 15, vx: 0, vy: -bSpeed, color: '#00ffff' });
            this.bullets.push({ x: this.spaceship.x + this.spaceship.w - 12, y: this.spaceship.y, w: 4, h: 15, vx: 0, vy: -bSpeed, color: '#00ffff' });
        } else {
            this.bullets.push({ x: this.spaceship.x + this.spaceship.w / 2 - 2, y: this.spaceship.y - 4, w: 4, h: 14, vx: 0, vy: -bSpeed, color: '#00ff88' });
        }

        if (this.hasDrones) {
            this.bullets.push({ x: this.spaceship.x - 22, y: this.spaceship.y + 10, w: 3, h: 12, vx: 0, vy: -bSpeed, color: '#ff00ff' });
            this.bullets.push({ x: this.spaceship.x + this.spaceship.w + 18, y: this.spaceship.y + 10, w: 3, h: 12, vx: 0, vy: -bSpeed, color: '#ff00ff' });
        }
    }

    addExplosion(x, y, color, count = 18) {
        this.playSound('explosion');
        if (this.particles.length > 150) this.particles.splice(0, count);

        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 4 + 1;
            this.particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                size: Math.random() * 3 + 2,
                color,
                life: 1.0,
                decay: Math.random() * 0.05 + 0.025
            });
        }
    }

    triggerNuke() {
        this.addExplosion(this.canvas.width / 2, this.canvas.height / 2, '#ffaa00', 50);
        this.triggerShake(20);
        for (let e of this.enemies) { 
            if (!e.isBoss) { 
                if (e.health > 0) {
                    e.health = 0; 
                    if (this.enemiesKilled < this.enemiesPerLevel) {
                        this.enemiesKilled++;
                    }
                }
            } else { 
                e.health -= 25; 
                e.shootTimer = -30;
            }
        }
        this.asteroids = [];
        this.enemyBullets = [];
    }

    loop() {
        if (!this.running) return;

        this.ctx.save();

        if (this.shakeTimer > 0) {
            this.ctx.translate((Math.random() - 0.5) * this.shakeTimer, (Math.random() - 0.5) * this.shakeTimer);
            this.shakeTimer--;
        }

        const theme = this.getTheme();
        this.ctx.fillStyle = theme.bg;
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        this.drawEnvironment(theme);

        if (this.keys['ArrowLeft']) this.spaceship.x -= this.spaceship.speed;
        if (this.keys['ArrowRight']) this.spaceship.x += this.spaceship.speed;
        if (this.keys['ArrowUp']) this.spaceship.y -= this.spaceship.speed;
        if (this.keys['ArrowDown']) this.spaceship.y += this.spaceship.speed;

        this.spaceship.x = Math.max(0, Math.min(this.canvas.width - this.spaceship.w, this.spaceship.x));
        this.spaceship.y = Math.max(0, Math.min(this.canvas.height - this.spaceship.h, this.spaceship.y));

        this.drawPlayerSpaceship();
        this.fire();

        for (let i = this.bullets.length - 1; i >= 0; i--) {
            let b = this.bullets[i];
            b.x += b.vx || 0; b.y += b.vy;
            this.ctx.fillStyle = b.color;
            this.ctx.shadowBlur = b.isLaser ? 15 : 8;
            this.ctx.shadowColor = b.color;
            this.ctx.fillRect(b.x, b.y, b.w, b.h);
            if (b.y < -20 || b.x < -10 || b.x > this.canvas.width + 10) this.bullets.splice(i, 1);
        }
        this.ctx.shadowBlur = 0;

        this.updateAsteroids();
        this.updateEnemies();
        this.updateEnemyBullets();
        this.updatePowerUps();
        this.updateParticles();

        this.spawnAsteroid();

        if (this.enemies.length < Math.min(3 + this.level, 7)) this.spawnEnemy();

        if (this.bossWarningTimer > 0) {
            this.drawBossWarning();
            this.bossWarningTimer--;
        }

        this.drawHUD();
        this.ctx.restore();

        this.animationId = requestAnimationFrame(() => this.loop());
    }

    drawEnvironment(theme) {
        this.nebulaDust.forEach(dust => {
            dust.y += dust.speed;
            if (dust.y > this.canvas.height + dust.radius) {
                dust.y = -dust.radius;
                dust.x = Math.random() * this.canvas.width;
            }
            const grad = this.ctx.createRadialGradient(dust.x, dust.y, 0, dust.x, dust.y, dust.radius);
            grad.addColorStop(0, theme.star);
            grad.addColorStop(1, 'transparent');
            this.ctx.globalAlpha = dust.alpha;
            this.ctx.fillStyle = grad;
            this.ctx.beginPath();
            this.ctx.arc(dust.x, dust.y, dust.radius, 0, Math.PI * 2);
            this.ctx.fill();
        });
        this.ctx.globalAlpha = 1.0;

        this.stars.forEach(star => {
            star.y += star.speed;
            if (star.y > this.canvas.height) { star.y = 0; star.x = Math.random() * this.canvas.width; }
            this.ctx.fillStyle = theme.star;
            this.ctx.fillRect(star.x, star.y, star.size, star.size);
        });
    }

    drawPlayerSpaceship() {
        const { x, y, w, h } = this.spaceship;

        if (this.hasDrones) {
            const t = Date.now() * 0.005;
            [ -22, w + 22 ].forEach((offset, idx) => {
                const droneX = x + offset;
                const droneY = y + Math.sin(t + idx * Math.PI) * 6 + 10;
                this.ctx.fillStyle = '#ff00ff';
                this.ctx.shadowBlur = 8; this.ctx.shadowColor = '#ff00ff';
                this.ctx.beginPath();
                this.ctx.arc(droneX, droneY, 5, 0, Math.PI * 2);
                this.ctx.fill();
            });
        }

        this.ctx.fillStyle = this.isDashing ? '#00ffff' : '#ff00ff';
        this.ctx.beginPath();
        this.ctx.moveTo(x + w * 0.35, y + h);
        this.ctx.lineTo(x + w * 0.5, y + h + (this.isDashing ? 25 : 12) + Math.random() * 6);
        this.ctx.lineTo(x + w * 0.65, y + h);
        this.ctx.fill();

        this.ctx.fillStyle = this.isDashing ? '#ffffff' : '#00ff88';
        this.ctx.shadowBlur = this.isDashing ? 25 : 12; 
        this.ctx.shadowColor = this.isDashing ? '#00ffff' : '#00ff88';
        this.ctx.beginPath();
        this.ctx.moveTo(x + w / 2, y);
        this.ctx.lineTo(x + w, y + h * 0.8);
        this.ctx.lineTo(x + w * 0.75, y + h);
        this.ctx.lineTo(x + w * 0.25, y + h);
        this.ctx.lineTo(x, y + h * 0.8);
        this.ctx.closePath();
        this.ctx.fill();

        if (this.shieldActive) {
            this.ctx.strokeStyle = '#00ffff';
            this.ctx.lineWidth = 2.5;
            this.ctx.shadowBlur = 15; this.ctx.shadowColor = '#00ffff';
            this.ctx.beginPath();
            this.ctx.arc(x + w / 2, y + h / 2, w * 0.8, 0, Math.PI * 2);
            this.ctx.stroke();
        }
        this.ctx.shadowBlur = 0;
    }

    updateAsteroids() {
        for (let i = this.asteroids.length - 1; i >= 0; i--) {
            let a = this.asteroids[i];
            a.y += a.speed;
            a.rot += a.rotSpeed;

            this.ctx.save();
            this.ctx.translate(a.x, a.y);
            this.ctx.rotate(a.rot);
            this.ctx.strokeStyle = '#64748b';
            this.ctx.lineWidth = 2;
            this.ctx.strokeRect(-a.size / 2, -a.size / 2, a.size, a.size);
            this.ctx.restore();

            for (let j = this.bullets.length - 1; j >= 0; j--) {
                let b = this.bullets[j];
                if (Math.hypot(b.x - a.x, b.y - a.y) < a.size) {
                    if (!b.isLaser) this.bullets.splice(j, 1);
                    a.health--;
                    if (a.health <= 0) {
                        this.addExplosion(a.x, a.y, '#94a3b8', 12);
                        this.asteroids.splice(i, 1);
                        break;
                    }
                }
            }

            if (!this.isDashing && !this.isInvincible && Math.hypot((this.spaceship.x + this.spaceship.w / 2) - a.x, (this.spaceship.y + this.spaceship.h / 2) - a.y) < a.size + 12) {
                if (this.shieldActive) this.shieldActive = false;
                else { this.lives--; this.triggerShake(12); }
                this.addExplosion(a.x, a.y, '#94a3b8', 15);
                this.asteroids.splice(i, 1);
                if (this.lives <= 0) { this.gameOver(); return; }
            }
        }
    }

    updateEnemies() {
        for (let i = this.enemies.length - 1; i >= 0; i--) {
            let e = this.enemies[i];

            if (e.isBoss && e.health <= e.maxHealth * 0.5 && !e.isEnraged) {
                e.isEnraged = true;
                e.color = '#ff0055';
                this.triggerShake(15);
            }

            if (e.type === 'zigzag') {
                e.x += Math.sin(e.y / 25) * 3;
            } else if (e.type === 'assassin') {
                e.y += e.speed * 1.5;
                e.x += (this.spaceship.x - e.x) * 0.02;
            } else if (e.type === 'boss') {
                e.angle += e.isEnraged ? 0.04 : 0.02;
                e.x += Math.cos(e.angle) * (e.isEnraged ? 3 : 2);
                if (e.y < 60) e.y += e.speed;
            } else {
                e.y += e.speed;
            }

            if (e.type !== 'boss' && e.y < 60) e.y += e.speed;

            e.shootTimer++;
            if (e.type === 'shooter' && e.shootTimer > 55) {
                this.enemyBullets.push({ x: e.x + e.w / 2, y: e.y + e.h, vx: 0, vy: 4.8, color: '#f59e0b', w: 5, h: 9 });
                e.shootTimer = 0;
            } else if (e.type === 'boss') {
                const interval = e.isEnraged ? 28 : 45;
                if (e.shootTimer > interval) {
                    this.enemyBullets.push({ x: e.x + 15, y: e.y + e.h, vx: -1.2, vy: 5, color: e.color, w: 6, h: 10 });
                    this.enemyBullets.push({ x: e.x + e.w - 15, y: e.y + e.h, vx: 1.2, vy: 5, color: e.color, w: 6, h: 10 });
                    if (e.isEnraged) {
                        this.enemyBullets.push({ x: e.x + e.w / 2, y: e.y + e.h, vx: 0, vy: 6, color: '#ffaa00', w: 7, h: 12 });
                    }
                    e.shootTimer = 0;
                }
            }

            this.drawEnemyShape(e);

            const marginX = e.w * 0.15;
            const marginY = e.h * 0.15;

            // اصطدام الرصاص بالعدو
            if (e.health > 0) {
                for (let j = this.bullets.length - 1; j >= 0; j--) {
                    let b = this.bullets[j];
                    
                    if (b.isLaser && b.hitEnemies && b.hitEnemies.has(e.id)) continue;

                    if (b.x < e.x + e.w - marginX && b.x + b.w > e.x + marginX && b.y < e.y + e.h - marginY && b.y + b.h > e.y + marginY) {
                        if (b.isLaser) {
                            b.hitEnemies.add(e.id);
                        } else {
                            this.bullets.splice(j, 1);
                        }

                        e.health--;
                        this.addExplosion(b.x, b.y, e.color, 4);

                        if (e.health <= 0) {
                            this.addExplosion(e.x + e.w / 2, e.y + e.h / 2, e.color, e.isBoss ? 50 : 15);
                            this.spawnPowerUp(e.x + e.w / 2, e.y + e.h / 2, e.isBoss);

                            if (e.isBoss) {
                                this.triggerShake(20);
                                this.level++;
                                this.enemiesKilled = 0;
                                // 🎯 إعادة احتساب الهدف الجديد للمرحلة التالية تلقائياً
                                this.enemiesPerLevel = this.getEnemiesForLevel(this.level); 
                                this.bossSpawned = false;
                                this.enemyBullets = [];
                            } else {
                                if (this.enemiesKilled < this.enemiesPerLevel) {
                                    this.enemiesKilled++;
                                }
                            }
                            break;
                        }
                    }
                }
            }

            // اصطدام العدو الحي بالسفينة
            if (e.health > 0 && !this.isDashing && !this.isInvincible && e.y + e.h >= this.spaceship.y && e.x < this.spaceship.x + this.spaceship.w && e.x + e.w > this.spaceship.x && e.y < this.spaceship.y + this.spaceship.h) {
                if (this.shieldActive) this.shieldActive = false;
                else { this.lives--; this.triggerShake(12); }
                
                this.addExplosion(e.x + e.w / 2, e.y + e.h / 2, e.color, 15);
                this.enemies.splice(i, 1);

                if (this.lives <= 0) { this.gameOver(); return; }
                continue;
            }

            if (e.health <= 0 || e.y > this.canvas.height + 60) this.enemies.splice(i, 1);
        }
    }

    drawEnemyShape(e) {
        this.ctx.fillStyle = e.color;
        this.ctx.shadowBlur = e.isBoss ? 22 : 10;
        this.ctx.shadowColor = e.color;

        const { x, y, w, h } = e;
        const levelVariant = (this.level - 1) % 3;

        if (e.isBoss) {
            this.ctx.beginPath();
            if (levelVariant === 0) {
                this.ctx.moveTo(x + w / 2, y + h);
                this.ctx.lineTo(x + w, y + h * 0.3);
                this.ctx.lineTo(x + w * 0.8, y);
                this.ctx.lineTo(x + w * 0.2, y);
                this.ctx.lineTo(x, y + h * 0.3);
            } else if (levelVariant === 1) {
                this.ctx.moveTo(x + w / 2, y + h);
                this.ctx.lineTo(x + w, y + h * 0.7);
                this.ctx.lineTo(x + w * 0.7, y + h * 0.4);
                this.ctx.lineTo(x + w * 0.85, y);
                this.ctx.lineTo(x + w * 0.15, y);
                this.ctx.lineTo(x + w * 0.3, y + h * 0.4);
                this.ctx.lineTo(x, y + h * 0.7);
            } else {
                this.ctx.moveTo(x + w * 0.5, y + h);
                this.ctx.lineTo(x + w, y + h * 0.65);
                this.ctx.lineTo(x + w, y + h * 0.2);
                this.ctx.lineTo(x + w * 0.5, y);
                this.ctx.lineTo(x, y + h * 0.2);
                this.ctx.lineTo(x, y + h * 0.65);
            }
            this.ctx.closePath();
            this.ctx.fill();

            // رسم شريط صحة الزعيم أعلى الشاشة
            const hpWidth = Math.max(0, (e.health / e.maxHealth) * (this.canvas.width - 80));
            this.ctx.fillStyle = 'rgba(255, 0, 85, 0.3)';
            this.ctx.fillRect(40, 12, this.canvas.width - 80, 6);
            this.ctx.fillStyle = e.isEnraged ? '#ff0055' : e.color;
            this.ctx.fillRect(40, 12, hpWidth, 6);
        } else {
            this.ctx.beginPath();
            if (levelVariant === 0) {
                this.ctx.moveTo(x + w / 2, y + h);
                this.ctx.lineTo(x + w, y);
                this.ctx.lineTo(x + w / 2, y + h * 0.25);
                this.ctx.lineTo(x, y);
            } else if (levelVariant === 1) {
                this.ctx.moveTo(x + w / 2, y + h);
                this.ctx.lineTo(x + w, y + h / 2);
                this.ctx.lineTo(x + w / 2, y);
                this.ctx.lineTo(x, y + h / 2);
            } else {
                this.ctx.moveTo(x + w * 0.3, y + h);
                this.ctx.lineTo(x + w * 0.7, y + h);
                this.ctx.lineTo(x + w, y + h * 0.4);
                this.ctx.lineTo(x + w / 2, y);
                this.ctx.lineTo(x, y + h * 0.4);
            }
            this.ctx.closePath();
            this.ctx.fill();
        }
        this.ctx.shadowBlur = 0;
    }

    updateEnemyBullets() {
        for (let i = this.enemyBullets.length - 1; i >= 0; i--) {
            let eb = this.enemyBullets[i];
            eb.x += eb.vx || 0; eb.y += eb.vy;
            this.ctx.fillStyle = eb.color;
            this.ctx.fillRect(eb.x, eb.y, eb.w, eb.h);

            if (!this.isDashing && !this.isInvincible && eb.y + eb.h >= this.spaceship.y && eb.x < this.spaceship.x + this.spaceship.w && eb.x + eb.w > this.spaceship.x && eb.y < this.spaceship.y + this.spaceship.h) {
                if (this.shieldActive) this.shieldActive = false;
                else { this.lives--; this.triggerShake(10); }
                this.enemyBullets.splice(i, 1);
                if (this.lives <= 0) { this.gameOver(); return; }
                continue;
            }
            if (eb.y > this.canvas.height + 20) this.enemyBullets.splice(i, 1);
        }
    }

    updatePowerUps() {
        for (let i = this.powerUps.length - 1; i >= 0; i--) {
            let p = this.powerUps[i];
            p.y += p.dy;

            this.ctx.fillStyle = p.color;
            this.ctx.shadowBlur = 10; this.ctx.shadowColor = p.color;

            if (p.type === 'health') {
                this.ctx.font = '15px sans-serif';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('❤️', p.x, p.y + 5);
            } else {
                this.ctx.beginPath();
                this.ctx.arc(p.x, p.y, p.w / 2, 0, Math.PI * 2);
                this.ctx.fill();
            }

            if (p.y + p.h >= this.spaceship.y && p.x < this.spaceship.x + this.spaceship.w && p.x + p.w > this.spaceship.x && p.y < this.spaceship.y + this.spaceship.h) {
                if (p.type === 'health') {
                    this.playSound('heal');
                    this.lives = Math.min(this.maxLives, this.lives + 1);
                } else {
                    this.playSound('powerup');
                    if (p.type === 'shield') this.shieldActive = true;
                    else if (p.type === 'weapon') this.weaponLevel = Math.min(5, this.weaponLevel + 1);
                    else if (p.type === 'nuke') this.triggerNuke();
                    else if (p.type === 'drone') this.hasDrones = true;
                }
                this.powerUps.splice(i, 1);
                continue;
            }
            if (p.y > this.canvas.height + 30) this.powerUps.splice(i, 1);
        }
        this.ctx.shadowBlur = 0;
    }

    updateParticles() {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            let p = this.particles[i];
            p.x += p.vx; p.y += p.vy; p.life -= p.decay;
            if (p.life <= 0) { this.particles.splice(i, 1); continue; }
            this.ctx.fillStyle = p.color;
            this.ctx.globalAlpha = p.life;
            this.ctx.beginPath();
            this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            this.ctx.fill();
        }
        this.ctx.globalAlpha = 1.0;
    }

    drawBossWarning() {
        if (Math.floor(this.bossWarningTimer / 10) % 2 === 0) {
            this.ctx.fillStyle = '#ff0055';
            this.ctx.font = 'bold 20px Cairo, sans-serif';
            this.ctx.textAlign = 'center';
            this.ctx.shadowBlur = 12; this.ctx.shadowColor = '#ff0055';
            this.ctx.fillText('⚠️ تحذير: زعيم المجرة قادم! ⚠️', this.canvas.width / 2, this.canvas.height / 2 - 40);
            this.ctx.shadowBlur = 0;
        }
    }

    drawHUD() {
        const theme = this.getTheme();
        this.ctx.fillStyle = '#ffffff';
        this.ctx.font = 'bold 12px Cairo, sans-serif';
        
        const topOffsetY = this.bossSpawned ? 32 : 25;

        this.ctx.textAlign = 'left';
        this.ctx.fillText(`🚀 Stage ${this.level}: ${theme.name}`, 15, topOffsetY);
        this.ctx.fillText(`🎯 الأعداء: ${Math.min(this.enemiesKilled, this.enemiesPerLevel)}/${this.enemiesPerLevel}`, 15, topOffsetY + 17);

        this.ctx.textAlign = 'right';
        this.ctx.fillText(`❤️ الأرواح: ${'❤️'.repeat(this.lives)}`, this.canvas.width - 15, topOffsetY);
        this.ctx.fillText(`⚡ سلاح: Lvl ${this.weaponLevel} ${this.hasDrones ? '+ 🛸' : ''}`, this.canvas.width - 15, topOffsetY + 17);
        
        const now = Date.now();
        const remainingCooldown = Math.max(0, Math.ceil((this.dashCooldownTime - (now - this.lastDashTime)) / 1000));
        const dashStatus = remainingCooldown === 0 ? 'جاهز (Space)' : `شحن: ${remainingCooldown}s`;

        this.ctx.fillStyle = remainingCooldown === 0 ? '#00ffff' : '#64748b';
        this.ctx.fillText(`⚡ اندفاع: ${dashStatus}`, this.canvas.width - 15, topOffsetY + 34);
    }

    gameOver() {
        this.running = false;
        if (this.animationId) cancelAnimationFrame(this.animationId);
        this.cleanup();

        this.overlay.classList.add('active');
        this.overlay.innerHTML = `
            <h2 style="color:#ff0055; font-size:2rem; text-shadow:0 0 12px rgba(255,0,85,0.6);">💥 تحطمت سفينتك!</h2>
            <p style="color:#fff; font-size:1.1rem; margin:10px 0;">وصلت للقتال في <strong style="color:#00ffff;">المرحلة ${this.level}</strong></p>
            <button class="btn" id="spaceRestart" style="width:160px; padding:10px; font-size:1.1rem; cursor:pointer; background:linear-gradient(45deg, #ff0055, #ffaa00); border:none; border-radius:10px; color:#fff; font-weight:bold;">إعادة المحاولة 🔄</button>
        `;
        this.container.querySelector('#spaceRestart').onclick = () => this.start();
    }

    cleanup() {
        if (this.keyDownHandler) document.removeEventListener('keydown', this.keyDownHandler);
        if (this.keyUpHandler) document.removeEventListener('keyup', this.keyUpHandler);
        if (this.blurHandler) window.removeEventListener('blur', this.blurHandler);
        if (this.mouseMoveHandler) this.canvas.removeEventListener('mousemove', this.mouseMoveHandler);
        if (this.touchStartHandler) this.canvas.removeEventListener('touchstart', this.touchStartHandler);
        if (this.touchMoveHandler) this.canvas.removeEventListener('touchmove', this.touchMoveHandler);
        
        this.timeouts.forEach(t => clearTimeout(t));
        this.timeouts = [];
        this.keys = {};
    }

    destroy() {
        this.running = false;
        if (this.animationId) cancelAnimationFrame(this.animationId);
        this.cleanup();
        window.removeEventListener('resize', this.resizeHandler);
        
        if (this.audioCtx && this.audioCtx.state !== 'closed') {
            this.audioCtx.close();
            this.audioCtx = null;
        }
    }
}

                    <p style="color:#9ca3af; margin-bottom:18px; font-size:0.95rem;">وجه الأفعى بإصبعك.. اضغط ⚡ للتسريع!</p>
                    <button class="btn" id="snakeStart" style="width:160px; padding:10px; font-size:1.1rem; cursor:pointer;">ابدأ المعركة 🔥</button>
                </div>
            </div>
        `;

        this.canvas = document.getElementById('snakeCanvas');
        this.ctx = this.canvas.getContext('2d', { alpha: false });
        this.overlay = document.getElementById('snakeOverlay');
        this.boostBtn = document.getElementById('boostBtn');
        this.rotateBtn = document.getElementById('rotateBtn');
        
        this.running = false;
        this.animationId = null;
        this.mouse = { x: 0, y: 0 };
        
        this.worldWidth = 4500;
        this.worldHeight = 4500;
        this.camera = { x: 0, y: 0 };
        
        this.player = null;
        this.aiSnakes = [];
        this.foods = [];
        this.particles = [];
        
        this.foodCount = 350;
        this.aiCount = 18;
        this.boosting = false;

        this.resizeHandler = () => this.resizeCanvas();
        this.orientationHandler = () => setTimeout(() => this.resizeCanvas(), 250);
        
        window.addEventListener('resize', this.resizeHandler);
        window.addEventListener('orientationchange', this.orientationHandler);

        this.boundMouseMove = (e) => this.handlePointerMove(e.clientX, e.clientY);
        this.boundTouchMove = (e) => {
            if (e.touches.length > 0) {
                this.handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        };

        this.container.querySelector('#snakeStart').onclick = () => this.start();
        this.rotateBtn.onclick = () => this.toggleOrientation();

        const startBoost = (e) => {
            if (e.cancelable) e.preventDefault();
            this.boosting = true;
            this.boostBtn.style.transform = 'scale(0.9)';
        };
        const stopBoost = (e) => {
            if (e.cancelable) e.preventDefault();
            this.boosting = false;
            this.boostBtn.style.transform = 'scale(1)';
        };

        this.boostBtn.addEventListener('pointerdown', startBoost);
        this.boostBtn.addEventListener('pointerup', stopBoost);
        this.boostBtn.addEventListener('pointerleave', stopBoost);
        this.boostBtn.addEventListener('touchstart', startBoost, { passive: false });
        this.boostBtn.addEventListener('touchend', stopBoost, { passive: false });

        this.resizeCanvas();
        this.addBackButton();
    }

    async toggleOrientation() {
        try {
            if (document.fullscreenElement) {
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
                await document.exitFullscreen();
            } else {
                const elem = this.container.querySelector('.snake-wrapper') || document.documentElement;
                if (elem.requestFullscreen) {
                    await elem.requestFullscreen();
                }
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape').catch(() => {});
                }
            }
        } catch (err) {
            console.log("Orientation lock not supported");
        }
        setTimeout(() => this.resizeCanvas(), 300);
    }

    resizeCanvas() {
        const wrapper = this.canvas.parentNode;
        this.canvas.width = wrapper.clientWidth;
        this.canvas.height = wrapper.clientHeight || Math.max(window.innerHeight, 300);
        
        if (this.player && !this.player.dead) {
            this.camera.x = this.player.head.x - this.canvas.width / 2;
            this.camera.y = this.player.head.y - this.canvas.height / 2;
        }
    }

    handlePointerMove(clientX, clientY) {
        const rect = this.canvas.getBoundingClientRect();
        this.mouse.x = clientX - rect.left;
        this.mouse.y = clientY - rect.top;
    }

    start() {
        this.overlay.classList.remove('active');
        this.boostBtn.style.display = 'block';
        this.running = true;
        this.particles = [];
        this.resizeCanvas();

        this.player = new Snake(
            this.worldWidth / 2,
            this.worldHeight / 2,
            '#00ff88',
            'أنت',
            true
        );

        this.camera.x = this.player.head.x - this.canvas.width / 2;
        this.camera.y = this.player.head.y - this.canvas.height / 2;

        const aiNames = ['🐍 كوبرا', '⚡ الصاعقة', '🐉 التنين', '👑 الملك', '🦖 المتمرد', '🐊 التمساح', '🦂 العقرب', '🔥 اللهب', '🌪️ الإعصار', '⚔️ الفارس', '🛡️ الدرع', '💎 الألماس', '👾 النيون', '💥 الانفجار', '🚀 الصاروخ', '👻 الطيف', '❄️ الجليد', '🦅 الصقر'];
        const aiColors = ['#ff0055', '#ffaa00', '#00ccff', '#ff00ff', '#ffff00', '#ff6600', '#00ffcc', '#ff3366', '#a855f7', '#3b82f6', '#ec4899', '#10b981', '#f59e0b', '#8b5cf6', '#06b6d4', '#f43f5e'];

        this.aiSnakes = [];
        for (let i = 0; i < this.aiCount; i++) {
            this.aiSnakes.push(new Snake(
                Math.random() * (this.worldWidth - 600) + 300,
                Math.random() * (this.worldHeight - 600) + 300,
                aiColors[i % aiColors.length],
                aiNames[i % aiNames.length],
                false
            ));
        }

        this.foods = [];
        for (let i = 0; i < this.foodCount; i++) {
            this.spawnFood();
        }

        this.mouse = { x: this.canvas.width / 2, y: this.canvas.height / 2 };
        this.canvas.addEventListener('mousemove', this.boundMouseMove);
        this.canvas.addEventListener('touchmove', this.boundTouchMove, { passive: true });

        if (this.animationId) cancelAnimationFrame(this.animationId);
        this.loop();
    }

    spawnFood(x = null, y = null, value = null, customColor = null) {
        const colors = ['#ff4444', '#ffaa00', '#00ff88', '#00ccff', '#ff00ff', '#ffff00'];
        this.foods.push({
            x: x !== null ? x : Math.random() * (this.worldWidth - 100) + 50,
            y: y !== null ? y : Math.random() * (this.worldHeight - 100) + 50,
            color: customColor || colors[Math.floor(Math.random() * colors.length)],
            value: value || (Math.random() < 0.1 ? 4 : 1),
            pulse: Math.random() * Math.PI * 2
        });
    }

    addExplosionParticles(x, y, color, count = 20) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 6 + 2;
            this.particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                color: color,
                life: 1.0,
                decay: Math.random() * 0.03 + 0.02,
                size: Math.random() * 4 + 2
            });
        }
    }

    loop() {
        if (!this.running) return;

        this.ctx.fillStyle = '#080812';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        const baseSpeed = 3.8;
        const boostSpeed = 7.5;

        if (this.player && !this.player.dead) {
            const worldMouseX = this.mouse.x + this.camera.x;
            const worldMouseY = this.mouse.y + this.camera.y;

            if (this.boosting && this.player.tailLength > 8) {
                this.player.speed = boostSpeed;
                this.player.tailLength -= 0.08;
                if (Math.random() < 0.3) {
                    const tail = this.player.trail[0];
                    if (tail) this.spawnFood(tail.x, tail.y, 1, this.player.color);
                }
            } else {
                this.player.speed = baseSpeed;
            }

            this.player.moveTowards(worldMouseX, worldMouseY);
            this.player.update(this.worldWidth, this.worldHeight);

            for (let i = this.foods.length - 1; i >= 0; i--) {
                if (this.player.eat(this.foods[i])) {
                    this.foods.splice(i, 1);
                    this.spawnFood();
                }
            }

            this.camera.x += (this.player.head.x - this.canvas.width / 2 - this.camera.x) * 0.08;
            this.camera.y += (this.player.head.y - this.canvas.height / 2 - this.camera.y) * 0.08;
        }

        for (let ai of this.aiSnakes) {
            if (ai.dead) continue;
            ai.speed = baseSpeed;

            let closestFood = null;
            let closestDist = 500;

            for (let f of this.foods) {
                const d = Math.hypot(ai.head.x - f.x, ai.head.y - f.y);
                if (d < closestDist) {
                    closestDist = d;
                    closestFood = f;
                }
            }

            if (closestFood) {
                ai.moveTowards(closestFood.x, closestFood.y);
            } else {
                if (!ai.wanderTarget || Math.random() < 0.015) {
                    ai.wanderTarget = {
                        x: Math.random() * (this.worldWidth - 200) + 100,
                        y: Math.random() * (this.worldHeight - 200) + 100
                    };
                }
                ai.moveTowards(ai.wanderTarget.x, ai.wanderTarget.y);
            }

            ai.update(this.worldWidth, this.worldHeight);

            for (let i = this.foods.length - 1; i >= 0; i--) {
                if (ai.eat(this.foods[i])) {
                    this.foods.splice(i, 1);
                    this.spawnFood();
                }
            }
        }

        if (this.player && !this.player.dead) {
            for (let ai of this.aiSnakes) {
                if (ai.dead) continue;

                if (this.checkCollision(this.player, ai)) {
                    this.killSnake(this.player);
                    break;
                }
                if (this.checkCollision(ai, this.player)) {
                    this.killSnake(ai);
                }
            }
        }

        for (let i = 0; i < this.aiSnakes.length; i++) {
            let ai1 = this.aiSnakes[i];
            if (ai1.dead) continue;

            for (let j = i + 1; j < this.aiSnakes.length; j++) {
                let ai2 = this.aiSnakes[j];
                if (ai2.dead) continue;

                if (this.checkCollision(ai1, ai2)) this.killSnake(ai1);
                if (this.checkCollision(ai2, ai1)) this.killSnake(ai2);
            }
        }

        // عند موت بوت، يُعاد إحياؤه مجدداً بطول أولي صغير ليعود إلى المرتبة الأخيرة تلقائياً!
        for (let ai of this.aiSnakes) {
            if (ai.dead) {
                ai.deathTimer = (ai.deathTimer || 0) + 1;
                if (ai.deathTimer > 120) {
                    ai.reset(
                        Math.random() * (this.worldWidth - 600) + 300,
                        Math.random() * (this.worldHeight - 600) + 300
                    );
                }
            }
        }

        this.drawGrid();
        this.drawWorldBoundaries();
        this.drawFoods();
        this.drawParticles();

        for (let ai of this.aiSnakes) ai.draw(this.ctx, this.camera);
        if (this.player) this.player.draw(this.ctx, this.camera);

        // رسم لوحة الترتيب/المتصدرين
        this.drawLeaderboard();

        if (this.player && this.player.dead) {
            this.gameOver();
            return;
        }

        this.animationId = requestAnimationFrame(() => this.loop());
    }

    killSnake(snake) {
        if (snake.dead) return;
        snake.dead = true;
        this.addExplosionParticles(snake.head.x, snake.head.y, snake.color, 35);

        for (let i = 0; i < snake.trail.length; i += 2) {
            const p = snake.trail[i];
            this.spawnFood(
                p.x + (Math.random() * 20 - 10),
                p.y + (Math.random() * 20 - 10),
                3,
                snake.color
            );
        }

        if (typeof SoundFX !== 'undefined' && SoundFX.explosion) {
            SoundFX.explosion();
        }
    }

    checkCollision(snake1, snake2) {
        const head = snake1.head;
        if (!head || !snake2.trail.length) return false;

        for (let i = 0; i < snake2.trail.length - 4; i += 2) {
            const p = snake2.trail[i];
            const distSq = (head.x - p.x) ** 2 + (head.y - p.y) ** 2;
            if (distSq < 144) {
                return true;
            }
        }
        return false;
    }

    drawGrid() {
        this.ctx.strokeStyle = '#121225';
        this.ctx.lineWidth = 1;
        const gridSize = 100;
        const startX = -((this.camera.x % gridSize) + gridSize) % gridSize;
        const startY = -((this.camera.y % gridSize) + gridSize) % gridSize;

        this.ctx.beginPath();
        for (let x = startX; x < this.canvas.width + gridSize; x += gridSize) {
            this.ctx.moveTo(x, 0);
            this.ctx.lineTo(x, this.canvas.height);
        }
        for (let y = startY; y < this.canvas.height + gridSize; y += gridSize) {
            this.ctx.moveTo(0, y);
            this.ctx.lineTo(0, this.canvas.height);
        }
        this.ctx.stroke();
    }

    drawWorldBoundaries() {
        this.ctx.strokeStyle = '#ff0055';
        this.ctx.lineWidth = 6;
        this.ctx.strokeRect(-this.camera.x, -this.camera.y, this.worldWidth, this.worldHeight);
    }

    drawFoods() {
        for (let f of this.foods) {
            const sx = f.x - this.camera.x;
            const sy = f.y - this.camera.y;

            if (sx < -20 || sx > this.canvas.width + 20 || sy < -20 || sy > this.canvas.height + 20) continue;

            f.pulse += 0.05;
            const radius = (f.value > 1 ? 6 : 3.5) + Math.sin(f.pulse) * 1.2;

            this.ctx.fillStyle = f.color;
            this.ctx.beginPath();
            this.ctx.arc(sx, sy, Math.max(1, radius), 0, Math.PI * 2);
            this.ctx.fill();
        }
    }

    drawParticles() {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            let p = this.particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= p.decay;

            if (p.life <= 0) {
                this.particles.splice(i, 1);
                continue;
            }

            const sx = p.x - this.camera.x;
            const sy = p.y - this.camera.y;
            this.ctx.fillStyle = p.color;
            this.ctx.globalAlpha = p.life;
            this.ctx.beginPath();
            this.ctx.arc(sx, sy, p.size, 0, Math.PI * 2);
            this.ctx.fill();
        }
        this.ctx.globalAlpha = 1.0;
    }

    // 👑 قائمة المتصدرين (تضم أفضل 5 أعداء + اللاعب بالخط الصغير الناعم)
    drawLeaderboard() {
        const allSnakes = [...this.aiSnakes];
        if (this.player) allSnakes.push(this.player);

        // الترتيب بحسب الطول من الأكبر للأصغر
        allSnakes.sort((a, b) => (b.dead ? -1 : Math.floor(b.tailLength)) - (a.dead ? -1 : Math.floor(a.tailLength)));

        const top5 = allSnakes.slice(0, 5);

        const lbW = 150;
        const lbH = 22 + top5.length * 16;
        const lbX = this.canvas.width - lbW - 12;
        const lbY = 12;

        // الخلفية والأطراف
        this.ctx.fillStyle = 'rgba(8, 8, 18, 0.8)';
        this.ctx.fillRect(lbX, lbY, lbW, lbH);
        this.ctx.strokeStyle = 'rgba(0, 255, 136, 0.25)';
        this.ctx.lineWidth = 1;
        this.ctx.strokeRect(lbX, lbY, lbW, lbH);

        // العنوان
        this.ctx.fillStyle = '#00ff88';
        this.ctx.font = 'bold 11px Cairo, sans-serif';
        this.ctx.textAlign = 'center';
        this.ctx.fillText('👑 أفضل المتصدرين', lbX + lbW / 2, lbY + 15);

        // رسم المراكز الـ 5 الأوائل بخط صغير ومنظم
        this.ctx.font = '10px Cairo, sans-serif';
        top5.forEach((snake, index) => {
            const yPos = lbY + 32 + index * 16;
            const score = snake.dead ? 0 : Math.floor(snake.tailLength);

            // إبراز اللاعب بتمييز خاص
            if (snake.isPlayer) {
                this.ctx.fillStyle = '#00ff88';
                this.ctx.font = 'bold 10px Cairo, sans-serif';
            } else {
                this.ctx.fillStyle = '#d1d5db';
                this.ctx.font = '10px Cairo, sans-serif';
            }

            // اسم الثعبان جهة اليمين، والنتيجة جهة اليسار
            this.ctx.textAlign = 'right';
            const displayName = `${index + 1}. ${snake.name.substring(0, 10)}`;
            this.ctx.fillText(displayName, lbX + lbW - 8, yPos);

            this.ctx.textAlign = 'left';
            this.ctx.fillText(`${score}`, lbX + 8, yPos);
        });
    }

    gameOver() {
        this.running = false;
        cancelAnimationFrame(this.animationId);
        this.boostBtn.style.display = 'none';

        this.canvas.removeEventListener('mousemove', this.boundMouseMove);
        this.canvas.removeEventListener('touchmove', this.boundTouchMove);

        const length = this.player ? Math.floor(this.player.tailLength) : 0;
        if (typeof updateHighScore === 'function') {
            updateHighScore('snake', length);
        }

        this.overlay.classList.add('active');
        this.overlay.innerHTML = `
            <h2 style="color:#ff3366; font-size:1.8rem; text-shadow:0 0 10px rgba(255,51,102,0.5);">💀 انتهت اللعبة!</h2>
            <p style="color:#fff; font-size:1.1rem; margin:12px 0;">طولك النهائي: <strong style="color:#00ff88;">${length}</strong></p>
            <button class="btn" id="snakeRestart" style="width:150px; padding:10px; font-size:1.1rem; cursor:pointer;">🐍 حاول مجدداً</button>
        `;
        this.container.querySelector('#snakeRestart').onclick = () => this.start();
    }

    destroy() {
        this.running = false;
        if (this.animationId) cancelAnimationFrame(this.animationId);

        this.boostBtn.style.display = 'none';
        this.canvas.removeEventListener('mousemove', this.boundMouseMove);
        this.canvas.removeEventListener('touchmove', this.boundTouchMove);

        window.removeEventListener('resize', this.resizeHandler);
        window.removeEventListener('orientationchange', this.orientationHandler);
    }
}

// ============================================================================
//   🐍 كائن الثعبان المنفرد (Snake)
// ============================================================================

class Snake {
    constructor(x, y, color, name, isPlayer) {
        this.color = color;
        this.name = name;
        this.isPlayer = isPlayer;
        this.trail = [];
        this.tailLength = isPlayer ? 18 : 10 + Math.floor(Math.random() * 12);
        this.head = { x, y };
        this.velocity = { x: 0, y: 0 };
        this.speed = 3.8;
        this.dead = false;
        this.deathTimer = 0;
        this.wanderTarget = null;

        for (let i = 0; i < this.tailLength; i++) {
            this.trail.push({ x: x, y: y + (i + 1) * 12 });
        }
    }

    moveTowards(tx, ty) {
        const dx = tx - this.head.x;
        const dy = ty - this.head.y;
        const dist = Math.hypot(dx, dy);

        if (dist < 2) return;

        this.velocity.x += (dx / dist) * 0.8;
        this.velocity.y += (dy / dist) * 0.8;
    }

    update(worldW, worldH) {
        const mag = Math.hypot(this.velocity.x, this.velocity.y);
        if (mag > this.speed) {
            this.velocity.x = (this.velocity.x / mag) * this.speed;
            this.velocity.y = (this.velocity.y / mag) * this.speed;
        }

        this.head.x += this.velocity.x;
        this.head.y += this.velocity.y;

        if (this.head.x < 10) this.head.x = 10;
        if (this.head.x > worldW - 10) this.head.x = worldW - 10;
        if (this.head.y < 10) this.head.y = 10;
        if (this.head.y > worldH - 10) this.head.y = worldH - 10;

        this.trail.push({ x: this.head.x, y: this.head.y });

        while (this.trail.length > Math.floor(this.tailLength)) {
            this.trail.shift();
        }
    }

    eat(food) {
        const distSq = (this.head.x - food.x) ** 2 + (this.head.y - food.y) ** 2;
        if (distSq < 324) {
            this.tailLength += food.value;
            return true;
        }
        return false;
    }

    reset(x, y) {
        this.head = { x, y };
        this.trail = [];
        this.tailLength = 10 + Math.floor(Math.random() * 10);
        this.velocity = { x: 0, y: 0 };
        this.dead = false;
        this.deathTimer = 0;
        this.wanderTarget = null;

        for (let i = 0; i < this.tailLength; i++) {
            this.trail.push({ x: x, y: y + (i + 1) * 12 });
        }
    }

    draw(ctx, camera) {
        if (this.dead) return;

        const cx = camera.x;
        const cy = camera.y;

        for (let i = 0; i < this.trail.length; i++) {
            const p = this.trail[i];
            const sx = p.x - cx;
            const sy = p.y - cy;

            if (sx < -40 || sx > ctx.canvas.width + 40 || sy < -40 || sy > ctx.canvas.height + 40) continue;

            const radius = i === this.trail.length - 1 ? 9 : Math.min(8, 3.5 + (i / this.trail.length) * 4.5);

            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(sx, sy, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        const head = this.trail[this.trail.length - 1];
        if (head) {
            const hx = head.x - cx;
            const hy = head.y - cy;

            if (hx >= -50 && hx <= ctx.canvas.width + 50 && hy >= -50 && hy <= ctx.canvas.height + 50) {
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(hx, hy, 10, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(hx - 3.5, hy - 2.5, 2.3, 0, Math.PI * 2);
                ctx.arc(hx + 3.5, hy - 2.5, 2.3, 0, Math.PI * 2);
                ctx.fill();

                if (this.name) {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 11px Cairo, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(this.name, hx, hy - 15);
                }
            }
        }
    }
}


        // ========== 7. 2048 العقلية ==========
        class Game2048 extends BaseGame {
            constructor(container) {
                super(container); this.size = 4; this.grid = [];
                this.container.innerHTML = `
                    <p style="text-align:center; color:var(--text-muted);">ادمج الأرقام لتصل إلى 2048</p>
                    <div class="grid-2048" id="grid2048"></div>
                    <button class="btn" id="restart2048">🔄 لعبة جديدة</button>
                `;
                this.container.querySelector('#restart2048').onclick = () => this.init();
                this.keyHandler = (e) => {
                    if (gameManager.currentPanelId !== 'game2048') return;
                    if (e.key === 'ArrowUp') { this.move('up'); e.preventDefault(); } else if (e.key === 'ArrowDown') { this.move('down'); e.preventDefault(); } else if (e.key === 'ArrowLeft') { this.move('left'); e.preventDefault(); } else if (e.key === 'ArrowRight') { this.move('right'); e.preventDefault(); }
                };
                document.addEventListener('keydown', this.keyHandler); this.init(); this.addBackButton();
                let startX = 0, startY = 0;
                this.container.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; });
                this.container.addEventListener('touchmove', (e) => e.preventDefault());
                this.container.addEventListener('touchend', (e) => {
                    const dx = e.changedTouches[0].clientX - startX;
                    const dy = e.changedTouches[0].clientY - startY;
                    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
                    if (Math.abs(dx) > Math.abs(dy)) { this.move(dx > 0 ? 'right' : 'left'); }
                    else { this.move(dy > 0 ? 'down' : 'up'); }
                });
            }
            init() { this.grid = Array(this.size).fill().map(() => Array(this.size).fill(0)); this.addRandom(); this.addRandom(); this.draw(); }
            addRandom() { const empty = []; for (let r=0; r<this.size; r++) for (let c=0; c<this.size; c++) if (this.grid[r][c]===0) empty.push({r,c}); if (empty.length) { const {r,c} = empty[Math.floor(Math.random()*empty.length)]; this.grid[r][c] = Math.random() < 0.9 ? 2 : 4; } }
            move(dir) {
                const rotate = (grid, times) => { let g = grid.map(r=>[...r]); for (let t=0; t<times; t++) g = g[0].map((_,i)=> g.map(r=>r[i]).reverse()); return g; };
                const slide = (grid) => { for (let r=0; r<this.size; r++) { let row = grid[r].filter(v=>v); for (let i=0; i<row.length-1; i++) { if (row[i] === row[i+1]) { row[i]*=2; row.splice(i+1,1); row.push(0); } } while (row.length < this.size) row.push(0); grid[r] = row; } return grid; };
                let tempGrid = this.grid.map(r=>[...r]);
                if (dir === 'left') tempGrid = slide(tempGrid); else if (dir === 'right') tempGrid = rotate(slide(rotate(tempGrid,2)),2); else if (dir === 'up') tempGrid = rotate(slide(rotate(tempGrid,3)),1); else if (dir === 'down') tempGrid = rotate(slide(rotate(tempGrid,1)),3);
                if (JSON.stringify(tempGrid) !== JSON.stringify(this.grid)) { this.grid = tempGrid; this.addRandom(); }
                this.draw();
                if (this.grid.flat().includes(2048)) { addXP(30); showResult('🏆 وصلت إلى 2048! +30 XP', true); updateHighScore('2048', Math.max(...this.grid.flat()), 'max'); }
                if (!this.canMove()) showResult('😞 لا توجد تحركات متاحة', false);
            }
            canMove() { for (let r=0; r<this.size; r++) for (let c=0; c<this.size; c++) { if (this.grid[r][c]===0) return true; if (c<this.size-1 && this.grid[r][c]===this.grid[r][c+1]) return true; if (r<this.size-1 && this.grid[r][c]===this.grid[r+1][c]) return true; } return false; }
            draw() { const container = document.getElementById('grid2048'); container.innerHTML = ''; this.grid.flat().forEach(val => { const tile = document.createElement('div'); tile.className = 'tile-2048'; tile.textContent = val || ''; tile.style.background = val ? this.getColor(val) : '#1c2532'; container.appendChild(tile); }); }
            getColor(v) { const colors = { 2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e' }; return colors[v] || '#3c3a32'; }
            destroy() { document.removeEventListener('keydown', this.keyHandler); }
        }

        // ========== 8. تحدي سرعة الكتابة ==========
        class TypingGame extends BaseGame {
            constructor(container) {
                super(container);
                this.words = ['سرعة','كتابة','لوحة','مفاتيح','حرب','نجم','قمر','شمس','مطر','صقر','بحر','جبل','نار','هواء','تراب','حياة'];
                this.currentWord = ''; this.score = 0; this.timeLeft = 30; this.timer = null;
                this.container.innerHTML = `
                    <p style="text-align:center; font-size:1.2rem;">الوقت: <span id="typingTime">30</span> | النقاط: <span id="typingScore">0</span></p>
                    <div style="background:var(--bg-input); padding:20px; border-radius:16px; text-align:center; font-size:2rem; margin:15px 0;" id="wordDisplay">---</div>
                    <input type="text" id="typingInput" placeholder="اكتب الكلمة هنا..." style="width:100%; padding:14px; border-radius:14px; background:var(--bg-input); border:1px solid var(--border); color:#fff; font-size:1.2rem;">
                    <button class="btn" id="typingStart">⏳ ابدأ التحدي</button>
                `;
                this.container.querySelector('#typingStart').onclick = () => this.start();
                this.addBackButton();
            }
            start() {
                clearInterval(this.timer); this.score = 0; this.timeLeft = 30; this.updateUI(); this.nextWord();
                this.timer = setInterval(() => { this.timeLeft--; document.getElementById('typingTime').textContent = this.timeLeft; if (this.timeLeft <= 0) { clearInterval(this.timer); updateHighScore('typing', this.score, 'max'); showResult(`⌨️ انتهى الوقت! النقاط: ${this.score}`, true); document.getElementById('typingInput').disabled = true; } }, 1000);
                document.getElementById('typingInput').disabled = false; setTimeout(() => document.getElementById('typingInput').focus(), 100);
                document.getElementById('typingInput').oninput = (e) => { if (e.target.value.trim() === this.currentWord) { this.score++; addXP(1); this.updateUI(); this.nextWord(); e.target.value = ''; } };
            }
            nextWord() { this.currentWord = this.words[Math.floor(Math.random() * this.words.length)]; document.getElementById('wordDisplay').textContent = this.currentWord; }
            updateUI() { document.getElementById('typingScore').textContent = this.score; document.getElementById('typingTime').textContent = this.timeLeft; }
            destroy() { clearInterval(this.timer); }
        }

        const Games = { detective: DetectiveGame, memory: MemoryGame, maze: MazeGame, space: SpaceGame, reaction: ReactionGame, snake: SnakeGame, game2048: Game2048, typing: TypingGame };
        document.getElementById('gameSelector').addEventListener('change', function() { gameManager.switchGame(this.value); });
        gameManager.switchGame('detective');
        refreshUI();

        // خلفية متحركة
        const bgCanvas = document.getElementById('bgCanvas'); const bgCtx = bgCanvas.getContext('2d');
        let particles = []; let bgW, bgH;
        function initParticles() {
            bgW = window.innerWidth; bgH = window.innerHeight;
            bgCanvas.width = bgW; bgCanvas.height = bgH;
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * bgW, y: Math.random() * bgH,
                    size: Math.random() * 2 + 1,
                    vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
                    color: `rgba(0,255,136,${Math.random() * 0.4})`
                });
            }
        }
        initParticles();
        window.addEventListener('resize', initParticles);
        function animateParticles() {
            bgCtx.clearRect(0, 0, bgW, bgH);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0) p.x = bgW;
                if (p.x > bgW) p.x = 0;
                if (p.y < 0) p.y = bgH;
                if (p.y > bgH) p.y = 0;
                bgCtx.beginPath(); bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                bgCtx.fillStyle = p.color; bgCtx.fill();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
    })();
    </script>
