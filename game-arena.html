<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CyberShield Ultimate Arcade | الأسطورة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --primary-glow: rgba(0, 255, 136, 0.5);
            --secondary: #00ccff;
            --danger: #ef4444;
            --bg-dark: #0a0d13;
            --bg-card: #131a24;
            --bg-input: #1c2532;
            --border: #2a3340;
            --text: #f0f4ff;
            --text-muted: #8899aa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }
        #bgCanvas {
            position: fixed; top:0; left:0; width:100%; height:100%;
            z-index: 0; pointer-events: none; opacity: 0.25;
        }
        .container { max-width: 960px; width: 100%; position: relative; z-index: 10; }
        .game-header {
            text-align: center; margin-bottom: 25px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 2.8rem; font-weight: 900; font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 40px var(--primary-glow);
        }
        .xp-bar {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 20px 25px; margin-bottom: 30px;
            backdrop-filter: blur(15px); display: flex; flex-direction: column; gap: 12px;
        }
        .xp-info {
            display: flex; justify-content: space-between; align-items: center;
            font-weight: 700; font-size: 1.05rem; color: var(--primary);
        }
        .xp-track { background: #11161e; height: 8px; border-radius: 20px; overflow: hidden; }
        .xp-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.5s ease;
        }
        .game-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 32px; padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
        }
        .game-select {
            width: 100%; padding: 16px; border-radius: 16px;
            background: var(--bg-input); border: 1px solid var(--border);
            color: var(--text); font-size: 1.1rem; margin-bottom: 25px;
            font-family: 'Cairo', sans-serif; outline: none; cursor: pointer;
            transition: 0.3s;
        }
        .game-select:focus, .game-select:hover {
            border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow);
        }
        .panel { display: none; animation: fadeUp 0.4s ease; }
        .panel.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000; font-weight: 900; font-size: 1rem; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 25px var(--primary-glow); }
        .result-box {
            margin-top: 15px; padding: 14px; background: #0e1219;
            border-radius: 16px; border-right: 4px solid var(--primary);
            display: none; text-align: center; font-weight: 700;
        }
        .result-box.show { display: block; }
        .result-box.win { border-color: var(--primary); color: var(--primary); }
        .result-box.lose { border-color: var(--danger); color: var(--danger); }

        .canvas-wrapper {
            position: relative; width: 100%; background: #05080c;
            border-radius: 20px; border: 1px solid var(--border); overflow: hidden;
            aspect-ratio: 16/9; max-height: 600px;
        }
        .canvas-wrapper.space-wrapper { aspect-ratio: 4/3; max-height: 650px; }
        .canvas-wrapper canvas { width: 100%; height: 100%; display: block; }
        .game-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.75); opacity: 0; pointer-events: none;
            transition: opacity 0.4s;
        }
        .game-overlay.active { opacity: 1; pointer-events: auto; }

        .grid-4x4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 280px; margin: 10px auto; }
        .memory-card {
            aspect-ratio: 1; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: transparent; cursor: pointer; transition: 0.3s;
        }
        .memory-card.flipped, .memory-card.matched { color: #fff; background: #0b1018; border-color: var(--primary); }
        .memory-card.matched { background: #1a2634; }
        .memory-card.disabled { pointer-events: none; opacity: 0.5; }

        .maze-grid { display: grid; gap: 2px; justify-content: center; margin: 10px auto; }
        .maze-cell {
            width: 24px; height: 24px; background: #3a4a5a; border-radius: 4px;
            transition: 0.2s;
        }
        .maze-cell.wall { background: #0a0f14; border: 1px solid #000; }
        .maze-cell.player { background: var(--primary); box-shadow: 0 0 12px var(--primary); }
        .maze-cell.end { background: var(--danger); }
        .maze-controls { display: flex; justify-content: center; gap: 6px; margin-top: 12px; }
        .maze-btn {
            width: 48px; height: 48px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 14px; color: #fff; font-size: 1.2rem; cursor: pointer; transition: 0.3s;
        }
        .maze-btn:hover { border-color: var(--primary); background: #131a24; }

        .snake-controls { display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px; gap: 6px; justify-content: center; margin-top: 10px; }
        .snake-btn {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 14px; color: #fff; font-size: 1.5rem; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .snake-btn:hover { border-color: var(--primary); background: #131a24; }
        .snake-btn:active { background: var(--primary); color: #000; }

        .grid-2048 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 300px; margin: 15px auto; }
        .tile-2048 {
            aspect-ratio: 1; background: #1c2532; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 800; color: #fff;
        }

        @media (max-width: 600px) {
            .game-header { font-size: 2rem; }
            .game-card { padding: 18px; }
            .maze-cell { width: 20px; height: 20px; }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="container">
        <h1 class="game-header">🎮 ساحة الألعاب الأسطورية</h1>
        <div class="xp-bar">
            <div class="xp-info">
                <span>🛡️ <span id="rankDisplay">🔰 مبتدئ</span></span>
                <span>⭐ <span id="xpDisplay">0</span> XP</span>
                <span><i class="fas fa-trophy" style="color:#f59e0b;"></i> <span id="badgeDisplay"></span></span>
            </div>
            <div class="xp-track"><div class="xp-fill" id="xpFill"></div></div>
        </div>
        <div class="game-card">
            <select class="game-select" id="gameSelector">
                <option value="detective">🕵️ المحقق اللامحدود</option>
                <option value="memory">🧩 تحدّي الظلال (4×4)</option>
                <option value="maze">🌀 المتاهة الذكية</option>
                <option value="space">🚀 مدافع الفضاء</option>
                <option value="reaction">⚡ رد الفعل الخاطف</option>
                <option value="snake">🐍 الثعبان الأسطوري</option>
                <option value="game2048">🔢 2048 العقلية</option>
                <option value="typing">⌨️ تحدي سرعة الكتابة</option>
            </select>
            <div id="panel-detective" class="panel active"></div>
            <div id="panel-memory" class="panel"></div>
            <div id="panel-maze" class="panel"></div>
            <div id="panel-space" class="panel"></div>
            <div id="panel-reaction" class="panel"></div>
            <div id="panel-snake" class="panel"></div>
            <div id="panel-game2048" class="panel"></div>
            <div id="panel-typing" class="panel"></div>
            <div id="resultBox" class="result-box"><div id="resultText"></div></div>
        </div>
    </div>

    <script>
    (function() {
        const STORAGE_KEY = 'cybershield_xp_v3';
        const HIGHSCORES_KEY = 'cybershield_highscores_v3';
        let xp = 0;
        let highScores = {};

        try {
            const savedXP = localStorage.getItem(STORAGE_KEY);
            xp = savedXP ? Math.max(0, parseInt(savedXP, 10) || 0) : 0;
            const savedScores = localStorage.getItem(HIGHSCORES_KEY);
            highScores = savedScores ? JSON.parse(savedScores) : {};
            if (typeof highScores !== 'object') highScores = {};
        } catch (e) {
            xp = 0;
            highScores = {};
        }

        function saveXP() { localStorage.setItem(STORAGE_KEY, xp); }
        function saveHighScores() { localStorage.setItem(HIGHSCORES_KEY, JSON.stringify(highScores)); }

        function updateHighScore(game, score, mode = 'max') {
            if (!highScores[game] || (mode === 'max' ? score > highScores[game] : score < highScores[game])) {
                highScores[game] = score;
                saveHighScores();
            }
        }

        function addXP(amount) {
            xp = Math.max(0, xp + amount);
            saveXP();
            refreshUI();
        }

        function refreshUI() {
            document.getElementById('xpDisplay').textContent = xp;
            let pct = Math.min(100, (xp / 5000) * 100);
            document.getElementById('xpFill').style.width = pct + '%';
            let rank, badge;
            if (xp >= 5000) { rank = '👑 الأسطورة المطلقة'; badge = '🏆 أسطورة'; }
            else if (xp >= 2500) { rank = '⚡ سيد السايبر'; badge = '💎 ماستر'; }
            else if (xp >= 1000) { rank = '🔮 خبير الشفرات'; badge = '🥇 ذهبي'; }
            else if (xp >= 250) { rank = '⚔️ محقق نخبوي'; badge = '🥈 فضي'; }
            else { rank = '🔰 مبتدئ'; badge = '🥉 برونزي'; }
            document.getElementById('rankDisplay').textContent = rank;
            document.getElementById('badgeDisplay').textContent = badge;
        }

        function showResult(msg, isWin) {
            const box = document.getElementById('resultBox');
            const text = document.getElementById('resultText');
            text.textContent = msg;
            box.className = 'result-box show ' + (isWin ? 'win' : 'lose');
            clearTimeout(box._timeout);
            box._timeout = setTimeout(() => box.classList.remove('show'), 2500);
        }

        const gameManager = {
            currentGame: null,
            currentPanelId: null,
            switchGame(gameName) {
                if (this.currentGame && typeof this.currentGame.destroy === 'function') {
                    this.currentGame.destroy();
                }
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                const panel = document.getElementById('panel-' + gameName);
                if (panel) panel.classList.add('active');
                if (Games[gameName]) {
                    this.currentGame = new Games[gameName](panel);
                    this.currentPanelId = gameName;
                }
            }
        };

        class BaseGame {
            constructor(container) { this.container = container; }
            destroy() {}
        }

        // ==================== المحقق اللامحدود – أسئلة متنوعة بلا تكرار ====================
        class DetectiveGame extends BaseGame {
            constructor(container) {
                super(container);
                this.questions = [
                    { q: 'ما هو الحيوان الذي ينام واقفاً؟', a: 'الحصان' },
                    { q: 'كم عدد ألوان قوس قزح؟', a: '7' },
                    { q: 'ما هو الكوكب الأحمر؟', a: 'المريخ' },
                    { q: 'ما هي عاصمة فرنسا؟', a: 'باريس' },
                    { q: 'كم عدد الأيام في الأسبوع؟', a: '7' },
                    { q: 'ما هو أكبر محيط في العالم؟', a: 'الهادئ' },
                    { q: 'ما هو المعدن السائل؟', a: 'الزئبق' },
                    { q: 'ما هو أسرع حيوان بري؟', a: 'الفهد' },
                    { q: 'ما هي عاصمة اليابان؟', a: 'طوكيو' },
                    { q: 'كم عدد قارات العالم؟', a: '7' },
                    { q: 'ما هو الكوكب الأقرب إلى الشمس؟', a: 'عطارد' },
                    { q: 'ما هو أكبر كائن حي على الأرض؟', a: 'الحوت الأزرق' },
                    { q: 'في أي عام اكتشف كولومبوس أمريكا؟', a: '1492' },
                    { q: 'ما هي لغة البرازيل الرسمية؟', a: 'البرتغالية' },
                    { q: 'ما هو العنصر الكيميائي الذي رمزه O؟', a: 'الأكسجين' },
                    { q: 'كم عدد عظام الإنسان البالغ؟', a: '206' },
                    { q: 'ما هي أصغر دولة في العالم؟', a: 'الفاتيكان' },
                    { q: 'ما هو البحر الذي يفصل بين أوروبا وأفريقيا؟', a: 'المتوسط' },
                    { q: 'ما هي عاصمة مصر القديمة؟', a: 'منف' },
                    { q: 'من هو مخترع المصباح الكهربائي؟', a: 'توماس إديسون' },
                    { q: 'ما هو الغاز الذي تتنفسه النباتات؟', a: 'ثاني أكسيد الكربون' },
                    { q: 'ما هي السورة التي تسمى قلب القرآن؟', a: 'يس' },
                    { q: 'ما هي أطول آية في القرآن؟', a: 'آية الدين' },
                    { q: 'كم عدد الأنبياء المذكورين في القرآن؟', a: '25' },
                    { q: 'من هو النبي الذي ابتلعه الحوت؟', a: 'يونس' },
                    { q: 'ما هو الحيوان الذي اتهم بجريمة لم يفعلها؟', a: 'ذئب يوسف' },
                    { q: 'كم مرة ذُكرت كلمة الله في القرآن؟', a: '2699' },
                    { q: 'ما هي السورة التي لا تبدأ بالبسملة؟', a: 'التوبة' },
                    { q: 'من هو الصحابي الذي لقب بالصديق؟', a: 'أبو بكر' },
                    { q: 'كم عدد أحزاب القرآن؟', a: '60' },
                    { q: 'ما هو الاسم الذي يطلق على بيت الدجاج؟', a: 'قن' },
                    { q: 'ما هو أذكى حيوان بحري؟', a: 'الدلفين' },
                    { q: 'ما هو الطائر الذي يلد ولا يبيض؟', a: 'الخفاش' }
                ];
                this.askedQuestions = []; // لتجنب التكرار
                this.render();
            }
            getRandomQuestion() {
                if (this.askedQuestions.length >= this.questions.length) {
                    this.askedQuestions = []; // نعيد الخلط بعد استنفاد الأسئلة
                }
                const available = this.questions.filter(q => !this.askedQuestions.includes(q.q));
                const randomQ = available[Math.floor(Math.random() * available.length)];
                this.askedQuestions.push(randomQ.q);
                return randomQ;
            }
            render() {
                this.current = this.getRandomQuestion();
                this.container.innerHTML = `
                    <div style="background:var(--bg-input); padding:16px; border-radius:16px; border-right:4px solid var(--secondary); margin-bottom:15px; line-height:1.8;">${this.current.q}</div>
                    <input type="text" id="detectiveAnswer" placeholder="اكتب إجابتك..." style="width:100%; padding:12px; border-radius:12px; background:var(--bg-input); border:1px solid var(--border); color:#fff; margin-bottom:10px;">
                    <button class="btn" id="detectiveBtn">🔍 تقديم الحل</button>
                `;
                this.container.querySelector('#detectiveBtn').onclick = () => this.check();
            }
            check() {
                const ans = this.container.querySelector('#detectiveAnswer').value.trim();
                if (ans === this.current.a) {
                    addXP(5); showResult('🎯 إجابة صحيحة! +5 XP', true);
                    this.render();
                } else {
                    addXP(-2); showResult('❌ خطأ! -2 XP', false);
                }
            }
        }

        // ==================== تحدّي الظلال 4×4 ====================
        class MemoryGame extends BaseGame {
            constructor(container) {
                super(container);
                this.icons = ['🔥','🛡️','💀','⚡','🔮','🗡️','👁️','🌙'];
                this.cards = [];
                this.queue = [];
                this.timer = null;
                this.timeLeft = 20;
                this.gameActive = false;
                this.container.innerHTML = `
                    <p style="text-align:center; color:var(--text-muted);">8 أزواج! الوقت: <span id="memTimer">20</span> ثانية</p>
                    <div class="grid-4x4" id="memGrid"></div>
                    <button class="btn" id="memRestart">🔄 بدء التحدي</button>
                `;
                this.container.querySelector('#memRestart').onclick = () => this.start();
                this.start();
            }
            start() {
                clearInterval(this.timer);
                this.timeLeft = 20;
                this.gameActive = true;
                document.getElementById('memTimer').textContent = this.timeLeft;
                const grid = document.getElementById('memGrid');
                grid.innerHTML = '';
                let deck = [...this.icons, ...this.icons].sort(() => Math.random() - 0.5);
                this.cards = [];
                deck.forEach((icon, i) => {
                    const card = document.createElement('div');
                    card.className = 'memory-card';
                    card.dataset.icon = icon;
                    card.onclick = () => this.flip(card);
                    grid.appendChild(card);
                    this.cards.push(card);
                });
                this.cards.forEach(c => { c.textContent = c.dataset.icon; c.style.color = '#fff'; });
                setTimeout(() => {
                    if (!this.gameActive) return;
                    this.cards.forEach(c => { if(!c.classList.contains('matched')){ c.textContent = ''; c.style.color = 'transparent'; } });
                    this.timer = setInterval(() => {
                        this.timeLeft--;
                        document.getElementById('memTimer').textContent = this.timeLeft;
                        if (this.timeLeft <= 0) {
                            clearInterval(this.timer);
                            this.gameActive = false;
                            this.cards.forEach(c => c.classList.add('disabled'));
                            showResult('⏰ انتهى الوقت! خسارة', false);
                            addXP(-3);
                        }
                    }, 1000);
                }, 3000);
                this.queue = [];
            }
            flip(card) {
                if (!this.gameActive) return;
                if (card.classList.contains('flipped') || card.classList.contains('matched') || this.queue.length >= 2) return;
                card.classList.add('flipped');
                card.textContent = card.dataset.icon;
                card.style.color = '#fff';
                this.queue.push(card);
                if (this.queue.length === 2) {
                    const [a, b] = this.queue;
                    if (a.dataset.icon === b.dataset.icon) {
                        a.classList.add('matched'); b.classList.add('matched');
                        addXP(5);
                        if (document.querySelectorAll('.memory-card:not(.matched)').length === 0) {
                            clearInterval(this.timer);
                            this.gameActive = false;
                            addXP(20);
                            showResult('🏆 فوز ساحق! +20 XP', true);
                        }
                    } else {
                        setTimeout(() => {
                            a.classList.remove('flipped'); b.classList.remove('flipped');
                            a.textContent = ''; b.textContent = '';
                            a.style.color = 'transparent'; b.style.color = 'transparent';
                        }, 600);
                    }
                    this.queue = [];
                }
            }
            destroy() { clearInterval(this.timer); this.gameActive = false; }
        }

        // ==================== المتاهة الذكية – ألوان محسنة ====================
        class MazeGame extends BaseGame {
            constructor(container) {
                super(container);
                this.size = 11;
                this.maze = [];
                this.player = { x: 0, y: 0 };
                this.end = { x: this.size - 1, y: this.size - 1 };
                this.container.innerHTML = `
                    <p style="text-align:center; color:var(--text-muted);">استخدم الأسهم أو الأزرار للوصول للهدف الأحمر</p>
                    <div class="maze-grid" id="mazeGrid"></div>
                    <div class="maze-controls">
                        <button class="maze-btn" id="mazeUp">⬆️</button>
                        <button class="maze-btn" id="mazeDown">⬇️</button>
                        <button class="maze-btn" id="mazeLeft">⬅️</button>
                        <button class="maze-btn" id="mazeRight">➡️</button>
                    </div>
                `;
                this.generate();
                this.bindControls();
                this.keyHandler = (e) => {
                    if (gameManager.currentPanelId !== 'maze') return;
                    if (e.key === 'ArrowUp') this.move(0, -1);
                    else if (e.key === 'ArrowDown') this.move(0, 1);
                    else if (e.key === 'ArrowLeft') this.move(-1, 0);
                    else if (e.key === 'ArrowRight') this.move(1, 0);
                };
                document.addEventListener('keydown', this.keyHandler);
            }
            generate() {
                const size = this.size;
                const grid = Array(size).fill().map(() => Array(size).fill(1));
                const stack = [];
                const start = { x: 0, y: 0 };
                grid[start.y][start.x] = 0;
                stack.push(start);
                const dirs = [[0, -2], [2, 0], [0, 2], [-2, 0]];
                while (stack.length) {
                    const cur = stack[stack.length - 1];
                    const shuffled = dirs.sort(() => Math.random() - 0.5);
                    let moved = false;
                    for (let [dx, dy] of shuffled) {
                        const nx = cur.x + dx, ny = cur.y + dy;
                        if (nx >= 0 && nx < size && ny >= 0 && ny < size && grid[ny][nx] === 1) {
                            grid[ny][nx] = 0;
                            grid[cur.y + dy / 2][cur.x + dx / 2] = 0;
                            stack.push({ x: nx, y: ny });
                            moved = true;
                            break;
                        }
                    }
                    if (!moved) stack.pop();
                }
                grid[this.end.y][this.end.x] = 0;
                this.maze = grid;
                this.player = { x: 0, y: 0 };
                this.renderGrid();
            }
            renderGrid() {
                const grid = document.getElementById('mazeGrid');
                grid.innerHTML = '';
                grid.style.gridTemplateColumns = `repeat(${this.size}, 1fr)`;
                for (let y = 0; y < this.size; y++) {
                    for (let x = 0; x < this.size; x++) {
                        const cell = document.createElement('div');
                        cell.className = 'maze-cell';
                        if (this.maze[y][x] === 1) cell.classList.add('wall');
                        if (x === this.player.x && y === this.player.y) cell.classList.add('player');
                        if (x === this.end.x && y === this.end.y) cell.classList.add('end');
                        grid.appendChild(cell);
                    }
                }
            }
            move(dx, dy) {
                const nx = this.player.x + dx, ny = this.player.y + dy;
                if (nx < 0 || nx >= this.size || ny < 0 || ny >= this.size || this.maze[ny][nx] === 1) return;
                this.player = { x: nx, y: ny };
                this.renderGrid();
                if (nx === this.end.x && ny === this.end.y) {
                    addXP(15); showResult('🏆 نجحت في الخروج! +15 XP', true);
                    updateHighScore('maze', 1);
                    setTimeout(() => this.generate(), 1500);
                }
            }
            bindControls() {
                document.getElementById('mazeUp').onclick = () => this.move(0, -1);
                document.getElementById('mazeDown').onclick = () => this.move(0, 1);
                document.getElementById('mazeLeft').onclick = () => this.move(-1, 0);
                document.getElementById('mazeRight').onclick = () => this.move(1, 0);
            }
            destroy() {
                document.removeEventListener('keydown', this.keyHandler);
            }
        }

            start() {
                this.cleanup();
                this.overlay.classList.remove('active');
                this.running = true;
                this.lives = 5; // زيادة الحياة قليلاً
                this.score = 0;
                // تصغير حجم السفينة
                this.spaceship = { x: this.canvas.width/2 - 15, y: this.canvas.height - 40, w: 30, h: 18, speed: 8 };
                this.enemies = [];
                this.bullets = [];
                for (let i=0; i<10; i++) this.spawnEnemy();
                this.keys = {};
                this.keyDownHandler = e => { this.keys[e.key] = true; };
                this.keyUpHandler = e => { this.keys[e.key] = false; };
                document.addEventListener('keydown', this.keyDownHandler);
                document.addEventListener('keyup', this.keyUpHandler);
                this.canvas.onmousemove = e => {
                    const rect = this.canvas.getBoundingClientRect();
                    const scaleX = this.canvas.width / rect.width;
                    this.spaceship.x = (e.clientX - rect.left) * scaleX - 15;
                };
                this.canvas.ontouchmove = e => {
                    e.preventDefault();
                    const rect = this.canvas.getBoundingClientRect();
                    const scaleX = this.canvas.width / rect.width;
                    this.spaceship.x = (e.touches[0].clientX - rect.left) * scaleX - 15;
                };
                this.fireInterval = setInterval(() => { if (this.running) this.fire(); }, 200);
                this.loop();
            }
            spawnEnemy() {
                // تصغير حجم العدو
                this.enemies.push({
                    x: Math.random() * (this.canvas.width - 30) + 15,
                    y: Math.random() * 60,
                    w: 20, h: 20,
                    speed: 1.5 + Math.random() * 2
                });
            }
            fire() {
                this.bullets.push({ x: this.spaceship.x + 15, y: this.spaceship.y - 10, w: 4, h: 15, speed: 12 });
            }
            loop() {
                if (!this.running) return;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                if (this.keys['ArrowLeft']) this.spaceship.x -= this.spaceship.speed;
                if (this.keys['ArrowRight']) this.spaceship.x += this.spaceship.speed;
                this.spaceship.x = Math.max(0, Math.min(this.canvas.width - this.spaceship.w, this.spaceship.x));
                
                // رسم السفينة (أصغر)
                this.ctx.fillStyle = '#00ff88';
                this.ctx.shadowBlur = 20; this.ctx.shadowColor = '#00ff88';
                this.ctx.fillRect(this.spaceship.x, this.spaceship.y, this.spaceship.w, this.spaceship.h);
                this.ctx.shadowBlur = 0;
                
                this.ctx.fillStyle = '#00ccff';
                for (let b of this.bullets) {
                    b.y -= b.speed;
                    this.ctx.fillRect(b.x, b.y, b.w, b.h);
                }
                this.bullets = this.bullets.filter(b => b.y > 0);
                
                this.ctx.fillStyle = '#ef4444';
                for (let e of this.enemies) {
                    e.y += e.speed;
                    if (e.y > this.canvas.height) {
                        this.lives--;
                        e.y = -20; e.x = Math.random() * (this.canvas.width - 30) + 15;
                        if (this.lives <= 0) { this.gameOver(); return; }
                    }
                    this.ctx.fillRect(e.x, e.y, e.w, e.h);
                }
                for (let e of this.enemies) {
                    for (let i = this.bullets.length-1; i >= 0; i--) {
                        const b = this.bullets[i];
                        if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                            this.bullets.splice(i,1);
                            e.y = -20; e.x = Math.random() * (this.canvas.width - 30) + 15;
                            this.score++;
                            addXP(2);
                        }
                    }
                }
                // عرض النقاط
                this.ctx.fillStyle = '#fff';
                this.ctx.font = 'bold 18px Cairo';
                this.ctx.fillText('⚡ ' + this.score, 15, 30);
                this.ctx.fillText('❤️ ' + this.lives, this.canvas.width - 100, 30);
                this.animationId = requestAnimationFrame(() => this.loop());
            }
            gameOver() {
                this.running = false;
                cancelAnimationFrame(this.animationId);
                clearInterval(this.fireInterval);
                this.cleanup();
                updateHighScore('space', this.score, 'max');
                this.overlay.classList.add('active');
                this.overlay.innerHTML = `<h2 style="color:#fff;">💥 انتهت المعركة</h2><p style="color:#9ca3af;">النقاط: ${this.score}</p><button class="btn" id="spaceRestart" style="width:150px;">تشغيل مرة أخرى</button>`;
                this.container.querySelector('#spaceRestart').onclick = () => this.start();
            }
            cleanup() {
                document.removeEventListener('keydown', this.keyDownHandler);
                document.removeEventListener('keyup', this.keyUpHandler);
                this.canvas.onmousemove = null;
                this.canvas.ontouchmove = null;
                clearInterval(this.fireInterval);
            }
            destroy() {
                this.running = false;
                cancelAnimationFrame(this.animationId);
                this.cleanup();
                window.removeEventListener('resize', this.resizeHandler);
            }
        }

                    else if (e.key === 'ArrowDown' && this.direction.y === 0) this.nextDirection = { x: 0, y: 1 };
                    else if (e.key === 'ArrowLeft' && this.direction.x === 0) this.nextDirection = { x: -1, y: 0 };
                    else if (e.key === 'ArrowRight' && this.direction.x === 0) this.nextDirection = { x: 1, y: 0 };
                };

                this.touchStart = null;
                this.canvas.ontouchstart = e => { this.touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; };
                this.canvas.ontouchend = e => {
                    if (!this.running || !this.touchStart) return;
                    const dx = e.changedTouches[0].clientX - this.touchStart.x;
                    const dy = e.changedTouches[0].clientY - this.touchStart.y;
                    if (Math.abs(dx) > Math.abs(dy)) {
                        if (dx > 0 && this.direction.x === 0) this.nextDirection = { x: 1, y: 0 };
                        else if (dx < 0 && this.direction.x === 0) this.nextDirection = { x: -1, y: 0 };
                    } else {
                        if (dy > 0 && this.direction.y === 0) this.nextDirection = { x: 0, y: 1 };
                        else if (dy < 0 && this.direction.y === 0) this.nextDirection = { x: 0, y: -1 };
                    }
                };

                const wrapper = this.canvas.parentNode;
                const size = Math.min(wrapper.clientWidth, 380);

                this.canvas.height = size;

            }

                this.overlay.classList.remove('active');
                this.running = true;
                this.snake = [{ x: 9, y: 9 }];
                this.direction = { x: 1, y: 0 };
                this.nextDirection = { x: 1, y: 0 };
                this.placeFood();
                clearInterval(this.interval);
                this.interval = setInterval(() => this.update(), 130); // سرعة أبطأ قليلاً للتحكم
            }
            placeFood() {
                this.food = {
                    x: Math.floor(Math.random() * this.tileCount),
                    y: Math.floor(Math.random() * this.tileCount)
                };
                if (this.snake.some(s => s.x === this.food.x && s.y === this.food.y)) this.placeFood();
            }
            update() {
                this.direction = this.nextDirection;
                const head = { x: this.snake[0].x + this.direction.x, y: this.snake[0].y + this.direction.y };
                if (head.x < 0 || head.x >= this.tileCount || head.y < 0 || head.y >= this.tileCount || this.snake.some(s => s.x === head.x && s.y === head.y)) {
                    this.gameOver();
                    return;
                }
                this.snake.unshift(head);
                if (head.x === this.food.x && head.y === this.food.y) {
                    addXP(2);
                    this.placeFood();
                } else {
                    this.snake.pop();
                }
                this.draw();

                    this.ctx.shadowColor = '#00ff88';
                    this.ctx.fillRect(s.x * this.gridSize, s.y * this.gridSize, this.gridSize-1, this.gridSize-1);
                });
                this.ctx.shadowBlur = 0;
                // عرض النقاط
                this.ctx.fillStyle = '#fff';
                this.ctx.font = 'bold 16px Cairo';
                this.ctx.fillText('🍎 ' + (this.snake.length - 1), 15, 30);
            }
            gameOver() {
                this.running = false;
                clearInterval(this.interval);
                updateHighScore('snake', this.snake.length, 'max');
                this.overlay.classList.add('active');
                this.overlay.innerHTML = `<h2>🐍 انتهت اللعبة</h2><p>الطول: ${this.snake.length - 1}</p><button class="btn" id="snakeRestart" style="width:150px;">تشغيل مرة أخرى</button>`;
                this.container.querySelector('#snakeRestart').onclick = () => this.start();
            }
            destroy() {
                this.running = false;
                clearInterval(this.interval);
                document.removeEventListener('keydown', this.keyHandler);
                window.removeEventListener('resize', this.resizeHandler);
                this.canvas.ontouchstart = null;
                this.canvas.ontouchend = null;
            }
        }

        // ==================== 2048 العقلية ====================
        class Game2048 extends BaseGame {
            constructor(container) {
                super(container);
                this.size = 4;
                this.grid = [];
                this.container.innerHTML = `
                    <p style="text-align:center; color:var(--text-muted);">ادمج الأرقام لتصل إلى 2048</p>
                    <div class="grid-2048" id="grid2048"></div>
                    <button class="btn" id="restart2048">🔄 لعبة جديدة</button>
                `;
                this.container.querySelector('#restart2048').onclick = () => this.init();
                this.keyHandler = (e) => {
                    if (gameManager.currentPanelId !== 'game2048') return;
                    if (e.key === 'ArrowUp') { this.move('up'); e.preventDefault(); }
                    else if (e.key === 'ArrowDown') { this.move('down'); e.preventDefault(); }
                    else if (e.key === 'ArrowLeft') { this.move('left'); e.preventDefault(); }
                    else if (e.key === 'ArrowRight') { this.move('right'); e.preventDefault(); }
                };
                document.addEventListener('keydown', this.keyHandler);
                this.touchStart = null;
                this.container.ontouchstart = e => { this.touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; };
                this.container.ontouchend = e => {
                    if (!this.touchStart) return;
                    const dx = e.changedTouches[0].clientX - this.touchStart.x;
                    const dy = e.changedTouches[0].clientY - this.touchStart.y;
                    if (Math.abs(dx) > Math.abs(dy)) { this.move(dx > 0 ? 'right' : 'left'); }
                    else { this.move(dy > 0 ? 'down' : 'up'); }
                };
                this.init();
            }
            init() {
                this.grid = Array(this.size).fill().map(() => Array(this.size).fill(0));
                this.addRandom(); this.addRandom();
                this.draw();
            }
            addRandom() {
                const empty = [];
                for (let r=0; r<this.size; r++) for (let c=0; c<this.size; c++) if (this.grid[r][c]===0) empty.push({r,c});
                if (empty.length) {
                    const {r,c} = empty[Math.floor(Math.random()*empty.length)];
                    this.grid[r][c] = Math.random() < 0.9 ? 2 : 4;
                }
            }
            move(dir) {
                const rotate = (grid, times) => {
                    let g = grid.map(r=>[...r]);
                    for (let t=0; t<times; t++) g = g[0].map((_,i)=> g.map(r=>r[i]).reverse());
                    return g;
                };
                const slide = (grid) => {
                    for (let r=0; r<this.size; r++) {
                        let row = grid[r].filter(v=>v);
                        for (let i=0; i<row.length-1; i++) {
                            if (row[i] === row[i+1]) { row[i]*=2; row.splice(i+1,1); row.push(0); }
                        }
                        while (row.length < this.size) row.push(0);
                        grid[r] = row;
                    }
                    return grid;
                };
                let tempGrid = this.grid.map(r=>[...r]);
                if (dir === 'left') tempGrid = slide(tempGrid);
                else if (dir === 'right') tempGrid = rotate(slide(rotate(tempGrid,2)),2);
                else if (dir === 'up') tempGrid = rotate(slide(rotate(tempGrid,3)),1);
                else if (dir === 'down') tempGrid = rotate(slide(rotate(tempGrid,1)),3);
                if (JSON.stringify(tempGrid) !== JSON.stringify(this.grid)) {
                    this.grid = tempGrid;
                    this.addRandom();
                }
                this.draw();
                if (this.grid.flat().includes(2048)) {
                    addXP(30); showResult('🏆 وصلت إلى 2048! +30 XP', true);
                    updateHighScore('2048', Math.max(...this.grid.flat()), 'max');
                }
                if (!this.canMove()) showResult('😞 لا توجد تحركات متاحة', false);
            }
            canMove() {
                for (let r=0; r<this.size; r++) for (let c=0; c<this.size; c++) {
                    if (this.grid[r][c]===0) return true;
                    if (c<this.size-1 && this.grid[r][c]===this.grid[r][c+1]) return true;
                    if (r<this.size-1 && this.grid[r][c]===this.grid[r+1][c]) return true;
                }
                return false;
            }
            draw() {
                const container = document.getElementById('grid2048');
                container.innerHTML = '';
                this.grid.flat().forEach(val => {
                    const tile = document.createElement('div');
                    tile.className = 'tile-2048';
                    tile.textContent = val || '';
                    tile.style.background = val ? this.getColor(val) : '#1c2532';
                    container.appendChild(tile);
                });
            }
            getColor(v) {
                const colors = { 2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e' };
                return colors[v] || '#3c3a32';
            }
            destroy() {
                document.removeEventListener('keydown', this.keyHandler);
                this.container.ontouchstart = null;
                this.container.ontouchend = null;
            }
        }

        // ==================== تحدي سرعة الكتابة ====================
        class TypingGame extends BaseGame {
            constructor(container) {
                super(container);
                this.words = ['سرعة','كتابة','لوحة','مفاتيح','حرب','نجم','قمر','شمس','مطر','صقر','بحر','جبل','نار','هواء','تراب','حياة'];
                this.currentWord = '';
                this.score = 0;
                this.timeLeft = 30;
                this.timer = null;
                this.container.innerHTML = `
                    <p style="text-align:center; font-size:1.2rem;">الوقت: <span id="typingTime">30</span> | النقاط: <span id="typingScore">0</span></p>
                    <div style="background:var(--bg-input); padding:20px; border-radius:16px; text-align:center; font-size:2rem; margin:15px 0;" id="wordDisplay">---</div>
                    <input type="text" id="typingInput" placeholder="اكتب الكلمة هنا..." style="width:100%; padding:14px; border-radius:14px; background:var(--bg-input); border:1px solid var(--border); color:#fff; font-size:1.2rem;">
                    <button class="btn" id="typingStart">⏳ ابدأ التحدي</button>
                `;
                this.container.querySelector('#typingStart').onclick = () => this.start();
            }
            start() {
                clearInterval(this.timer);
                this.score = 0;
                this.timeLeft = 30;
                this.updateUI();
                this.nextWord();
                this.timer = setInterval(() => {
                    this.timeLeft--;
                    document.getElementById('typingTime').textContent = this.timeLeft;
                    if (this.timeLeft <= 0) {
                        clearInterval(this.timer);
                        updateHighScore('typing', this.score, 'max');
                        showResult(`⌨️ انتهى الوقت! النقاط: ${this.score}`, true);
                        document.getElementById('typingInput').disabled = true;
                    }
                }, 1000);
                document.getElementById('typingInput').disabled = false;
                document.getElementById('typingInput').focus();
                document.getElementById('typingInput').oninput = (e) => {
                    if (e.target.value.trim() === this.currentWord) {
                        this.score++;
                        addXP(1);
                        this.updateUI();
                        this.nextWord();
                        e.target.value = '';
                    }
                };
            }
            nextWord() {
                this.currentWord = this.words[Math.floor(Math.random() * this.words.length)];
                document.getElementById('wordDisplay').textContent = this.currentWord;
            }
            updateUI() {
                document.getElementById('typingScore').textContent = this.score;
                document.getElementById('typingTime').textContent = this.timeLeft;
            }
            destroy() { clearInterval(this.timer); }
        }

        const Games = {
            detective: DetectiveGame,
            memory: MemoryGame,
            maze: MazeGame,
            space: SpaceGame,
            reaction: ReactionGame,
            snake: SnakeGame,
            game2048: Game2048,
            typing: TypingGame
        };

        document.getElementById('gameSelector').addEventListener('change', function() {
            gameManager.switchGame(this.value);
        });

        gameManager.switchGame('detective');
        refreshUI();

        const bgCanvas = document.getElementById('bgCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        let particles = [];
        function resizeBg() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = document.body.scrollHeight;
        }
        window.addEventListener('resize', resizeBg);
        resizeBg();
        for (let i=0; i<120; i++) {
            particles.push({
                x: Math.random()*bgCanvas.width, y: Math.random()*bgCanvas.height,
                size: Math.random()*2+1, vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
                color: `rgba(0,255,136,${Math.random()*0.4})`
            });
        }
        function animateParticles() {
            bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x<0||p.x>bgCanvas.width) p.vx*=-1;
                if (p.y<0||p.y>bgCanvas.height) p.vy*=-1;
                bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
                bgCtx.fillStyle=p.color; bgCtx.fill();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
    })();
    </script>
</body>
</html>
