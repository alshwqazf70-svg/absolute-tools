<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد أفكار المشاريع | النسخة الريادية ✦</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #ffb700;
            --primary-glow: rgba(255, 183, 0, 0.5);
            --secondary: #ff6b35;
            --bg-dark: #1a1408;
            --bg-card: #221c0e;
            --bg-input: #2d2412;
            --border-color: #4a3a1a;
            --text-light: #fce4b8;
            --text-muted: #c0a870;
            --card-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        body.light-mode {
            --bg-dark: #fffdf5;
            --bg-card: #ffffff;
            --bg-input: #fdf3d0;
            --border-color: #e8d598;
            --text-light: #3a2a08;
            --text-muted: #6b5420;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.2s; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 0%, var(--primary-glow) 0%, transparent 40%);
        }
        .container {
            max-width: 850px;
            width: 100%;
            background: var(--bg-card);
            padding: 40px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: "💡🚀📈";
            position: absolute;
            bottom: -20px;
            left: -20px;
            font-size: 5rem;
            opacity: 0.05;
            z-index: 0;
        }
        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            font-size: 1.3rem;
            padding: 8px 12px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 10;
        }
        .container > * { position: relative; z-index: 1; }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .sub { color: var(--text-muted); margin-bottom: 25px; }

        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        select, input {
            padding: 14px;
            border-radius: 18px;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            color: var(--text-light);
            font-size: 1rem;
            outline: none;
            font-family: 'Cairo';
        }
        select { min-width: 180px; cursor: pointer; }
        input { flex: 1; min-width: 200px; }
        select:focus, input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }
        .btn-generate {
            padding: 14px 30px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-generate:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--primary-glow); }

        .loader {
            display: none;
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .output-box {
            margin-top: 25px;
            padding: 30px;
            background: var(--bg-dark);
            border-radius: 25px;
            border-right: 6px solid var(--primary);
            text-align: right;
            line-height: 2;
            font-size: 1.05rem;
            display: none;
            animation: fadeUp 0.6s ease;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        .output-box.show { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .highlight { color: var(--primary); font-weight: 700; font-size: 1.2rem; }
        .highlight2 { color: var(--secondary); font-weight: 700; }

        .action-buttons {
            display: none;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-action {
            padding: 12px 20px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-light);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
        }
        .btn-action:hover { background: var(--primary); color: #000; border-color: var(--primary); }

        .counter { margin-top: 15px; color: var(--text-muted); font-size: 0.9rem; }

        .saved-ideas {
            margin-top: 30px;
            text-align: right;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            display: none;
        }
        .saved-ideas h3 { color: var(--primary); margin-bottom: 15px; text-align: center; }
        .idea-item {
            background: var(--bg-input);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            border-right: 3px solid var(--primary);
            font-size: 0.9rem;
            color: var(--text-muted);
            position: relative;
        }
        .delete-btn { position: absolute; top: 10px; left: 10px; color: red; cursor: pointer; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.5rem; }
            .input-group { flex-direction: column; }
            select, input { width: 100%; }
            .btn-generate { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع">🌓</button>
        <h1>🚀 مولد أفكار المشاريع</h1>
        <p class="sub">اختر المجال أو اكتب كلمة مفتاحية، لتظهر لك فكرة مشروع متكاملة بخطة عمل مصغرة!</p>

        <div class="input-group">
            <select id="industrySelect">
                <option value="tech">💻 التقنية والبرمجيات</option>
                <option value="edu">📚 التعليم والتدريب</option>
                <option value="health">🏥 الصحة واللياقة</option>
                <option value="food">🍔 الطعام والمطاعم</option>
                <option value="eco">🌱 البيئة والاستدامة</option>
                <option value="ecom">🛍️ التجارة الإلكترونية</option>
                <option value="art">🎨 الفن والإبداع</option>
                <option value="ai">🤖 الذكاء الاصطناعي</option>
                <option value="finance">💰 المالية والاستثمار</option>
                <option value="realestate">🏠 العقارات</option>
            </select>
            <input type="text" id="keywordInput" placeholder="أو اكتب كلمة: قهوة، سيارات... (اختياري)">
            <button class="btn-generate" onclick="generateIdea()">
                <i class="fas fa-lightbulb"></i> توليد فكرة
            </button>
        </div>

        <div class="loader" id="loader"></div>
        <div id="ideaOutput" class="output-box"></div>
        <div class="action-buttons" id="actionButtons">
            <button class="btn-action" onclick="copyIdea()"><i class="fas fa-copy"></i> نسخ</button>
            <button class="btn-action" onclick="saveIdea()"><i class="fas fa-save"></i> حفظ</button>
            <button class="btn-action" onclick="downloadImage()"><i class="fas fa-image"></i> صورة</button>
        </div>
        <div class="counter" id="ideaCounter">تم توليد 0 فكرة</div>
    </div>

    <div class="container saved-ideas" id="savedIdeasContainer">
        <h3>📚 مكتبة الأفكار المحفوظة</h3>
        <div id="savedIdeasList"></div>
    </div>

    <script>
        let ideaCount = 0;
        let ideaHistory = [];

        const prefixes = ['منصة', 'تطبيق', 'نظام', 'أداة', 'شبكة', 'مجتمع', 'سوق', 'مختبر', 'أكاديمية', 'حاضنة',
                          'مساعد', 'مولد', 'محلل', 'متجر', 'وجهة', 'مركز', 'مكتب', 'رابط', 'جسر', 'محرك',
                          'فضاء', 'عالم', 'دليل', 'بوابة', 'منارة', 'مصنع', 'استوديو', 'وكالة', 'سفير', 'مستشار'];
        const adjectives = ['ذكي', 'سريع', 'آمن', 'مبتكر', 'مخصص', 'مرن', 'شامل', 'مستدام', 'رقمي', 'تفاعلي',
                            'مفتوح', 'افتراضي', 'مدمج', 'لامركزي', 'مؤتمت', 'إبداعي', 'عصري', 'مستقبلي',
                            'أخضر', 'محلي', 'عالمي', 'سحابي', 'متنقل', 'صوتي', 'مرئي', 'لغوي', 'سلوكي', 'تنبؤي'];
        const bizModels = ['اشتراك شهري', 'عمولة على كل معاملة', 'إعلانات مستهدفة', 'Freemium (مجاني + مدفوع)', 'رسوم ثابتة لكل خدمة', 'بيع المنتجات مباشرة', 'نموذج السوق (Marketplace)', 'الترخيص (Licensing)'];
        const advantages = ['سهولة الاستخدام', 'سعر أقل من المنافسين', 'جودة عالية', 'سرعة في الأداء', 'دعم فني على مدار الساعة', 'تكامل مع منصات أخرى', 'تصميم احترافي', 'خوارزمية ذكية', 'تجربة مستخدم استثنائية', 'أمان وخصوصية تامة'];

        // موسوعة المجالات مع جمهور مخصص لكل مجال
        const industriesMap = {
            tech: {
                domains: ['البرمجة', 'تطوير التطبيقات', 'الأمن السيبراني', 'البلوك تشين', 'إنترنت الأشياء', 'الحوسبة السحابية', 'الواقع الافتراضي', 'البيانات الضخمة'],
                tag: 'تقنية',
                audiences: ['المبرمجين', 'الشركات الناشئة', 'المؤسسات التقنية', 'العاملين عن بعد', 'مدراء تقنية المعلومات', 'المطورين المستقلين']
            },
            edu: {
                domains: ['التعليم الإلكتروني', 'تطوير المناهج', 'الدروس الخصوصية', 'التدريب المهني', 'تعلم اللغات', 'الشهادات المهنية', 'المهارات الناعمة', 'التعليم الترفيهي'],
                tag: 'تعليم',
                audiences: ['الطلاب', 'المعلمين', 'المدارس', 'الجامعات', 'أولياء الأمور', 'المدربين', 'الباحثين عن عمل']
            },
            health: {
                domains: ['اللياقة البدنية', 'الصحة النفسية', 'التغذية العلاجية', 'الطب عن بعد', 'العناية بالبشرة', 'العلاج الطبيعي', 'الصحة الوقائية', 'إدارة المستشفيات'],
                tag: 'صحة',
                audiences: ['الأطباء', 'الرياضيين', 'أخصائيي التغذية', 'العيادات', 'المرضى', 'المهتمين بالصحة', 'كبار السن']
            },
            food: {
                domains: ['توصيل الطعام', 'الوجبات الصحية', 'المطاعم السحابية', 'الطهي المنزلي', 'الحلويات الشرقية', 'المخبوزات', 'العصائر الطبيعية', 'المأكولات العالمية'],
                tag: 'طعام',
                audiences: ['الطهاة', 'أصحاب المطاعم', 'محبي الطعام', 'العائلات', 'النباتيين', 'الأشخاص المشغولين']
            },
            eco: {
                domains: ['الطاقة المتجددة', 'إعادة التدوير', 'الزراعة العضوية', 'النقل الأخضر', 'المباني الذكية', 'تنقية المياه', 'التوعية البيئية', 'المواد المستدامة'],
                tag: 'بيئة',
                audiences: ['الناشطين البيئيين', 'المزارعين', 'المصانع', 'البلديات', 'المدارس', 'الأفراد المهتمين بالاستدامة']
            },
            ecom: {
                domains: ['البيع بالتجزئة', 'المنتجات اليدوية', 'العلامات التجارية', 'الدروب شيبنج', 'المنتجات الرقمية', 'الاشتراكات الشهرية', 'المزادات', 'الهدايا المخصصة'],
                tag: 'تجارة',
                audiences: ['البائعين', 'المتسوقين', 'الحرفيين', 'أصحاب العلامات التجارية', 'المسوقين', 'المستهلكين']
            },
            art: {
                domains: ['الفن الرقمي', 'الرسم والتصوير', 'الموسيقى والإنتاج', 'الخط العربي', 'النحت', 'التصميم الجرافيكي', 'الفنون المسرحية', 'الأفلام القصيرة'],
                tag: 'فن',
                audiences: ['الفنانين', 'المصممين', 'الموسيقيين', 'المنتجين', 'دور النشر', 'المبدعين', 'الجمهور العام']
            },
            ai: {
                domains: ['التعلم الآلي', 'معالجة اللغة', 'الرؤية الحاسوبية', 'الروبوتات', 'المساعدات الافتراضية', 'تحليل المشاعر', 'التوصيات الذكية', 'السيارات ذاتية القيادة'],
                tag: 'ذكاء اصطناعي',
                audiences: ['علماء البيانات', 'مهندسي الذكاء الاصطناعي', 'الشركات التقنية', 'الباحثين', 'مطوري البرمجيات', 'المستخدمين النهائيين']
            },
            finance: {
                domains: ['الاستثمار', 'الادخار', 'المدفوعات الرقمية', 'العملات الرقمية', 'التأمين', 'التمويل الجماعي', 'المحاسبة', 'التخطيط المالي'],
                tag: 'مالية',
                audiences: ['المستثمرين', 'المدخرين', 'أصحاب الأعمال', 'المحاسبين', 'الشباب', 'الأسر']
            },
            realestate: {
                domains: ['إدارة الأملاك', 'الوساطة العقارية', 'التمويل العقاري', 'التصميم الداخلي', 'المدن الذكية', 'المساحات المشتركة', 'المنازل الجاهزة', 'تقييم العقارات'],
                tag: 'عقارات',
                audiences: ['المستثمرين العقاريين', 'أصحاب المنازل', 'المقاولين', 'المصممين الداخليين', 'الباحثين عن سكن', 'المغتربين']
            }
        };

        function generateIdea() {
            const industry = document.getElementById('industrySelect').value;
            const keyword = document.getElementById('keywordInput').value.trim();
            const data = industriesMap[industry];

            document.getElementById('loader').style.display = 'block';
            document.getElementById('ideaOutput').classList.remove('show');
            document.getElementById('actionButtons').style.display = 'none';

            setTimeout(() => {
                let title, description, signature, attempt = 0;

                do {
                    const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
                    const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
                    const domain = data.domains[Math.floor(Math.random() * data.domains.length)];
                    // استخدام الجمهور المخصص للمجال
                    const target = data.audiences[Math.floor(Math.random() * data.audiences.length)];
                    const model = bizModels[Math.floor(Math.random() * bizModels.length)];
                    const adv = advantages[Math.floor(Math.random() * advantages.length)];

                    // دمج الكلمة المفتاحية في العنوان والوصف
                    const keywordTouch = keyword ? ` مستوحى من "${keyword}"` : '';
                    const keywordInDomain = keyword ? `${domain} المرتبط بـ ${keyword}` : domain;
                    
                    title = `${prefix} ${adj} لـ ${keywordInDomain}${keywordTouch}`;

                    description = `
                        <span class="highlight">📌 اسم المشروع:</span><br>
                        <span class="highlight2" style="font-size:1.2rem;">${title}</span><br><br>
                        <span class="highlight">📝 وصف الفكرة:</span><br>
                        ${prefix} ${adj} يهدف إلى خدمة <strong>${target}</strong> في مجال <strong>${domain}</strong> عبر تقديم حلول رقمية مبتكرة. المشروع ${adj} ويتميز بـ <strong>${adv}</strong> مما يجعله الخيار الأمثل للفئة المستهدفة.<br><br>
                        <span class="highlight">🎯 الجمهور المستهدف:</span><br>
                        ${target}، بالإضافة إلى المهتمين بـ ${domain}.<br><br>
                        <span class="highlight">💰 نموذج الربح:</span><br>
                        ${model}.<br><br>
                        <span class="highlight">⭐ الميزة التنافسية:</span><br>
                        ${adv}. ${keyword ? `الربط الوثيق بمفهوم "${keyword}" يمنح المشروع طابعاً فريداً.` : ''}<br><br>
                        <span style="color: var(--text-muted); font-size:0.9rem;">🏷️ المجال: ${data.tag}</span>
                    `;

                    signature = title + target;
                    attempt++;
                } while (ideaHistory.includes(signature) && attempt < 100);

                ideaHistory.push(signature);
                if (ideaHistory.length > 100) ideaHistory.shift();

                ideaCount++;
                document.getElementById('ideaCounter').textContent = `تم توليد ${ideaCount} فكرة`;
                document.getElementById('loader').style.display = 'none';

                const outputBox = document.getElementById('ideaOutput');
                typeWriter(outputBox, description, 12, () => {
                    document.getElementById('actionButtons').style.display = 'flex';
                });
            }, 500);
        }

        function typeWriter(element, text, speed, callback) {
            let i = 0;
            let currentTag = '';
            let inTag = false;
            element.innerHTML = '';
            element.classList.add('show');

            function type() {
                if (i < text.length) {
                    let char = text.charAt(i);
                    if (char === '<') { inTag = true; currentTag = '<'; }
                    else if (char === '>') { inTag = false; currentTag += '>'; element.innerHTML += currentTag; currentTag = ''; i++; setTimeout(type, speed); return; }
                    else if (inTag) { currentTag += char; }
                    else { element.innerHTML += char; }
                    i++;
                    setTimeout(type, speed);
                } else if (callback) { callback(); }
            }
            type();
        }

        function copyIdea() {
            navigator.clipboard.writeText(document.getElementById('ideaOutput').innerText).then(() => alert('✅ تم نسخ الفكرة!'));
        }

        function saveIdea() {
            const content = document.getElementById('ideaOutput').innerHTML;
            const keyword = document.getElementById('keywordInput').value || document.getElementById('industrySelect').value;
            let saved = JSON.parse(localStorage.getItem('ideaLibrary') || '[]');
            saved.unshift({ id: Date.now(), keyword, date: new Date().toLocaleString('ar-SA'), content });
            if (saved.length > 50) saved.pop();
            localStorage.setItem('ideaLibrary', JSON.stringify(saved));
            alert('💡 تم حفظ الفكرة في المكتبة!');
            displaySavedIdeas();
        }

        function downloadImage() {
            html2canvas(document.getElementById('ideaOutput'), { backgroundColor: null }).then(canvas => {
                const link = document.createElement('a');
                link.download = `فكرة_مشروع_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function displaySavedIdeas() {
            const saved = JSON.parse(localStorage.getItem('ideaLibrary') || '[]');
            const container = document.getElementById('savedIdeasContainer');
            const list = document.getElementById('savedIdeasList');
            if (saved.length === 0) { container.style.display = 'none'; return; }
            container.style.display = 'block';
            list.innerHTML = saved.map(s => `
                <div class="idea-item">
                    <strong>💡 ${s.keyword}</strong> | <small>${s.date}</small>
                    <span class="delete-btn" onclick="deleteIdea(${s.id})"><i class="fas fa-trash"></i></span>
                    <p style="margin-top:8px;">${s.content.substring(0, 150)}...</p>
                </div>
            `).join('');
        }

        function deleteIdea(id) {
            let saved = JSON.parse(localStorage.getItem('ideaLibrary') || '[]');
            saved = saved.filter(s => s.id !== id);
            localStorage.setItem('ideaLibrary', JSON.stringify(saved));
            displaySavedIdeas();
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('ideaTheme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        window.onload = function() {
            if (localStorage.getItem('ideaTheme') === 'light') document.body.classList.add('light-mode');
            displaySavedIdeas();
            generateIdea();
        };
    </script>
</body>
</html>
