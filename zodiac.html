<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاشف البرج الفلكي | النسخة الأسطورية 🔮</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #c084fc;
            --primary-glow: rgba(192, 132, 252, 0.6);
            --secondary: #fbbf24;
            --bg-dark: #0f0a1a;
            --bg-card: #1a1228;
            --bg-input: #241a35;
            --border-color: #352848;
            --text-light: #f3e8ff;
            --text-muted: #b0a0c8;
            --card-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        body.light-mode {
            --bg-dark: #f8f5fc;
            --bg-card: #ffffff;
            --bg-input: #f0e8f8;
            --border-color: #e0d0f0;
            --text-light: #2a1038;
            --text-muted: #6b5080;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.2s; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 0%, var(--primary-glow) 0%, transparent 40%);
        }
        .container {
            max-width: 750px;
            width: 100%;
            background: var(--bg-card);
            padding: 40px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: "✨";
            position: absolute;
            bottom: -30px;
            left: -20px;
            font-size: 7rem;
            opacity: 0.04;
            z-index: 0;
        }
        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            font-size: 1.3rem;
            padding: 8px 12px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 10;
        }
        .container > * { position: relative; z-index: 1; }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .sub { color: var(--text-muted); margin-bottom: 25px; }

        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 25px;
        }
        input[type="date"] {
            padding: 16px;
            border-radius: 18px;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            color: var(--text-light);
            font-size: 1.1rem;
            outline: none;
            font-family: 'Cairo';
            flex: 1;
            min-width: 200px;
        }
        input[type="date"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }
        .btn-reveal {
            padding: 16px 30px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-reveal:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--primary-glow); }

        .result-grid {
            display: none;
            gap: 18px;
            margin-top: 25px;
            animation: fadeUp 0.6s ease;
        }
        .result-grid.show { display: grid; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .zodiac-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: var(--bg-input);
            padding: 25px;
            border-radius: 22px;
            border: 1px solid var(--border-color);
        }
        .symbol-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            box-shadow: 0 0 40px var(--primary-glow);
        }
        .zodiac-name {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
        }
        .zodiac-date {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }
        .stat-card {
            background: var(--bg-input);
            padding: 18px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            text-align: center;
            transition: 0.3s;
        }
        .stat-card:hover { border-color: var(--primary); }
        .stat-icon { font-size: 1.5rem; margin-bottom: 6px; }
        .stat-value { font-size: 1.2rem; font-weight: 700; color: #fff; }
        .stat-label { color: var(--text-muted); font-size: 0.8rem; margin-top: 4px; }

        .analysis-box {
            background: var(--bg-dark);
            padding: 20px;
            border-radius: 18px;
            border-right: 5px solid var(--secondary);
            text-align: right;
            line-height: 1.9;
        }
        .analysis-box .highlight { color: var(--primary); font-weight: 700; font-size: 1.1rem; }

        .compatibility-box {
            background: var(--bg-input);
            padding: 18px;
            border-radius: 16px;
            text-align: right;
            border: 1px solid var(--border-color);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        .btn-action {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-action:hover { background: var(--primary); color: #000; border-color: var(--primary); }

        .counter { margin-top: 15px; color: var(--text-muted); font-size: 0.9rem; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.5rem; }
            .zodiac-name { font-size: 1.6rem; }
            .symbol-circle { width: 70px; height: 70px; font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع">🌓</button>
        <h1>🔮 كاشف البرج الفلكي</h1>
        <p class="sub">أدخل تاريخ ميلادك، واكتشف أسرار برجك الفلكي بالتفصيل.</p>

        <div class="input-group">
            <input type="date" id="birthDate" value="2000-01-01">
            <button class="btn-reveal" onclick="revealZodiac()">
                <i class="fas fa-star"></i> اكشف برجي
            </button>
        </div>

        <div id="resultGrid" class="result-grid">
            <div class="zodiac-header">
                <div class="symbol-circle" id="symbolCircle">♑</div>
                <div>
                    <div class="zodiac-name" id="zodiacName">الجدي</div>
                    <div class="zodiac-date" id="zodiacDate">22 ديسمبر - 19 يناير</div>
                </div>
            </div>

            <div class="stats-grid" id="statsGrid">
                <!-- تمتلئ ديناميكياً -->
            </div>

            <div class="analysis-box" id="analysisBox">
                <span class="highlight">🧠 تحليل الشخصية:</span>
                <span id="analysisText">جاري التحميل...</span>
            </div>

            <div class="compatibility-box" id="compatibilityBox">
                <span class="highlight">💞 أكثر الأبراج توافقاً:</span>
                <span id="compatibilityText"></span>
            </div>
        </div>

        <div class="action-buttons" id="actionButtons" style="display: none;">
            <button class="btn-action" onclick="copyResult()"><i class="fas fa-copy"></i> نسخ</button>
            <button class="btn-action" onclick="saveResult()"><i class="fas fa-save"></i> حفظ</button>
            <button class="btn-action" onclick="downloadImage()"><i class="fas fa-image"></i> صورة</button>
        </div>
        <div class="counter" id="calcCounter">تم الكشف 0 مرة</div>
    </div>

    <script>
        let calcCount = 0;
        let currentResult = null;

        const zodiacData = [
            { name: 'الحمل', symbol: '♈', element: '🔥 نار', planet: 'المريخ', stone: 'الياقوت', color: 'أحمر', luckyDay: 'الثلاثاء', startM: 3, startD: 21, endM: 4, endD: 19, dateRange: '21 مارس - 19 أبريل', compatibility: 'الأسد، القوس' },
            { name: 'الثور', symbol: '♉', element: '🌍 تراب', planet: 'الزهرة', stone: 'الزمرد', color: 'أخضر', luckyDay: 'الجمعة', startM: 4, startD: 20, endM: 5, endD: 20, dateRange: '20 أبريل - 20 مايو', compatibility: 'العذراء، الجدي' },
            { name: 'الجوزاء', symbol: '♊', element: '💨 هواء', planet: 'عطارد', stone: 'العقيق', color: 'أصفر', luckyDay: 'الأربعاء', startM: 5, startD: 21, endM: 6, endD: 20, dateRange: '21 مايو - 20 يونيو', compatibility: 'الميزان، الدلو' },
            { name: 'السرطان', symbol: '♋', element: '💧 ماء', planet: 'القمر', stone: 'اللؤلؤ', color: 'فضي', luckyDay: 'الاثنين', startM: 6, startD: 21, endM: 7, endD: 22, dateRange: '21 يونيو - 22 يوليو', compatibility: 'العقرب، الحوت' },
            { name: 'الأسد', symbol: '♌', element: '🔥 نار', planet: 'الشمس', stone: 'الذهب', color: 'ذهبي', luckyDay: 'الأحد', startM: 7, startD: 23, endM: 8, endD: 22, dateRange: '23 يوليو - 22 أغسطس', compatibility: 'الحمل، القوس' },
            { name: 'العذراء', symbol: '♍', element: '🌍 تراب', planet: 'عطارد', stone: 'اليشم', color: 'بني', luckyDay: 'الأربعاء', startM: 8, startD: 23, endM: 9, endD: 22, dateRange: '23 أغسطس - 22 سبتمبر', compatibility: 'الثور، الجدي' },
            { name: 'الميزان', symbol: '♎', element: '💨 هواء', planet: 'الزهرة', stone: 'المرجان', color: 'وردي', luckyDay: 'الجمعة', startM: 9, startD: 23, endM: 10, endD: 22, dateRange: '23 سبتمبر - 22 أكتوبر', compatibility: 'الجوزاء، الدلو' },
            { name: 'العقرب', symbol: '♏', element: '💧 ماء', planet: 'بلوتو', stone: 'الجمشت', color: 'أسود', luckyDay: 'الثلاثاء', startM: 10, startD: 23, endM: 11, endD: 21, dateRange: '23 أكتوبر - 21 نوفمبر', compatibility: 'السرطان، الحوت' },
            { name: 'القوس', symbol: '♐', element: '🔥 نار', planet: 'المشتري', stone: 'الفيروز', color: 'أزرق', luckyDay: 'الخميس', startM: 11, startD: 22, endM: 12, endD: 21, dateRange: '22 نوفمبر - 21 ديسمبر', compatibility: 'الحمل، الأسد' },
            { name: 'الجدي', symbol: '♑', element: '🌍 تراب', planet: 'زحل', stone: 'العقيق الأسود', color: 'رمادي', luckyDay: 'السبت', startM: 12, startD: 22, endM: 1, endD: 19, dateRange: '22 ديسمبر - 19 يناير', compatibility: 'الثور، العذراء' },
            { name: 'الدلو', symbol: '♒', element: '💨 هواء', planet: 'أورانوس', stone: 'الجمشت', color: 'فيروزي', luckyDay: 'السبت', startM: 1, startD: 20, endM: 2, endD: 18, dateRange: '20 يناير - 18 فبراير', compatibility: 'الجوزاء، الميزان' },
            { name: 'الحوت', symbol: '♓', element: '💧 ماء', planet: 'نبتون', stone: 'المرجان', color: 'بنفسجي', luckyDay: 'الخميس', startM: 2, startD: 19, endM: 3, endD: 20, dateRange: '19 فبراير - 20 مارس', compatibility: 'السرطان، العقرب' }
        ];

        const insights = {
            'الحمل': ['طاقتك النارية لا تقهر. أنت قائد بالفطرة، تملك شجاعة نادرة.', 'لا تخف من المخاطرة المحسوبة اليوم.', 'حماسك معدي، استخدمه لإلهام من حولك.'],
            'الثور': ['استقرارك هو قوتك. أنت كالجبل، تثبت في وجه العواصف.', 'قدّر الجمال من حولك، فأنت ترى ما لا يراه الآخرون.', 'صبرك سيؤتي ثماره قريباً.'],
            'الجوزاء': ['عقلك موسوعة متنقلة. فضولك هو محرك إبداعك.', 'التواصل هو سلاحك السري. تحدث واكتب وشارك.', 'أنت تجيد التكيف، وهذه ميزة لا تقدر بثمن.'],
            'السرطان': ['حدسك هو بوصلتك. ثق بصوتك الداخلي دائماً.', 'أنت ملاذ لمن حولك. دفئك العاطفي نادر.', 'المنزل والعائلة هما مصدر قوتك.'],
            'الأسد': ['أنت نجم هذه الحياة. ثقتك بنفسك تلهم الجميع.', 'الكرم صفتك الملوكية. عطاؤك يعود أضعافاً.', 'لا تخشَ أن تكون في المقدمة، فهذا مكانك الطبيعي.'],
            'العذراء': ['دقتك أسطورية. أنت ترى التفاصيل التي يغفل عنها العالم.', 'خدمتك للآخرين هي رسالتك النبيلة.', 'لا تقسُ على نفسك، فالكمال لله وحده.'],
            'الميزان': ['التوازن هو فنك. أنت تصنع الجمال حيثما حللت.', 'العدالة بوصلتك. اختر ما هو صواب دائماً.', 'حياتك لوحة فنية، استمر في إضافة الألوان.'],
            'العقرب': ['قوتك الداخلية مرعبة. أنت تنهض من الرماد كالعنقاء.', 'غموضك جذاب. لا تكشف كل أوراقك.', 'شغفك هو وقود نجاحك.'],
            'القوس': ['روحك مغامرة. الأفق يناديك باسمك.', 'الفلسفة والحكمة هما كنزك. شارك معرفتك.', 'ابتسامتك هي سلاحك الفتاك. استخدمها.'],
            'الجدي': ['طموحك كالجبل. أنت تبني النجاح حجراً حجراً.', 'انضباطك الذاتي هو معجزتك. لا تستهن به.', 'الصعود للقمة يتطلب وقتاً، وأنت صبور بما يكفي.'],
            'الدلو': ['أفكارك من المستقبل. أنت عبقري هذا العصر.', 'الحرية هي هواؤك. لا تسمح لأحد بتقييدك.', 'إنسانيتك هي أعظم إنجازاتك.'],
            'الحوت': ['خيالك لا حدود له. أنت تحلق في عوالم لا يراها غيرك.', 'عطفك على الآخرين هو قوتك الخارقة.', 'أحلامك ليست مجرد أحلام، بل رسائل من الكون.']
        };

        function getZodiac(month, day) {
            for (const z of zodiacData) {
                if ((month === z.startM && day >= z.startD) || (month === z.endM && day <= z.endD) ||
                    (z.name === 'الجدي' && (month === 12 && day >= 22 || month === 1 && day <= 19))) {
                    return z;
                }
            }
            return zodiacData[9]; // الجدي كافتراضي
        }

        function revealZodiac() {
            const birthValue = document.getElementById('birthDate').value;
            if (!birthValue) { alert('يرجى اختيار تاريخ ميلادك!'); return; }

            const [y, m, d] = birthValue.split('-').map(Number);
            const zodiac = getZodiac(m, d);
            const insightList = insights[zodiac.name];
            const insight = insightList[Math.floor(Math.random() * insightList.length)];

            // عرض النتائج
            document.getElementById('symbolCircle').textContent = zodiac.symbol;
            document.getElementById('zodiacName').textContent = zodiac.name;
            document.getElementById('zodiacDate').textContent = zodiac.dateRange;
            document.getElementById('analysisText').textContent = insight;
            document.getElementById('compatibilityText').textContent = zodiac.compatibility;

            // بناء بطاقات الإحصائيات
            const stats = [
                { icon: '🌍', label: 'العنصر', value: zodiac.element },
                { icon: '⚡', label: 'الكوكب', value: zodiac.planet },
                { icon: '💎', label: 'الحجر', value: zodiac.stone },
                { icon: '🎨', label: 'اللون', value: zodiac.color },
                { icon: '📅', label: 'يوم الحظ', value: zodiac.luckyDay },
            ];

            document.getElementById('statsGrid').innerHTML = stats.map(s => `
                <div class="stat-card">
                    <div class="stat-icon">${s.icon}</div>
                    <div class="stat-value">${s.value}</div>
                    <div class="stat-label">${s.label}</div>
                </div>
            `).join('');

            document.getElementById('resultGrid').classList.add('show');
            document.getElementById('actionButtons').style.display = 'flex';

            currentResult = { zodiac: zodiac.name, symbol: zodiac.symbol, element: zodiac.element, planet: zodiac.planet, insight };

            calcCount++;
            document.getElementById('calcCounter').textContent = `تم الكشف ${calcCount} مرة`;
        }

        function copyResult() {
            if (!currentResult) return;
            const text = `برجي: ${currentResult.zodiac} ${currentResult.symbol}\nالعنصر: ${currentResult.element}\nالكوكب: ${currentResult.planet}\n${currentResult.insight}`;
            navigator.clipboard.writeText(text).then(() => alert('✅ تم نسخ النتيجة'));
        }

        function saveResult() {
            if (!currentResult) return;
            let saved = JSON.parse(localStorage.getItem('zodiacResults') || '[]');
            saved.unshift({ ...currentResult, date: new Date().toLocaleString('ar-SA') });
            if (saved.length > 10) saved.pop();
            localStorage.setItem('zodiacResults', JSON.stringify(saved));
            alert('💾 تم حفظ النتيجة');
        }

        function downloadImage() {
            html2canvas(document.getElementById('resultGrid'), { backgroundColor: '#0f0a1a' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `برجي_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('zodiacTheme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        window.onload = function() {
            if (localStorage.getItem('zodiacTheme') === 'light') document.body.classList.add('light-mode');
            revealZodiac();
        };
    </script>
</body>
</html>
