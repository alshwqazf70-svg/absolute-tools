<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرفة برجك الفلكي الدقيق</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --primary-shadow: rgba(0, 255, 136, 0.3);
            --secondary: #00ccff;
            --bg-dark: #0b0e14;
            --bg-card: #131821;
            --bg-input: #1b212b;
            --border-color: #2a2f3a;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark); color: var(--text-light);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .container {
            max-width: 700px; width: 100%; background: var(--bg-card);
            padding: 40px; border-radius: 30px; border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center;
        }
        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900;
            background: linear-gradient(135deg, #ffffff, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sub { color: var(--text-muted); margin-bottom: 20px; }

        .input-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        input[type="date"] {
            padding: 14px; border-radius: 15px; background: var(--bg-input);
            border: 1px solid var(--border-color); color: #fff; font-size: 1rem;
            outline: none; font-family: 'Cairo';
        }
        input[type="date"]:focus { border-color: var(--primary); }
        .btn-calc {
            padding: 14px 30px; border: none; border-radius: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000; font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .btn-calc:hover { transform: scale(1.05); }

        .result-grid {
            display: grid; grid-template-columns: 1fr; gap: 15px;
            margin-top: 25px; display: none;
        }
        .result-grid.show { display: grid; }

        .zodiac-header {
            display: flex; align-items: center; justify-content: center; gap: 15px;
            background: var(--bg-input); padding: 20px; border-radius: 20px;
            border: 1px solid var(--border-color);
        }
        .symbol { font-size: 4rem; color: var(--primary); }
        .name { font-size: 2rem; font-weight: 900; color: #fff; }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
        }
        .stat-card {
            background: var(--bg-input); padding: 15px; border-radius: 15px;
            border: 1px solid var(--border-color); text-align: center;
        }
        .stat-label { color: var(--text-muted); font-size: 0.85rem; }
        .stat-value { font-size: 1.2rem; font-weight: 700; color: #fff; margin-top: 5px; }

        .analysis-box {
            background: #0b0e14; padding: 20px; border-radius: 15px;
            border-right: 4px solid var(--secondary); text-align: right; line-height: 1.8;
        }
        .analysis-box .highlight { color: var(--primary); font-weight: 700; }

        .counter { margin-top: 15px; color: var(--text-muted); font-size: 0.85rem; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.6rem; }
            .input-group { flex-direction: column; }
            input, button { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔮 معرفة برجك الفلكي</h1>
        <p class="sub">أدخل تاريخ ميلادك، وسنكشف لك برجك الحقيقي بناءً على الجداول الدقيقة.</p>

        <div class="input-group">
            <input type="date" id="birthDate">
            <button class="btn-calc" onclick="revealZodiac()">🔮 كشف برجي</button>
        </div>

        <div id="resultGrid" class="result-grid">
            <div class="zodiac-header">
                <span class="symbol" id="zodiacSymbol">♑</span>
                <span class="name" id="zodiacName">الجدي</span>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">🌍 العنصر</div>
                    <div class="stat-value" id="zodiacElement">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">⚡ الكوكب الحاكم</div>
                    <div class="stat-value" id="zodiacPlanet">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">📅 تاريخ الميلاد</div>
                    <div class="stat-value" id="birthDisplay">-</div>
                </div>
            </div>

            <div class="analysis-box" id="analysisText">
                <span class="highlight">🧠 تحليل الشخصية الرقمية:</span> جاري التحميل...
            </div>
        </div>
        <div class="counter" id="calcCounter">تم الكشف 0 مرة</div>
    </div>

    <script>
        // ================================================================
        // محرك الأبراج الفلكي (دقيق 100%)
        // ================================================================
        let calcCount = 0;

        // جدول الأبراج الدقيق
        const zodiacData = [
            { name: 'الحمل', symbol: '♈', element: 'نار', planet: 'المريخ', startM: 3, startD: 21, endM: 4, endD: 19 },
            { name: 'الثور', symbol: '♉', element: 'تراب', planet: 'الزهرة', startM: 4, startD: 20, endM: 5, endD: 20 },
            { name: 'الجوزاء', symbol: '♊', element: 'هواء', planet: 'عطارد', startM: 5, startD: 21, endM: 6, endD: 20 },
            { name: 'السرطان', symbol: '♋', element: 'ماء', planet: 'القمر', startM: 6, startD: 21, endM: 7, endD: 22 },
            { name: 'الأسد', symbol: '♌', element: 'نار', planet: 'الشمس', startM: 7, startD: 23, endM: 8, endD: 22 },
            { name: 'العذراء', symbol: '♍', element: 'تراب', planet: 'عطارد', startM: 8, startD: 23, endM: 9, endD: 22 },
            { name: 'الميزان', symbol: '♎', element: 'هواء', planet: 'الزهرة', startM: 9, startD: 23, endM: 10, endD: 22 },
            { name: 'العقرب', symbol: '♏', element: 'ماء', planet: 'بلوتو', startM: 10, startD: 23, endM: 11, endD: 21 },
            { name: 'القوس', symbol: '♐', element: 'نار', planet: 'المشتري', startM: 11, startD: 22, endM: 12, endD: 21 },
            { name: 'الجدي', symbol: '♑', element: 'تراب', planet: 'زحل', startM: 12, startD: 22, endM: 1, endD: 19 },
            { name: 'الدلو', symbol: '♒', element: 'هواء', planet: 'أورانوس', startM: 1, startD: 20, endM: 2, endD: 18 },
            { name: 'الحوت', symbol: '♓', element: 'ماء', planet: 'نبتون', startM: 2, startD: 19, endM: 3, endD: 20 }
        ];

        // تحليلات الشخصية الغامضة (لجعل المحتوى لا نهائي، سنستخدم خريطة)
        const personalityInsights = {
            'الحمل': ['طاقتك النارية لا تقهر. أنت قائد بالفطرة.', 'أنت لا تخاف من البدايات. ابدأ مشروعك اليوم.', 'شجاعتك معدنية. لكن أحياناً، التأني أفضل.'],
            'الثور': ['استقرارك هو قوتك. أنت كالجبل، تثبت كل شيء.', 'الجمال والمادة يحيطون بك. اعتنِ بذوقك اليوم.', 'أنت صبور جداً، لكن لا تتجاهل حدسك.'],
            'الجوزاء': ['عقلك لا يتوقف عن الدوران. جيد، لكن احذر من التشتت.', 'التواصل هو قوتك. اكتب ما يدور في خاطرك.', 'أنت سريع البديهة، وهذا يجعلك مميزاً.'],
            'السرطان': ['حدسك قوي جداً. استمع لصوتك الداخلي.', 'أنت شخص عاطفي ومحبوب. المشاعر هي دليلك.', 'المنزل هو ملاذك. احمِ من تحب.'],
            'الأسد': ['أنت تولد لتكون في دائرة الضوء. أظهر نفسك.', 'الكرم والثقة هما سلاحك. لا تخف من العطاء.', 'قلبك كبير، لكن لا تنسَ أن تعطي لنفسك.'],
            'العذراء': ['التحليل والدقة هما سمة بارزة. أنت عبقرية التفاصيل.', 'الترتيب هو جمالك. نظم عالمك اليوم.', 'لا ترهق نفسك بالكمال، أنت ممتاز بالفعل.'],
            'الميزان': ['التوازن والجمال هوسك. أنت تعرف كيف تبهر.', 'العدالة هي طريقك. اختر دائمًا الأفضل.', 'الحياة معك جميلة. استمر في نشر الجمال.'],
            'العقرب': ['الغموض والقوة يحيطون بك. أنت لا تُقهر.', 'أنت عميق جداً، لا تخشَ الظلام بداخلك.', 'تحولاتك مذهلة. اليوم هو يوم بداية جديدة.'],
            'القوس': ['أنت روح مغامرة. الأفق هو بيتك.', 'الضحك والفلسفة سلاحك. انشر المرح.', 'أنت تبحث عن المعنى، وسوف تجده.'],
            'الجدي': ['الطموح والانضباط هما هويتك. أنت تبني النجاح.', 'أنت راقٍ وصبور، النتيجة دائماً في صالحك.', 'لا تخف من الثقل، أنت مصمم لحمل العالم.'],
            'الدلو': ['أنت رائد ومبتكر. أفكارك سابقة لعصرها.', 'الحرية هي نبضك. لا تقيد نفسك.', 'أنت إنساني. استخدم إبداعك لمساعدة الآخرين.'],
            'الحوت': ['الخيال والحدس عالمك. أنت حالم وباحث.', 'عطفك لا حدود له. لكن احمِ طاقتك.', 'أنت متصل بالكون. استلهم من أحلامك.']
        };

        function revealZodiac() {
            const birthValue = document.getElementById('birthDate').value;
            if (!birthValue) {
                alert('يرجى اختيار تاريخ ميلادك أولاً!');
                return;
            }

            const parts = birthValue.split('-');
            const month = parseInt(parts[1]);
            const day = parseInt(parts[2]);

            let found = null;

            for (let z of zodiacData) {
                // التحقق من التداخل بين الشهرين (للأبراج التي تمتد على شهرين)
                // الجدي (12-22 إلى 1-19)، الدلو (1-20 إلى 2-18)، الحوت (2-19 إلى 3-20)
                if (z.name === 'الجدي' && (month === 12 && day >= 22 || month === 1 && day <= 19)) { found = z; break; }
                else if (z.name === 'الدلو' && (month === 1 && day >= 20 || month === 2 && day <= 18)) { found = z; break; }
                else if (z.name === 'الحوت' && (month === 2 && day >= 19 || month === 3 && day <= 20)) { found = z; break; }
                // الأبراج العادية التي تبدأ وتنتهي في نفس الشهر تقريباً
                else if (month === z.startM && day >= z.startD) { found = z; break; }
                else if (month === z.endM && day <= z.endD) { found = z; break; }
            }

            if (!found) {
                // إذا لم يتم العثور، نعطي برجاً افتراضياً (لن يحدث هذا عملياً)
                found = zodiacData[0];
            }

            // استخراج تحليل عشوائي للبرج المكتشف
            const insights = personalityInsights[found.name] || ['شخصيتك فريدة، ولا يمكن تصنيفها بسهولة.'];
            const randomInsight = insights[Math.floor(Math.random() * insights.length)];

            // عرض النتائج
            document.getElementById('zodiacSymbol').textContent = found.symbol;
            document.getElementById('zodiacName').textContent = found.name;
            document.getElementById('zodiacElement').textContent = found.element;
            document.getElementById('zodiacPlanet').textContent = found.planet;
            document.getElementById('birthDisplay').textContent = birthValue;
            document.getElementById('analysisText').innerHTML = `<span class="highlight">🧠 تحليل الشخصية الرقمية:</span> ${randomInsight}`;
            document.getElementById('resultGrid').classList.add('show');

            calcCount++;
            document.getElementById('calcCounter').textContent = `تم الكشف ${calcCount} مرة`;
        }

        // تشغيل أولي مع تاريخ افتراضي لجعل التجربة فورية
        document.getElementById('birthDate').value = '2000-01-01';
        revealZodiac();
    </script>
</body>
</html>
