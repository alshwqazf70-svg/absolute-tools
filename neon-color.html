<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صانع الألوان النيونية | توليد لوحات إبداعية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --primary-shadow: rgba(0, 255, 136, 0.3);
            --secondary: #00ccff;
            --bg-dark: #0b0e14;
            --bg-card: #131821;
            --bg-input: #1b212b;
            --border-color: #2a2f3a;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark); color: var(--text-light);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .container {
            max-width: 850px; width: 100%; background: var(--bg-card);
            padding: 40px; border-radius: 30px; border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center;
        }
        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900;
            background: linear-gradient(135deg, #ffffff, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sub { color: var(--text-muted); margin-bottom: 20px; }

        .input-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        .input-group input[type="color"] {
            width: 60px; height: 60px; border: 2px solid var(--border-color);
            border-radius: 15px; background: transparent; cursor: pointer; outline: none;
        }
        .input-group input[type="text"] {
            flex: 1; min-width: 180px; padding: 14px; border-radius: 15px;
            background: var(--bg-input); border: 1px solid var(--border-color);
            color: #fff; font-size: 1rem; outline: none; font-family: 'Cairo';
        }
        .input-group input[type="text"]:focus { border-color: var(--primary); }
        .input-group .btn-generate {
            padding: 14px 25px; border: none; border-radius: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000; font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .input-group .btn-generate:hover { transform: scale(1.05); }

        .palette-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px; margin-top: 20px;
        }
        .color-card {
            aspect-ratio: 1; border-radius: 20px; border: 1px solid var(--border-color);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding: 15px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .color-card:hover {
            transform: scale(1.05); border-color: var(--primary);
        }
        .color-card .hex-code {
            background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 50px;
            color: #fff; font-size: 0.75rem; font-weight: 700; font-family: monospace;
        }
        .counter { margin-top: 15px; color: var(--text-muted); font-size: 0.85rem; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.6rem; }
            .input-group { flex-direction: column; }
            input[type="color"] { margin: 0 auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎨 صانع الألوان النيونية</h1>
        <p class="sub">اختر لوناً أو اكتب اسم لون، وسأولد لك لوحة نيونية متكاملة.</p>

        <div class="input-group">
            <input type="color" id="baseColorPicker" value="#00ff88">
            <input type="text" id="colorNameInput" placeholder="أو اكتب لوناً (مثل: blue, red)" value="blue">
            <button class="btn-generate" onclick="generatePalette()">🔥 توليد اللوحة</button>
        </div>

        <div id="paletteGrid" class="palette-grid"></div>
        <div class="counter" id="paletteCounter">تم توليد 0 لوحة</div>
    </div>

    <script>
        // ================================================================
        // محرك الألوان النيونية (توليد تدرجات ساطعة)
        // ================================================================
        let paletteCount = 0;

        // خريطة الألوان الشائعة
        const colorMap = {
            'red': '#ff4444', 'blue': '#00ccff', 'green': '#00ff88', 'yellow': '#facc15',
            'purple': '#a855f7', 'pink': '#f472b6', 'orange': '#fb923c', 'white': '#ffffff',
            'cyan': '#06b6d4', 'magenta': '#ec4899', 'lime': '#84cc16', 'black': '#000000'
        };

        function generatePalette() {
            const picker = document.getElementById('baseColorPicker').value;
            const nameInput = document.getElementById('colorNameInput').value.trim().toLowerCase();
            let baseColor = picker;

            // تحويل اسم اللون إلى كود سداسي إذا كان موجوداً
            if (colorMap[nameInput]) baseColor = colorMap[nameInput];

            // توليد 5 تدرجات (تعديل السطوع)
            const palette = [
                baseColor,
                adjustBrightness(baseColor, 25),
                adjustBrightness(baseColor, -25),
                adjustBrightness(baseColor, 50),
                adjustBrightness(baseColor, -50)
            ];

            // عرض النتائج
            paletteCount++;
            const grid = document.getElementById('paletteGrid');
            grid.innerHTML = '';

            palette.forEach(hex => {
                const card = document.createElement('div');
                card.className = 'color-card';
                card.style.background = hex;
                card.innerHTML = `<span class="hex-code">${hex}</span>`;
                card.onclick = () => copyColor(hex);
                grid.appendChild(card);
            });

            document.getElementById('paletteCounter').textContent = `تم توليد ${paletteCount} لوحة`;
        }

        // دالة لتعديل سطوع اللون
        function adjustBrightness(hex, percent) {
            let r = parseInt(hex.slice(1,3), 16);
            let g = parseInt(hex.slice(3,5), 16);
            let b = parseInt(hex.slice(5,7), 16);
            r = Math.min(255, Math.max(0, r + percent));
            g = Math.min(255, Math.max(0, g + percent));
            b = Math.min(255, Math.max(0, b + percent));
            return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
        }

        function copyColor(hex) {
            navigator.clipboard.writeText(hex).then(() => {
                alert(`✅ تم نسخ اللون: ${hex}`);
            });
        }

        // تشغيل أولي عند فتح الصفحة
        generatePalette();
    </script>
</body>
</html>
