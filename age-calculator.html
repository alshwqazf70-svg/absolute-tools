<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة العمر بالأيام</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --primary-shadow: rgba(0, 255, 136, 0.3);
            --secondary: #00ccff;
            --bg-dark: #0b0e14;
            --bg-card: #131821;
            --bg-input: #1b212b;
            --border-color: #2a2f3a;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark); color: var(--text-light);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .container {
            max-width: 700px; width: 100%; background: var(--bg-card);
            padding: 40px; border-radius: 30px; border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center;
        }
        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900;
            background: linear-gradient(135deg, #ffffff, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sub { color: var(--text-muted); margin-bottom: 20px; }

        .input-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        input[type="date"] {
            padding: 14px; border-radius: 15px; background: var(--bg-input);
            border: 1px solid var(--border-color); color: #fff; font-size: 1rem;
            outline: none; font-family: 'Cairo';
        }
        input[type="date"]:focus { border-color: var(--primary); }
        .btn-calc {
            padding: 14px 30px; border: none; border-radius: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000; font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .btn-calc:hover { transform: scale(1.05); }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px; margin-top: 25px;
        }
        .stat-card {
            background: var(--bg-input); padding: 20px; border-radius: 15px;
            border: 1px solid var(--border-color);
        }
        .stat-number {
            display: block; font-size: 2.2rem; font-weight: 900; color: var(--primary);
        }
        .stat-label { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; }

        .milestone-box {
            margin-top: 20px; padding: 20px; background: #0b0e14; border-radius: 15px;
            border-right: 4px solid var(--secondary); text-align: right; line-height: 1.8;
        }
        .milestone-box .highlight { color: var(--primary); font-weight: 700; }

        .counter { margin-top: 15px; color: var(--text-muted); font-size: 0.85rem; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.6rem; }
            .input-group { flex-direction: column; }
            input, button { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎂 حاسبة العمر بالأيام</h1>
        <p class="sub">اختر تاريخ ميلادك، واكتشف كم يوماً عشت في هذه الحياة!</p>

        <div class="input-group">
            <input type="date" id="birthDate" value="2000-01-01">
            <button class="btn-calc" onclick="calculateAge()">🔢 احسب عمري</button>
        </div>

        <div id="statsGrid" class="stats-grid" style="display: none;">
            <div class="stat-card">
                <span class="stat-number" id="days">0</span>
                <span class="stat-label">يوم</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="weeks">0</span>
                <span class="stat-label">أسبوع</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="months">0</span>
                <span class="stat-label">شهر</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="years">0</span>
                <span class="stat-label">سنة</span>
            </div>
        </div>

        <div id="milestoneBox" class="milestone-box" style="display: none;"></div>
        <div class="counter" id="calcCounter">تم الحساب 0 مرة</div>
    </div>

    <script>
        // ================================================================
        // محرك حساب العمر
        // ================================================================
        let calcCount = 0;

        function calculateAge() {
            const birthValue = document.getElementById('birthDate').value;
            if (!birthValue) {
                alert('يرجى اختيار تاريخ ميلاد صحيح!');
                return;
            }

            const birth = new Date(birthValue);
            const now = new Date();

            if (birth > now) {
                alert('تاريخ الميلاد لا يمكن أن يكون في المستقبل!');
                return;
            }

            // حساب الفرق بالمللي ثانية وتحويله لأيام
            const diffTime = now - birth;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

            // التحويلات
            const years = Math.floor(diffDays / 365.25);
            const months = Math.floor(diffDays / 30.44);
            const weeks = Math.floor(diffDays / 7);

            // عرض النتائج
            document.getElementById('days').textContent = diffDays.toLocaleString();
            document.getElementById('weeks').textContent = weeks.toLocaleString();
            document.getElementById('months').textContent = months.toLocaleString();
            document.getElementById('years').textContent = years.toLocaleString();
            document.getElementById('statsGrid').style.display = 'grid';

            // توليد رسالة تحفيزية عشوائية
            const messages = [
                `🎉 لقد عشت <span class="highlight">${diffDays.toLocaleString()}</span> يوماً! هذا يعني أنك تجاوزت <span class="highlight">${weeks.toLocaleString()}</span> أسبوعاً من المغامرات.`,
                `🛡️ <span class="highlight">${years}</span> سنة من الحياة! استمر في صنع الذكريات.`,
                `🌟 في كل يوم تشرق فيه الشمس، تزداد حكمتك. لقد مررت بـ <span class="highlight">${months.toLocaleString()}</span> شهراً من الإنجازات.`,
                `💪 أنت أقوى مما تتصور! <span class="highlight">${diffDays.toLocaleString()}</span> يوم من البقاء والصمود.`,
                `🌍 لقد سافرت حول الشمس <span class="highlight">${years}</span> مرة. استمر في استكشاف العالم!`
            ];

            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            document.getElementById('milestoneBox').innerHTML = randomMsg;
            document.getElementById('milestoneBox').style.display = 'block';

            calcCount++;
            document.getElementById('calcCounter').textContent = `تم الحساب ${calcCount} مرة`;
        }

        // تشغيل أولي عند فتح الصفحة
        calculateAge();
    </script>
</body>
</html>
