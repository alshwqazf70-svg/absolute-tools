<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد النكت القصصية | النكتة لا تنتهي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ================================================================
           التصميم الأسطوري (نسخة واحدة)
           ================================================================ */
        :root {
            --primary: #00ff88;
            --primary-shadow: rgba(0, 255, 136, 0.3);
            --secondary: #00ccff;
            --bg-dark: #0b0e14;
            --bg-card: #131821;
            --bg-input: #1b212b;
            --border-color: #2a2f3a;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark); color: var(--text-light);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .container {
            max-width: 850px; width: 100%; background: var(--bg-card);
            padding: 40px; border-radius: 30px; border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem; font-weight: 900; margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sub { color: var(--text-muted); margin-bottom: 20px; }

        .btn-generate {
            padding: 14px 30px; border: none; border-radius: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000; font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .btn-generate:hover { transform: scale(1.05); }

        .output-box {
            margin-top: 25px; padding: 25px; background: #0b0e14; border-radius: 20px;
            border-right: 4px solid var(--primary); text-align: right; line-height: 2; font-size: 1.05rem;
            display: none; animation: fadeUp 0.6s ease;
            max-height: 600px; overflow-y: auto;
        }
        .output-box.show { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .highlight { color: var(--primary); font-weight: 700; }
        .highlight2 { color: var(--secondary); font-weight: 700; }
        .counter { margin-top: 15px; color: var(--text-muted); font-size: 0.85rem; }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>😂 مولد النكت القصصية</h1>
        <p class="sub">لا تكتب شيئاً. فقط اضغط الزر، وستُسرد لك قصة مضحكة طويلة جداً. لن تتكرر أبداً!</p>

        <button class="btn-generate" onclick="generateStoryJoke()">🎲 توليد نكتة جديدة</button>

        <div id="jokeOutput" class="output-box"></div>
        <div class="counter" id="jokeCounter">تم سرد 0 نكتة</div>
    </div>

    <script>
        // ================================================================
        // محرك النكت اللامحدود (مولد قصصي - لا نهائي)
        // ================================================================
        let jokeCount = 0;
        let usedJokes = new Set();

        function generateStoryJoke() {
            // قواعد بيانات النكت الطويلة (شخصيات، أماكن، مواقف، خاتمات)
            const characters = [
                'أستاذ جامعي غريب الأطوار يعيش في قبو',
                'مبرمج نائم منذ 3 أيام',
                'وزير سابق لا يعرف كيف يقود سيارة',
                'سيدة عجوز تمتلك 100 قطة تتحدث',
                'فيلسوف صحراوي يحب الشاي بالسكر'
            ];

            const places = [
                'مطعم للروبوتات',
                'مقبرة طائرات مهجورة',
                'سوق للكلمات المفقودة',
                'مصنع للأحلام المكسورة',
                'مكتبة الأشباح'
            ];

            const situations = [
                'حاول إقناع الجميع أن القهوة تسبب الجنون',
                'دخل في جدال مع طاولة',
                'حاول شراء سحابة من أحد المارة',
                'كتب رسالة طويلة للغد',
                'عثر على شبكة واي فاي في الصحراء'
            ];

            const dialogues = [
                'قال بكل ثقة: "أنا لا أعتقد أنني مخطئ، لكنني قد أكون!"',
                'صرخ: "إذا لم تضحك الآن، سأغني لك!"',
                'همس: "السر هو أنني كنت أعرف النهاية طوال الوقت!"',
                'سأل الجميع: "لماذا كلكم تنظرون إليّ هكذا؟ أنا لست مجنوناً!"',
                'رد بصوت عالٍ: "هذا لا يفسر لماذا اختفت الجوارب!"'
            ];

            const punchlines = [
                'وسقط الجميع على الأرض من الضحك، بينما وقف الجدار ينظر إليهم باستغراب.',
                'منذ ذلك اليوم، أصبحت هذه القصة تُروى في كل حفلة.',
                'قال أحد الحضور: "هذا أغبى ما سمعته في حياتي، استمر!"',
                'بعدها، أُغلق المطعم وفتحت عيادة نفسية بدلاً منه.',
                'قال الراوي: "إن لم تكن تبتسم الآن، فأنت ميت من الداخل!"'
            ];

            let joke, signature;
            let attempt = 0;

            do {
                const c = characters[Math.floor(Math.random() * characters.length)];
                const p = places[Math.floor(Math.random() * places.length)];
                const s = situations[Math.floor(Math.random() * situations.length)];
                const d = dialogues[Math.floor(Math.random() * dialogues.length)];
                const pL = punchlines[Math.floor(Math.random() * punchlines.length)];

                joke = `
                    <span class="highlight">🔥 البداية المأساوية:</span><br><br>
                    كان هناك <span class="highlight2">${c}</span> يجلس بهدوء في <span class="highlight">${p}</span>.<br>
                    فجأة، حدث شيء غريب جداً: ${s}. 
                    صمت الجميع في الغرفة، ونظر الجدار بفضول إلى الشخص.<br><br>

                    <span class="highlight2">💬 الحوار الذي لا يُنسى:</span><br><br>
                    التفت ${c} إلى الحضور و ${d}.<br>
                    ارتفعت أصوات الضحك، لكن ${c} استمر بجدية قائلاً: "أنتم لا تفهمون حتى الآن!"<br><br>

                    <span class="highlight">🤯 الذروة الساخرة:</span><br><br>
                    عندها، دخل شخص غريب وقال: "أنا هنا لإصلاح الموقف!"<br>
                    ${pL}<br><br>

                    <span class="highlight">🎭 الخاتمة اللانهائية:</span><br><br>
                    وغادر الجميع القاعة، وهم يضحكون حتى البكاء. قال أحدهم في النهاية: "ربما هذا هو معنى الحياة: أن نضحك على أنفسنا!".
                `;

                // التوقيع لمنع التكرار
                signature = c + p + s;
                attempt++;
            } while (usedJokes.has(signature) && attempt < 50);

            usedJokes.add(signature);
            if (usedJokes.size > 200) usedJokes.clear();

            jokeCount++;
            document.getElementById('jokeOutput').innerHTML = joke;
            document.getElementById('jokeOutput').classList.add('show');
            document.getElementById('jokeCounter').textContent = `تم سرد ${jokeCount} نكتة`;
        }

        // تشغيل أولي
        generateStoryJoke();
    </script>
</body>
</html>
